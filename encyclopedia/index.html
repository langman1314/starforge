<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">

<title>星铸百科 - StarForge Encyclopedia</title>
<style>
/* ========== Reset & Base ========== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 15px; scroll-behavior: smooth; }
body {
  font-family: 'Segoe UI', system-ui, -apple-system, 'Microsoft YaHei', sans-serif;
  background: #0a0a1a;
  color: #c8d6e5;
  display: flex;
  min-height: 100vh;
  overflow-x: hidden;
}
a { color: #0f3460; text-decoration: none; transition: color .2s; }
a:hover { color: #e94560; }

/* ========== Scrollbar ========== */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: #1a1a2e; }
::-webkit-scrollbar-thumb { background: #0f3460; border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: #e94560; }

/* ========== Sidebar ========== */
#sidebar {
  width: 300px;
  min-width: 300px;
  height: 100vh;
  background: #16213e;
  border-right: 1px solid #0f3460;
  display: flex;
  flex-direction: column;
  position: sticky;
  top: 0;
  overflow: hidden;
  transition: margin-left .3s ease, opacity .3s ease;
  z-index: 100;
}
#sidebar.collapsed {
  margin-left: -300px;
  opacity: 0;
  pointer-events: none;
}
#sidebar-header {
  padding: 16px 18px;
  border-bottom: 1px solid #0f3460;
  display: flex;
  align-items: center;
  gap: 10px;
  flex-shrink: 0;
}
#sidebar-header .logo {
  font-size: 1.3rem;
  font-weight: 700;
  color: #e94560;
  letter-spacing: 2px;
  text-transform: uppercase;
}
#sidebar-header .subtitle {
  font-size: .75rem;
  color: #576574;
  margin-top: 2px;
}
#sidebar-header .toggle-btn {
  margin-left: auto;
  background: none;
  border: 1px solid #0f3460;
  color: #c8d6e5;
  width: 32px;
  height: 32px;
  border-radius: 4px;
  cursor: pointer;
  font-size: 1.1rem;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background .2s;
}
#sidebar-header .toggle-btn:hover { background: #0f3460; color: #e94560; }

/* Nav tree */
#nav-tree {
  flex: 1;
  overflow-y: auto;
  padding: 8px 0;
}
.nav-category {
  border-bottom: 1px solid rgba(15,52,96,.3);
}
.nav-category-header {
  display: flex;
  align-items: center;
  padding: 10px 18px;
  cursor: pointer;
  transition: background .2s;
  user-select: none;
  gap: 8px;
}
.nav-category-header:hover { background: rgba(15,52,96,.3); }
.nav-category-header .arrow {
  font-size: .7rem;
  color: #0f3460;
  transition: transform .2s;
  width: 14px;
  text-align: center;
  flex-shrink: 0;
}
.nav-category-header .arrow.open { transform: rotate(90deg); }
.nav-category-header .cat-icon {
  width: 20px;
  text-align: center;
  flex-shrink: 0;
  font-size: .9rem;
}
.nav-category-header .cat-name {
  flex: 1;
  font-size: .85rem;
  font-weight: 600;
  color: #c8d6e5;
  letter-spacing: .5px;
}
.nav-category-header .cat-count {
  font-size: .7rem;
  color: #576574;
  background: rgba(15,52,96,.4);
  padding: 1px 7px;
  border-radius: 8px;
}
.nav-entries {
  max-height: 0;
  overflow: hidden;
  transition: max-height .3s ease;
}
.nav-entries.open { max-height: 2000px; }
.nav-entry {
  display: block;
  padding: 7px 18px 7px 50px;
  font-size: .8rem;
  color: #8395a7;
  cursor: pointer;
  transition: background .2s, color .2s;
  border-left: 2px solid transparent;
}
.nav-entry:hover { background: rgba(15,52,96,.2); color: #c8d6e5; }
.nav-entry.active {
  color: #e94560;
  border-left-color: #e94560;
  background: rgba(233,69,96,.08);
}

/* ========== Main Content ========== */
#main {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-width: 0;
}
#topbar {
  background: #1a1a2e;
  border-bottom: 1px solid #0f3460;
  padding: 12px 24px;
  display: flex;
  align-items: center;
  gap: 16px;
  position: sticky;
  top: 0;
  z-index: 50;
  flex-shrink: 0;
}
#sidebar-toggle {
  background: none;
  border: 1px solid #0f3460;
  color: #c8d6e5;
  width: 36px;
  height: 36px;
  border-radius: 4px;
  cursor: pointer;
  font-size: 1.1rem;
  display: none;
  align-items: center;
  justify-content: center;
  transition: background .2s;
}
#sidebar-toggle:hover { background: #0f3460; }
#search-box {
  flex: 1;
  max-width: 560px;
  position: relative;
}
#search-box input {
  width: 100%;
  padding: 9px 14px 9px 38px;
  background: #16213e;
  border: 1px solid #0f3460;
  border-radius: 6px;
  color: #c8d6e5;
  font-size: .85rem;
  outline: none;
  transition: border-color .2s;
}
#search-box input:focus { border-color: #e94560; }
#search-box input::placeholder { color: #576574; }
#search-box::before {
  content: '\1F50D';
  position: absolute;
  left: 12px;
  top: 50%;
  transform: translateY(-50%);
  font-size: .85rem;
  opacity: .5;
}
#search-results-count {
  font-size: .78rem;
  color: #576574;
  white-space: nowrap;
  flex-shrink: 0;
}

/* Breadcrumb */
#breadcrumb {
  padding: 10px 24px;
  background: #13132b;
  border-bottom: 1px solid rgba(15,52,96,.2);
  font-size: .78rem;
  color: #576574;
  display: flex;
  align-items: center;
  gap: 6px;
  flex-wrap: wrap;
  flex-shrink: 0;
  min-height: 38px;
}
#breadcrumb .sep { color: #0f3460; }
#breadcrumb a {
  color: #0f3460;
  cursor: pointer;
}
#breadcrumb a:hover { color: #e94560; }
#breadcrumb .current { color: #c8d6e5; }

/* Content area */
#content {
  flex: 1;
  padding: 28px 32px;
  overflow-y: auto;
  max-width: 1100px;
}
#content.loading::after {
  content: '加载中...';
  display: block;
  text-align: center;
  padding: 80px 0;
  color: #576574;
  font-size: .9rem;
}

/* ========== Category Page ========== */
.category-header {
  margin-bottom: 24px;
}
.category-header h1 {
  font-size: 1.6rem;
  font-weight: 700;
  color: #e94560;
  margin-bottom: 6px;
}
.category-header p {
  color: #8395a7;
  font-size: .9rem;
}
.category-entry-list {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 14px;
}
.category-entry-card {
  background: #1a1a2e;
  border: 1px solid #0f3460;
  border-radius: 8px;
  padding: 16px 18px;
  cursor: pointer;
  transition: border-color .2s, transform .2s, box-shadow .2s;
}
.category-entry-card:hover {
  border-color: #e94560;
  transform: translateY(-2px);
  box-shadow: 0 4px 20px rgba(233,69,96,.1);
}
.category-entry-card h3 {
  font-size: .95rem;
  color: #c8d6e5;
  margin-bottom: 4px;
}
.category-entry-card .summary {
  font-size: .8rem;
  color: #8395a7;
  line-height: 1.5;
}
.category-entry-card .meta-row {
  display: flex;
  gap: 8px;
  margin-top: 8px;
  flex-wrap: wrap;
}
.category-entry-card .tag {
  font-size: .65rem;
  padding: 2px 8px;
  border-radius: 10px;
  background: rgba(15,52,96,.3);
  color: #576574;
}

/* ========== Detail Page ========== */
.detail-page { max-width: 900px; }
.detail-header {
  margin-bottom: 20px;
  padding-bottom: 16px;
  border-bottom: 1px solid #0f3460;
}
.detail-header h1 {
  font-size: 1.7rem;
  font-weight: 700;
  color: #e94560;
  margin-bottom: 4px;
}
.detail-header .aliases {
  font-size: .82rem;
  color: #576574;
  margin-bottom: 6px;
}
.detail-header .aliases span { margin-right: 10px; }
.detail-header .summary {
  font-size: .95rem;
  color: #8395a7;
  line-height: 1.6;
}
.detail-meta {
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
  margin-bottom: 20px;
  padding: 14px 18px;
  background: #13132b;
  border: 1px solid #0f3460;
  border-radius: 8px;
}
.detail-meta .meta-item {
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.detail-meta .meta-label {
  font-size: .68rem;
  color: #576574;
  text-transform: uppercase;
  letter-spacing: .5px;
}
.detail-meta .meta-value {
  font-size: .82rem;
  color: #c8d6e5;
}
.spoiler-none { color: #2ecc71; }
.spoiler-minor { color: #f39c12; }
.spoiler-major { color: #e67e22; }
.spoiler-final { color: #e94560; font-weight: 700; }
.status-active { color: #2ecc71; }
.status-hidden { color: #8395a7; }
.status-destroyed { color: #e94560; }
.status-unknown { color: #576574; }

.detail-body {
  line-height: 1.8;
  font-size: .92rem;
  color: #c8d6e5;
}
.detail-body p { margin-bottom: 12px; }
.detail-body h2, .detail-body h3 {
  color: #e94560;
  margin: 20px 0 10px;
}

.detail-section {
  margin-top: 24px;
  padding-top: 16px;
  border-top: 1px solid rgba(15,52,96,.3);
}
.detail-section h2 {
  font-size: 1.1rem;
  color: #0f3460;
  margin-bottom: 10px;
}
.detail-section .related-item {
  display: inline-block;
  margin: 3px 6px 3px 0;
  padding: 4px 12px;
  background: rgba(15,52,96,.2);
  border: 1px solid #0f3460;
  border-radius: 14px;
  font-size: .8rem;
  color: #c8d6e5;
  cursor: pointer;
  transition: background .2s, border-color .2s;
}
.detail-section .related-item:hover {
  background: rgba(233,69,96,.1);
  border-color: #e94560;
  color: #e94560;
}

/* ========== Search Results ========== */
.search-results {
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.search-result-item {
  background: #1a1a2e;
  border: 1px solid #0f3460;
  border-radius: 8px;
  padding: 14px 18px;
  cursor: pointer;
  transition: border-color .2s;
}
.search-result-item:hover { border-color: #e94560; }
.search-result-item .result-name {
  font-size: .95rem;
  font-weight: 600;
  color: #e94560;
  margin-bottom: 2px;
}
.search-result-item .result-category {
  font-size: .7rem;
  color: #0f3460;
  margin-bottom: 4px;
}
.search-result-item .result-summary {
  font-size: .82rem;
  color: #8395a7;
  line-height: 1.5;
}
.search-result-item .result-summary mark {
  background: rgba(233,69,96,.25);
  color: #e94560;
  padding: 0 3px;
  border-radius: 2px;
}
.search-empty {
  text-align: center;
  padding: 60px 20px;
  color: #576574;
}
.search-empty .big-icon { font-size: 2.5rem; margin-bottom: 12px; }

/* ========== Responsive ========== */
@media (max-width: 768px) {
  #sidebar {
    position: fixed;
    left: 0;
    top: 0;
    z-index: 200;
    box-shadow: 4px 0 30px rgba(0,0,0,.5);
  }
  #sidebar.collapsed { margin-left: -300px; }
  #sidebar-toggle { display: flex; }
  #content { padding: 20px 16px; }
  .category-entry-list {
    grid-template-columns: 1fr;
  }
  #topbar { padding: 10px 14px; gap: 10px; }
  #breadcrumb { padding: 8px 16px; }
  .detail-meta { flex-direction: column; gap: 8px; }
}
@media (max-width: 480px) {
  html { font-size: 14px; }
  #sidebar { width: 260px; min-width: 260px; }
  #sidebar.collapsed { margin-left: -260px; }
  #content { padding: 16px 12px; }
}

/* ========== Print ========== */
@media print {
  #sidebar, #topbar, #breadcrumb { display: none; }
  body { background: #fff; color: #000; }
  #main { margin: 0; }
  #content { padding: 0; max-width: 100%; }
}
</style>

    "detail": "<p>公元2024年，蓝星全体人类在一瞬间被从原本的世界中抽离，强制投放进了一个名为\"万族考场\"的陌生空间。没有预告，没有选择，数十亿人同时消失，出现在一片广袤而危险的荒野之中。每个人只拥有一座简陋的木屋、一些基础物资和一个被称为\"初始天赋\"的神秘能力。这就是全民穿越的开端。</p><p>这个世界表面上看像是一个全民求生游戏——有个人面板、聊天频道、排行榜、天赋系统、怪物和灾难。人们可以从木屋开始建造、狩猎、探索、升级。但这一切远非看上去那么简单。这个世界的规则由某种高等文明设计，其目的并非娱乐或考验个人能力，而是对整个蓝星文明进行系统性的筛选和评估。</p><p>在这个世界的各个角落，埋藏着大量不属于这个时代的遗迹和残骸。这些旧日遗迹是前六轮人类文明留下的痕迹。是的，蓝星文明的穿越与试炼并非第一次发生。在漫长的岁月中，人类已经被投放进考场六次，每一次都以失败告终，文明被重置，历史被彻底清洗。现在是第七次。</p><p>万族考场中并非只有人类。来自不同星球的无数文明都被投入其中，彼此竞争、掠夺、结盟或毁灭。人类只是万族中的一员，而且是一个刚刚起步的初级文明。在这个残酷的考场中，生存不是游戏，而是最真实的战争。</p>",

    "category": "world-overview",
    "summary": "表面是全民求生游戏（木屋、聊天频道、排行榜、天赋、怪物），实则是高等文明建立的文明筛选系统\"万族考场\"。",
    "detail": "<p>万族考场从表面上来看，具备一切求生游戏的典型特征。每个人从一座木屋开始，需要面对饥饿、寒冷、怪物袭击和自然灾害。区域聊天频道让人们能够交流信息，排行榜激励人们不断变强。天赋系统赋予每个人独特的能力，怪物掉落物和资源点提供升级所需的材料。这一切的设计都极富\"游戏感\"，让人本能地将其理解为一个生存游戏。</p><p>然而，这层游戏外皮仅仅是一个界面。在游戏表象之下，万族考场本质上是由高等文明和旧神势力共同建立并维持的\"文明筛选系统\"。其核心目的不是娱乐、不是惩罚，而是对投放其中的文明进行全方位的评估和筛选。评判标准包括但不限于：文明的整体适应性、个体的进化潜力、社会结构在极端环境下的韧性、文明面对异族时的竞争力和合作能力。</p><p>考场本身有着严密的层级结构。从初级求生区到高维裁决区，每一个阶段都对应着不同的挑战和筛选标准。只有当文明在某一阶段展现出足够的价值，才能进入下一阶段。未能通过的文明将面临重置——记忆被清洗、科技被封锁、母星时间线被回收，一切从头再来。</p><p>万族考场并非专门为蓝星人类设计。无数文明都在这个考场中接受考验，人类只是其中之一。考场中运行的是一套通用的、跨文明的筛选规则，不受任何一个单一文明的意志左右。即使是考场的管理者——那些高维裁判和规则生命——也必须遵守考场的基本规则。</p>",

    "summary": "第七次投放。前六次人类都失败了，文明被重置，历史被清洗。旧日遗迹遍布考场。",
    "detail": "<p>这是蓝星人类第七次被投放进万族考场。在前面的六次循环中，人类文明都未能通过考场的最终考验，以失败告终。每一次失败的结果都是相同的：文明被彻底重置。所有幸存者的记忆被清洗，科技树被封锁，蓝星母星的时间线被回收并重新开始。人类对此浑然不觉，每一次都以为自己第一次来到这个世界。</p><p>前六次失败并非毫无痕迹。万族考场中散布着大量不属于当前时代的遗迹和残骸——倒塌的建筑、锈蚀的机械、残破的武器。这些被称为\"旧日遗迹\"的存在，正是前几轮人类文明留下的遗产。考场的信息清理并不完美，总有一些痕迹残留下来。那些能够解读这些遗迹的人，将有机会窥见真相的一角。</p><p>每一次循环中，人类文明的发展轨迹都有所不同，但最终的结局似乎总是相似的。区别在于失败的阶段和方式——有的在内部竞争中自相残杀而崩溃，有的在与异族战争中全军覆没，有的在高维裁决面前未能通过终极考验。而每一次失败后，考场都会从人类的失败中收集数据，优化下一轮的投放策略和规则设定。</p><p>关于前六次人类文明的具体信息极其稀少，不仅因为记忆被清洗，也因为考场主动掩盖真相。某些高层次的异族文明和考场管理者知道这一历史，但对于绝大多数穿越者来说，他们永远不知道自己正走在一条已经被走过六次的路上。揭开这个真相，是主角在未来面临的重大课题之一。</p>",

    "category": "cosmology",
    "summary": "万族考场由多层组成——初级求生区、区域竞争区、文明接触区、万族边境战场、破碎星环、高维裁决区。",
    "detail": "<p>万族考场并非单一空间，而是一个由多个层级组成的嵌套结构。每一层对应着文明筛选的不同阶段，有着不同的规则、资源和挑战。文明的晋升路径是单向的：通过前一层的考验后，才能进入下一层。每一层的大门既是机遇也是筛选器。</p><p>第一层为<strong>初级求生区</strong>。所有文明起点相同——从一座木屋开始。资源极其贫瘠，规则最为严格，高级装备和能力在此区域受到能级压制的限制。怪物虽然较弱但数量众多，灾难频繁。这一层的作用是筛掉最弱的个体，只有具备基本生存能力的人才能存活。</p><p>第二层为<strong>区域竞争区</strong>。当文明达到一定规模后，初级区域会合并为更大的竞争区。排行榜从个人维度扩展为领地榜、击杀榜、资源榜等多维度竞争体系。核心矛盾从人与自然转向人与人、文明与文明之间的竞争。</p><p>第三层为<strong>文明接触区</strong>。在此区域，不同文明的正式接触成为常态。人类第一次确认自己不是唯一的\"玩家\"。异族的科技水平、社会结构和战斗方式千差万别，人类必须调整自己的认知和策略。</p><p>第四层为<strong>万族边境战场</strong>。不同文明的领地正式接壤，城池、军团、资源点进入全面争夺阶段。这是大规模的文明级战争前线。余火城在此阶段成为蓝星文明的核心势力据点。</p><p>第五层为<strong>破碎星环</strong>。这里是上一轮人类文明最终战败的战场遗迹。大量旧日舰队的残骸漂浮其中，余火号歼星舰的主体就埋藏在这片星环中。这是连接过去与未来的钥匙所在。</p><p>第六层为<strong>高维裁决区</strong>。万族考场真正的管理者、高维裁判和规则生命所在。到了这一层，主角面对的不再是异族领主或文明对手，而是考场规则本身。这是终极考验的舞台。</p>",

    "category": "cosmology",
    "summary": "失败文明被重置记忆、封锁科技、回收母星时间线。考场不允许文明保留失败记忆。",
    "detail": "<p>万族考场最为残酷的规则莫过于文明循环规则。当一个文明在考场中失败——无论是因为内部崩溃、被异族消灭，还是在高维裁决中未能通过——该文明的结局是注定的：完整的文明重置。这不是简单的抹除或者放逐，而是一次系统性的、涵盖精神和物质两个层面的重新初始化。</p><p>重置的第一步是<strong>记忆清洗</strong>。所有幸存者的关于考场的记忆被彻底清除。这不仅仅是删除一段经历，而是从认知层面将整个考场体验抹去。被重置后的人会回到正常的生活轨迹上，对穿越经历毫无印象，即使看到相关证据也会本能地忽略或合理化。清洗的深度直达潜意识层面，确保了没有任何记忆碎片能够自然传承到下一轮。</p><p>重置的第二步是<strong>科技封锁</strong>。在考场中发展出的所有科技、技术、知识体系全部被回收或销毁。任何超越当前文明水平的科技成果都不允许保留。即便有人在重置后残留了某些知识碎片，也会因为没有相应的技术基础和环境支持而无法复现。这保证了每一轮文明的起点都基本一致。</p><p>重置的第三步是<strong>母星时间线回收</strong>。这可能是最令人恐惧的部分——失败文明的母星时间线被整体回收并重新开始。这意味着在蓝星上，所有人回到穿越发生之前的某个时间点，继续原本的生活，仿佛什么都没发生过。前一轮文明的存在、奋斗和毁灭，在历史上不留一丝痕迹。</p><p>考场之所以执行如此严格的文明循环规则，其目的并非单纯的残忍。这是文明筛选系统的基本机制——只有那些能够从零开始、在无先验知识的情况下依然能够通过考验的文明，才被认为具备真正的价值。依赖前一轮的记忆和经验，在考场看来是一种\"不公平优势\"，会扭曲筛选结果的有效性。</p>",

    "name": "高维规则与能级压制",

    "category": "cosmology",
    "summary": "万族考场由高等文明和规则生命共同维持。考场本身有能级压制，高阶装备在低级区域会被限制。",
    "detail": "<p>万族考场的运行并非自然而然，而是由高等文明和被称为\"规则生命\"的神秘存在共同维持的。规则生命并非普通意义上的生物，它们是宇宙规则的具象化存在，本身就是法则的一部分。它们的存在确保了考场的基本规则在所有层级、对所有文明一视同仁地执行。</p><p>考场最基本的物理规则之一是<strong>能级压制系统</strong>。每一个考场层级都有着严格的能量等级上限。任何个体或物品的能量水平如果超过了当前层级的上限，就会被强制压制到该层级允许的范围内。这意味着，即使某人拥有高阶装备或强大能力，在低级区域也无法发挥全部力量。例如，一把星际级武器在初级求生区可能只能发挥出相当于铁剑的威力。</p><p>能级压制的存在有多重意义。首先，它保证了筛选的公平性——高级文明无法凭借装备优势在低级区域碾压初级文明。其次，它防止了低级区域被过于强大的力量破坏，维护了考场空间的稳定性。第三，它迫使文明在每个阶段都必须依靠当前层级所能提供的资源来发展，而非依赖外部输入。</p><p>高维规则还包括对空间和时间的特殊管理。考场中的空间可以折叠、扩展和重组，例如区域合并就是空间规则的体现。时间流逝在某些特殊区域可能与外界不同步。这些高维规则由规则生命直接管理，即使高等文明也无法完全理解或操控。规则生命的意志就是考场中的最高法则，即便是高维裁判也必须遵守。</p>",

    "summary": "蓝星文明第七次投放。绝大多数人类被随机投放至初级求生区，每人一座庇护所、基础物资、一个初始天赋。",
    "detail": "<p>穿越事件发生在一个毫无预兆的瞬间。公元2024年的某一天，蓝星全体人类——无论身处何地、在做什么——同时消失。没有光芒、没有声响、没有过渡。一个人前一秒还在办公室工作、在学校上课、在家中休息，下一秒就发现自己站在一片陌生的荒野中，面前是一座简陋的木屋，脑中涌入大量陌生的信息。</p><p>这是蓝星文明第七次被投放进万族考场。投放范围覆盖了蓝星全部人类，没有任何遗漏。无论国籍、种族、年龄、性别、社会地位，所有人无一例外地被拉入考场。婴儿、老人、病人、孕妇——没有任何豁免权。家庭被瞬间拆散，社会结构在几秒钟内彻底瓦解。</p><p>投放方式是<strong>随机投放</strong>。每个穿越者被单独投放到初级求生区的随机位置。没有两个人被投放在同一个地点。夫妻、亲子、兄弟姐妹在穿越的瞬间被迫分离，各自面对陌生的环境和未知的挑战。这种随机投放是人类社会面临的第一重冲击——人类最基础的社会单元——家庭，在第一秒就被粉碎了。</p><p>穿越后，每个人获得了以下初始配置：一座初级庇护所（木屋）、基础生存物资（包括少量食物、水、工具）、一个随机的初始天赋、个人属性面板、区域聊天频道权限，以及一个区域灾难倒计时。这些初始配置对所有穿越者基本一致，唯一的变量是天赋的随机性。天赋决定了每个人的起点差异——有人可能获得战斗型天赋，有人获得生产型天赋，也有人获得看似毫无用处的天赋。</p>",

    "summary": "每人一座初级庇护所、基础生存物资、随机初始天赋、区域聊天频道、个人面板、区域灾难倒计时。",
    "detail": "<p>每个穿越者在进入考场后立即获得了标准化的开局配置。这套配置对所有文明、所有穿越者基本一致，体现了考场\"公平起点\"的基本原则。配置包括六个核心组成部分，覆盖了生存所需的基本要素。</p><p><strong>初级庇护所（木屋）</strong>：这是每个人在这个世界的第一落脚点。木屋结构简陋，面积约十余平方米，仅能提供基本的遮风挡雨功能。木屋配备了一扇门和一扇窗，墙体为普通木质结构，防御力几乎为零。木屋内有一张简易床铺和一个工作台。每个人可以在木屋的基础上进行扩建、加固和改造。</p><p><strong>基础生存物资</strong>：初始物资包括少量饮用水（约够3天用量）、少量干粮（约够3天用量）、一把基础石制工具（斧头或镐子）、一个简易火种、一块基础布料。这些物资仅够支撑最开始的几天生存，迫使穿越者必须尽快掌握采集、狩猎和建造技能。</p><p><strong>随机初始天赋</strong>：这是开局配置中唯一的变量。天赋是从一个庞大的天赋库中随机抽取的，涵盖战斗、生产、感知、精神、特殊等各个类别。天赋的品质和类型完全随机，造成了穿越者之间最初的差距。天赋可以通过后续的成长和进化来升级。</p><p><strong>个人属性面板</strong>：每个穿越者可以通过意识调出一个半透明的属性面板。面板显示六维基础属性（力量、敏捷、体质、智力、感知、意志）、生命值、体力值、当前状态、已习得技能和天赋信息。面板是穿越者了解自身状态的主要工具。</p><p><strong>区域聊天频道</strong>：每个穿越者自动加入所在区域的聊天频道。频道支持文字交流，初期只能与同区域的穿越者沟通。频道范围会随着区域合并而扩展。</p><p><strong>区域灾难倒计时</strong>：每个人的面板上都有一个倒计时，显示下一次区域灾难的剩余时间。灾难类型包括但不限于兽潮、暴风雪、酸雨、地震、虫灾等。倒计时是区域所有穿越者同步的，意味着灾难是群体性事件。</p>",

    "category": "traversal",
    "summary": "木屋不是安全屋，是考场发放的初级文明锚点。每座木屋记录着穿越者的行为数据、成长潜力、心理变化、杀戮倾向和文明适应性。所有人从一开始就被观察、评分、筛选。",
    "detail": "<p>在穿越初期，绝大多数人将木屋视为自己的安全屋和避难所。他们加固它、扩建它、在里面储存物资、在遭遇危险时躲进它。这是人之常情——在陌生的世界中，一个属于自己的空间是最基本的安全需求。但木屋的真正功能远非如此简单。</p><p>木屋的真正身份是考场发放的<strong>初级文明锚点</strong>。\"锚点\"的含义比\"庇护所\"深刻得多。每一座木屋都是考场监测系统的一部分，是一个嵌入到穿越者生存环境中的数据采集终端。从穿越者建造木屋的第一刻起，木屋就开始持续记录其主人的一切行为和状态。</p><p>木屋记录的数据维度极其广泛。包括但不限于：穿越者的日常行为模式（何时睡觉、何时工作、活动范围）、成长潜力评估（升级速度、技能掌握效率、天赋开发程度）、心理状态变化（应激反应、孤独感表现、合作意愿）、杀戮倾向（对怪物和人类的攻击性、杀戮频率和方式）以及文明适应性（社会合作能力、资源共享倾向、领导力表现）。</p><p>所有这些数据被实时上传至考场的中央评估系统。每一座木屋都是一个评分终端，持续不断地对其主人进行多维度评分。这意味着，从穿越的第一秒开始，每个人都在被观察、被评估、被筛选。没有人是自由的观察者，每个人都是被观察的实验对象。所谓的安全屋，不过是一个精巧设计的监视器。</p><p>木屋的这一真相如果被广泛知晓，将在穿越者中引发巨大的信任危机。因为这意味着，任何建在木屋内的秘密据点都不安全，任何在木屋中的谈话都可能被记录和分析。主角在成长过程中逐渐意识到这一点，并因此对木屋的使用方式做出了与普通穿越者截然不同的判断。</p>",

  {
    "id": "chat-and-ranking-truth",
    "name": "聊天频道和排行榜的真相",

    ],
    "category": "traversal",
    "summary": "聊天频道是社会压力测试工具，观察人类在极端环境下的社会行为。排行榜是诱饵，刺激竞争、暴露强者、引发掠夺。主角前期必须隐藏身份。",
    "detail": "<p>区域聊天频道和排行榜是穿越者最早接触到的\"系统功能\"。它们看起来是游戏的标准配置——聊天频道用于交流信息，排行榜用于展示成就。但实际上，这两者的存在目的远比表面功能复杂得多，它们是考场精心设计的社会工程工具。</p><p><strong>聊天频道</strong>的真实功能是社会压力测试工具。考场通过分析聊天频道中的信息流动、舆论形成、群体情绪变化、合作与冲突的产生机制，来评估人类文明的社会适应性。频道中谁在传播恐慌、谁在组织救援、谁在散布谣言、谁在建立信任网络——所有这些都被记录和分析。聊天频道还是一个天然的信息不对称战场：少部分人能够从海量信息中提取有价值的内容，而大部分人则被信息淹没，成为舆论的被动接收者。</p><p><strong>排行榜</strong>则是考场设置的战略诱饵。排行榜清晰地展示谁是最强者——谁的等级最高、谁击杀的怪物最多、谁拥有的资源最丰富。这看似是在激励人们努力变强，实际上是在将强者暴露在所有人的视线中。在初级阶段，这会导致强者被过度关注和仰慕；但随着竞争加剧，排行榜上的名字会成为掠夺者的首要目标。聪明的穿越者会意识到，过早登上排行榜意味着将自己置于危险之中。</p><p>对主角而言，在前期隐藏身份是至关重要的生存策略。公开暴露实力——无论通过排行榜还是聊天频道——都会引发不必要的关注和竞争。主角和其他少数意识到真相的人选择低调发育，利用信息优势而非公开竞争来获取资源。这种\"暗处发育\"策略是主角能够快速超越同阶段穿越者的关键原因之一。</p><p>此外，聊天频道和排行榜共同构成了一个完整的社会模拟环境。通过观察频道中的信息流动和排行榜的变化，考场能够分析出人类社会的诸多特征：信息传播效率、集体行动能力、领袖涌现机制、社会分层形成速度等。这些数据对于考场评估人类文明的成熟度和潜力具有重要意义。</p>",

  {
    "id": "arena-overview",
    "name": "万族考场概述",
    "aliases": [

    "category": "arena",
    "summary": "由强大文明、旧神势力、高维裁判共同维持的文明筛选系统。表面是公平试炼，实则是文明筛选、资源掠夺和战争预备机制。",
    "detail": "<p>万族考场是整个故事世界的核心舞台。它不是自然形成的空间，而是由多个强大文明、旧神势力以及高维裁判共同建立的超大型文明筛选系统。其存在的形式跨越了普通维度的界限，是一个在多元宇宙尺度上运行的巨型设施。考场的覆盖范围和能量规模超过了任何单一文明的认知极限。</p><p>考场的官方宣称目的是\"公平试炼\"——为不同文明提供一个平等的竞争平台，让各个文明在相同起跑线上展示自己的潜力和价值。通过试炼的文明将获得某种形式的奖励或晋升，失败的文明则被淘汰。这个表面的叙事听起来合理，甚至带有某种积极色彩。</p><p>然而，考场的真实目的远比表面复杂，至少包含三重核心功能。第一是<strong>文明筛选</strong>——通过多层级的考核识别出真正具有潜力的文明和个体；第二是<strong>资源掠夺</strong>——失败文明的资源和技术被回收并重新分配，胜利者可以掠夺失败者的积累；第三是<strong>战争预备</strong>——考场本身就是一个巨大的战争模拟器，培养和筛选出最优秀的战士和指挥官，为更高层面的宇宙战争做准备。</p><p>考场的运行由高维裁判和规则生命共同监督。高维裁判来自不同的高等文明，他们负责考场日常运行的管理和裁决。规则生命则是考场底层规则的具象化存在，确保考场的基本法则不被任何力量（包括高维裁判本身）违反。这种双重的管理结构保证了考场能够长期稳定运行。</p><p>万族考场并非一成不变。它会根据被测试文明的表现和考场内部的宏观态势进行自我调整。规则可以修改、区域可以合并、难度可以动态调节。考场本身具备某种程度的智能或自适应能力，能够针对不同文明的特点设计最有效的筛选方案。</p>",

  {
    "id": "arena-phase-1",
    "name": "第一阶段·初级求生区",
    "aliases": [

    ],
    "category": "arena",
    "summary": "所有文明从木屋开始。资源贫瘠、规则严格、怪物较弱但数量多、灾难频繁。作用是筛掉最弱个体。",
    "detail": "<p>初级求生区是万族考场的第一层级，也是所有穿越者的起点。这一阶段的特征是极端的资源匮乏和频繁的生存威胁。每个人从一座简陋的木屋和基础物资开始，必须依靠自己和同区域的其他人才能在不断出现的生存危机中存活下去。这是最残酷但也最公平的阶段——所有人都在同一条起跑线上。</p><p>资源方面，初级求生区几乎没有任何现成的资源供给。食物和水需要自己寻找和采集，建筑材料需要自己去砍伐和开采，工具和武器需要自己制作。森林中的野果、溪流中的清水、矿洞中的矿石——一切都需要穿越者用自己的双手去获取。资源的稀缺性决定了这一阶段的淘汰率极高。</p><p>怪物方面，初级求生区的怪物相对较弱——野狼、变异蜘蛛、哥布林等低阶生物——但数量庞大且出没频繁。夜间是怪物活动的高峰期，缺乏防御设施的穿越者往往在最初的几个夜晚就面临生死考验。怪物的袭击不仅是对个人战斗力的检验，也是对心理承受能力的极限测试。</p><p>灾难事件是初级求生区的另一个核心特征。区域灾难以倒计时的形式通知所有穿越者，但灾难的具体类型和强度直到发生前夕才揭晓。暴风雪、酸雨、小型兽潮、地震——每一种灾难都要求穿越者具备不同的应对能力。灾难的设计目的是制造群体性的生存压力，迫使人类在极端条件下进行合作或竞争。</p><p>初级求生区的核心筛选目标很简单——淘汰那些无法独立生存的最弱个体。在这个阶段，个人的生存能力是决定性因素。无法快速适应环境、无法掌握基本生存技能、无法克服心理恐惧的人将在最初的几周内被淘汰。这一阶段不考察团队合作或领导力——能活下来，就是第一关的及格线。</p>",

  {

    "name": "第二阶段·区域竞争区",
    "aliases": [

    "category": "arena",
    "summary": "初级区域合并。排行榜从个人扩展为领地榜、击杀榜、资源榜。核心矛盾是人类内部竞争。",
    "detail": "<p>当穿越者数量在初级求生区中减少到一定比例，或者某个区域的发展水平达到特定阈值时，初级区域会开始合并。多个相邻的小区域融合为更大的竞争区，原本分布在各个小区域中的穿越者被迫聚集到一起。区域合并可能是考场最巧妙的设计之一——它让人类从\"各自为战\"的状态转向\"群体竞争\"的状态，将人与人之间的矛盾推上前台。</p><p>随着区域合并，排行榜系统也完成了升级。初级阶段只有简单的个人等级榜。进入竞争区后，排行榜扩展为多个维度：领地榜（谁拥有最大的地盘）、击杀榜（谁杀死最多的怪物和敌人）、资源榜（谁积累了最丰富的物资）。多维度排行榜的出现，意味着成功不再只有一个标准——每个穿越者需要找到适合自己的发展方向。</p><p>区域合并带来的最核心变化是：人类内部竞争成为主要矛盾。当资源仍然有限但人口密度增大时，人与人之间的摩擦不可避免。领地争夺、资源纠纷、团队分化、势力形成——人类社会在极端环境中的自然演化开始加速。一些人选择合作建立营地，一些人选择独行侠路线，还有一些人选择掠夺他人来壮大自己。</p><p>这一阶段的危险不仅来自明面上的竞争，更来自信息不对称和信任危机。谁值得信任？谁不值得？谁在隐藏实力？谁在策划掠夺？聊天频道中的每一句话都可能带有目的性。排行榜上的每一个名字都可能成为目标。这一阶段真正考验的不是生存技能，而是社会智慧和战略判断力。</p><p>区域竞争区的筛选标准开始从\"个人生存能力\"转向\"群体适应能力\"。能够组织团队、建立信任网络、有效分配资源的人开始展现出比单纯个体强者更高的价值。与此同时，那些无法融入任何群体、或者在群体中制造分裂的人，逐渐被边缘化。</p>",

  {
    "id": "arena-phase-3",
    "name": "第三阶段·文明接触区",
    "aliases": [
      "接触区",

    "category": "arena",
    "summary": "异族正式出现。人类第一次知道不是唯一玩家。核心矛盾是人类能否从内部竞争转向文明合作。",
    "detail": "<p>文明接触区是万族考场中一个关键的转折点。在此之前，人类一直以为自己是这场\"游戏\"唯一的参与者。直到异族正式出现在视野中，人类才意识到——这个考场中有着无数来自不同星球的文明，人类只是其中之一，而且是排名靠后的新手文明。</p><p>异族的出现对人类社会产生了巨大的心理冲击。首先是震惊和难以置信——原来在木屋和荒野之外，还有着其他智慧文明的存在。其次是恐惧——这些异族看起来比人类更强大、更先进、更适应考场环境。然后是一种深层次的认知颠覆——\"我们不是特殊的\"，人类长期以来建立的中心主义认知在这一刻崩塌了。</p><p>文明接触区的核心矛盾是：人类能否从内部竞争转向文明合作。在区域竞争区中，人类之间的内斗已经形成了一定的惯性——仇恨、不信任、利益冲突都已经根深蒂固。面对共同的外族威胁时，人类是否能够放下内部矛盾、团结一致？这是一个巨大的考验。考场设计这一阶段的目的，正是观察不同文明在面对\"他者\"时的集体反应。</p><p>在文明接触区中，人类与异族的互动形式多种多样。有的异族抱有敌意，试图消灭或奴役人类；有的异族持中立态度，愿意进行交易和交流；还有的异族展现出善意，尝试与人类建立联盟。如何识别不同类型的异族、如何制定合适的应对策略，是这一阶段人类面临的核心挑战。</p><p>这一阶段也是对人类社会结构的真正检验。那些在区域竞争中已经建立起稳固组织和领导体系的群体，在文明接触中展现出明显的优势。而仍然处于混乱和分裂状态的群体，则在异族面前暴露出致命的弱点。能够在这一阶段成功实现内部团结并建立跨文明合作关系的人类势力，才有资格进入下一阶段。</p>",

  {
    "id": "arena-phase-4",
    "name": "第四阶段·万族边境战场",
    "aliases": [
      "边境战场",
      "文明战争"
    ],
    "category": "arena",
    "summary": "不同文明领地正式接壤。城池、军团、资源点全面争夺。余火城成为蓝星文明核心势力。",
    "detail": "<p>万族边境战场是文明竞争从\"接触\"升级为\"全面对抗\"的阶段。在这一层，不同文明的领地正式接壤，边界清晰可见。城池建筑、军事编制、资源开采体系都已经成型。这一阶段不再是个人或小队的战斗，而是文明规模的战争。每一场冲突都可能涉及数千乃至数万人的大规模会战。</p><p>城池成为这一阶段的核心单位。每个文明在这一层都有自己的据点城池——既是军事堡垒，也是生产和贸易中心。城池的建设水平、防御能力和资源储量直接决定了该文明在边境战场上的竞争力。人类在这一阶段建立的核心城池是余火城，它逐渐成长为蓝星文明在这一层的最大势力和最后堡垒。</p><p>全面的资源争夺是边境战场的日常。各个文明之间围绕矿脉、能源点、战略要地展开持续的争夺战。资源点的控制权变化频繁，小规模冲突几乎每天都在发生。边境战场不仅考验文明的军事实力，更考验后勤保障、情报网络和外交手段的综合能力。</p><p>万族边境战场也是各种文明军事思想和技术的大熔炉。人类的战术、异族的战法、混合编队、特种作战——各种战争形式在这一层得到充分展现。那些在之前阶段积累了丰富战斗经验和军事组织能力的文明，在这一阶段开始展现出压倒性优势。</p><p>这一阶段中，主角和余火城所代表的蓝星文明势力面临着巨大的外部压力。多个异族文明将人类视为弱小的猎物，试图瓜分人类的领地和资源。余火城必须在多线作战的压力下生存并反击，同时继续挖掘更深层次的真相——关于上一轮文明的遗迹，以及更高层级考场的秘密。</p>",

    "detail": "<p>破碎星环是万族考场中一个极其特殊的区域。它不属于常规的文明筛选层级，而是前一轮人类文明最终战败的战场遗迹。这片星环漂浮在考场的边缘地带，处于常规层级的夹缝之中。它既不是考核区域，也不是生存区域——它是一个巨大的坟场。</p><p>星环中漂浮着大量旧日舰队的残骸——破碎的船体、扭曲的装甲板、熄灭的反应堆。这些残骸属于上一轮人类文明的星际舰队。在前一轮文明的末期，人类已经发展到了星际文明的水平，建造了庞大的太空舰队。但这支舰队在破碎星环遭遇了毁灭性的打击，全军覆没。舰队残骸上的战斗痕迹至今清晰可见。</p><p>在密密麻麻的残骸之中，埋藏着这一区域最珍贵的遗物——<strong>余火号歼星舰</strong>的主体。余火号是上一轮人类文明最强大的战舰，也是那场终极战役中最后一艘沉没的旗舰。它的主体结构大部分完好，核心系统（包括反应堆、引擎和主控AI）仍然处于休眠但可唤醒的状态。余火号是连接过去与未来的桥梁，是前一轮文明留给第七次人类的遗产。</p><p>破碎星环蕴含着巨大的危险。除了漂浮的残骸带来的物理威胁外，星环中还残留着旧日战场的能量余波和某种程度的空间不稳定。某些区域的物理规则与外界不同，某些残骸中还封存着上一轮战争的危险武器和实验生物。探索破碎星环需要极高的技术水平和战斗能力。</p><p>但破碎星环也蕴藏着巨大的机遇。旧日舰队的残骸中包含了上一轮人类文明的全部科技积累——从材料科学到能源技术，从武器系统到空间航行技术。谁能系统性地发掘和解读这些遗产，谁就能在一夜之间跨越数千年的科技差距。余火号歼星舰的发掘和修复，将是主角和人类文明命运的关键转折点。</p>",

    "summary": "万族考场真正管理者、高维裁判、规则生命所在。后期主角面对的不再是异族领主，而是考场规则本身。",
    "detail": "<p>高维裁决区是万族考场的最高层级，是考场真正管理者和最高意志所在的地方。这里不是普通的物理空间，而是一个半概念化的维度区域。常规的物理规则在这里不再完全适用，空间和时间的概念变得更加灵活和抽象。能够到达这一层级的文明和个体，已经通过了之前所有层级的筛选和考验。</p><p>高维裁决区中存在着三类核心存在。第一类是<strong>高维裁判</strong>，他们来自不同的高等文明，被选拔出来担任考场的日常管理和裁决工作。高维裁判拥有在考场规则范围内的执法权，负责处理文明间的重大纠纷、审核晋升申请、执行重置程序等。他们是考场中的\"管理者阶层\"。</p><p>第二类是<strong>规则生命</strong>，它们是宇宙规则本身的具象化存在。规则生命没有固定的形态，没有独立的意识——它们本身就是法则。规则生命的存在确保了考场的基本规则不可违反。即使高维裁判也必须遵守考场底层规则，而规则生命正是这些底层规则的执行者。</p><p>第三类是考场背后真正的<strong>建立者势力</strong>。万族考场并非凭空出现，它由某些极其强大的宇宙势力共同建立。这些建立者已经超越了常规文明的概念范畴，达到了近乎神级的存在层次。建立者平时不直接介入考场的运行，但在某些重大关头，他们的意志和利益会通过规则和高维裁判体现出来。</p><p>对于主角而言，高维裁决区意味着终极考验的来临。到了这一阶段，他所面对的不再是异族领主、敌对文明或自然挑战，而是考场规则本身。他需要质疑规则、挑战规则，甚至在必要时候打破规则。万族考场作为一个文明筛选系统的真相、前六轮人类文明的命运、考场建立者的真实目的——所有这些终极问题的答案都藏在高维裁决区的深处。</p><p>高维裁决区的存在本身就揭示了考场最深层的逻辑：万族考场不是一个单纯的\"游戏\"或\"试炼\"，它是一个有着明确目的和利益诉求的超级工程。理解这个目的、在这个目的框架下找到人类文明的生存之道，或者最终摆脱这个框架——这就是高维裁决区对主角提出的终极课题。</p>",

    "summary": "家庭被拆散、国家失效、财富变废纸、社会地位重新洗牌。但军人的组织能力、医生的技术、工程师的技能仍然有价值。",
    "detail": "<p>全民穿越对蓝星人类社会造成的冲击是全方位的、毁灭性的。在穿越发生的那一刻，人类数千年积累的社会结构、文化传统、经济体系和权力格局在一瞬间被彻底粉碎。无论你是亿万富翁还是流浪汉，无论你是国家元首还是普通职员，穿越之后所有人都回到了同一条起跑线上——一座木屋、一点物资、一个随机天赋。</p><p><strong>家庭的瓦解</strong>是最沉重的打击。随机投放机制确保没有两个人被投放到同一地点，这意味着每一对夫妻、每一对亲子、每一对兄弟姐妹在穿越的瞬间被迫分离。穿越者在最初的几天里最强烈的情绪不是恐惧，而是对失踪亲人的焦虑和思念。聊天频道中最常见的信息不是关于生存技巧的询问，而是寻找家人的呼喊——\"有人见到我妻子吗？\"\"我儿子叫XXX，有人知道他在哪个区域吗？\"</p><p><strong>国家和政府体系的崩溃</strong>是另一个致命打击。军队找不到指挥官，政府官员联系不到上级，法律执行系统完全瘫痪。边境消失了、国土概念变得毫无意义——因为没有人知道自己的地理位置相对于其他穿越者在哪里。国家的概念在穿越后的几小时内就从有效组织形式变成了虚无缥缈的集体记忆。</p><p><strong>财富和地位的归零</strong>让所有穿越者经历了最彻底的社会洗牌。银行存款变成了无意义的数字，房产证成了一张废纸，股票、债券、奢侈品——一切在旧世界中代表财富和地位的东西都失去了价值。旧世界的社会等级被彻底抹平，一个全新的、由天赋、能力和运气决定的社会秩序正在形成。</p><p>然而，并非所有旧世界的能力都失去了价值。那些在旧世界中掌握实用技能的人在新世界中展现出明显的优势。<strong>军人</strong>的纪律性和组织能力让他们更容易在混乱中建立秩序；<strong>医生</strong>的医疗知识在所有人都会受伤的世界中变得至关重要；<strong>工程师</strong>和<strong>工匠</strong>的技能在需要建造和维修的环境中价值倍增。<strong>农民</strong>、<strong>猎手</strong>、<strong>厨师</strong>——所有掌握实际生产技能的人都在新世界中获得了前所未有的社会地位。相反，那些只擅长金融操作、行政管理或社交媒体运营的人发现自己的技能几乎毫无用处。</p>",

    "id": "blue-star-social-restructure",
    "name": "人类社会重组",
    "aliases": [

    "category": "blue-star-humans",
    "summary": "全民穿越不是简单换地图，而是整个人类社会被拆碎后重新洗牌。",
    "detail": "<p>全民穿越所造成的社会变革，其深度和广度远远超过了人类历史上任何一次革命或灾难。这不是简单的\"换地图\"——把一群人从一个地方搬到另一个地方。这是人类社会的一次彻底解构和重组，所有旧有的社会纽带、权力结构、价值体系都被拆成了碎片，然后在全新的环境和规则下重新组装。</p><p>社会重组的第一个标志是<strong>生存优先原则</strong>取代了一切旧有的社会规范。在穿越后的世界中，一个人的价值首先由他的生存能力决定——他能养活自己吗？他能保护自己吗？他能为群体提供什么贡献？那些在旧世界中备受尊敬的职业（如金融分析师、市场营销专家、社交媒体运营）在新世界中失去了所有社会地位。而体力劳动者、工匠、农民、医生、军人——这些在旧世界中地位一般的职业——现在成为了社会的中坚力量。</p><p>社会重组的第二个标志是<strong>权力的重新分配</strong>。旧世界的权力体系在一瞬间瓦解，新的权力结构从零开始形成。新的领导者不是由选举或继承产生的，而是通过实际行动证明自己的能力——谁能组织狩猎队、谁能建立防御工事、谁能解决团队内部的矛盾。领导力变成了一个极其务实的概念：你能解决的问题越多，你能保护的人越多，你的领导地位就越稳固。</p><p>社会重组的第三个标志是<strong>新的经济体系</strong>的形成。货币失去了意义，以物易物成为最初的交易方式。但随着社会的发展，某些具有稳定价值的物品（如稀有材料、武器装备、天赋升级道具）开始承担货币的职能。交易网络从最开始的个人对个人，发展到营地对营地，最终到城池对城池的规模。</p><p>社会重组的第四个标志是<strong>文化和价值观的演变</strong>。在生死存亡的极端压力下，人类的文化和价值观发生了深刻的变化。个人主义在生存压力面前让位于集体主义（至少在初期如此）。注重实用和效率的价值观取代了注重形式和仪式的价值观。对力量和能力的崇拜取代了对财富和血统的崇拜。这一切变化都是环境驱动的自然演化，而非任何人为设计的结果。</p><p>然而，人类社会重组并非一帆风顺。旧世界的社会惯性依然存在——偏见、歧视、不信任不会因为穿越而自动消失。来自不同国家、不同文化背景的人之间仍然存在摩擦。而且随着生存压力的缓解，旧世界的一些负面社会现象——阶层固化、权力滥用、剥削——也开始在新的社会结构中重新出现。人类社会重组的过程，本身就是文明筛选的一部分：考场在观察人类是否有能力在废墟上建立一个更公平、更有韧性、更具适应性的新文明。</p>",

    "category": "world-overview",
    "importance": "S",
    "summary": "蓝星全人类被强制拉入万族考场，从木屋开始参加文明试炼；所有人都以为这是求生游戏，只有主角林烬通过文明回收系统发现，这片试炼场埋葬着前六轮人类文明失败后的残骸。",
    "detail": "本书表层类型：全民穿越、全民求生、领地建设、万族争霸、系统升级、科技修复。\n\n本书深层类型：文明遗产继承、文明重启、历史追索、规则反抗、失败文明复仇、人类第七次自救。\n\n## 世界表层\n在普通蓝星穿越者眼中，这是一个残酷但规则清晰的求生游戏：初始木屋、个人面板、初始天赋、聊天频道、交易市场、排行榜、怪物刷新、资源采集、灾难倒计时、领地升级、区域合并、异族入侵。他们以为只要能活下去、升级木屋、打怪上榜，总有一天就能通关回到蓝星。这种认知是错误的——但在前期足够合理也足够迷惑人。\n\n## 世界深层真相\n这个世界不是游戏。全民穿越本质上是蓝星文明被强制纳入万族考场。万族考场不是善意试炼，而是由高等文明、规则生命、高维裁判共同维护的文明筛选体系。其真实目标：筛选有潜力的文明、淘汰无法适应的文明、收割失败文明遗产、奴役通过试炼但无力反抗的文明、防止威胁考场秩序的新文明崛起、维持高等文明对低等文明的长期统治。所谓通关不等于自由，所谓胜利不等于回家。\n\n## 蓝星人类的特殊性\n这是第七次投放。前六轮人类文明都曾进入万族考场，全部失败。每次失败后考场启动文明重置：清洗幸存者记忆、抹除超凡和科技痕迹、封存母星蓝星、收割可用遗产、抹掉历史记录，等待下一轮投放。\n\n## 世界核心矛盾（五层）\n第一层：人与环境（寒冷、饥饿、缺水、怪物、灾难）\n第二层：人与人（资源争夺、掠夺者、道德绑架、排行榜嫉妒）\n第三层：人与异族（狼血文明、虫巢文明、万族边境战场）\n第四层：人与历史（前六轮人类为什么失败、谁背叛了人类）\n第五层：人与规则（通关骗局、高维裁判、文明重置机制）\n\n## 全书核心母题\n别人看到木屋，主角看到文明锚点。别人看到废铁，主角看到舰体装甲。别人看到灾难，主角看到资源涨价机会。别人想通关，主角发现通关是奴役协议。别人造木屋，主角修歼星舰。\n\n## 真相揭露节奏\n第一卷：发现旧日遗迹，\"余火号\"首次出现，\"第七轮人类\"概念出现。\n第二卷：旧日前哨站，文明回收系统与旧日人类有关。\n第三卷：蓝星不是唯一文明，异族熟悉考场，前几轮失败不是传说。\n第四卷：余火城继承旧日战争体系，考场开始察觉主角异常。\n第五卷：第六轮人类曾接近攻入考场核心，通关不代表自由。\n第六卷：全部真相——万族考场是文明奴役系统，林烬的终极任务是终止人类文明重置。\n\n## 终局方向\n个人层面：林烬从普通求生者成长为蓝星文明统帅。\n文明层面：蓝星人类恢复前六轮被清洗的历史，继承旧日遗产。\n规则层面：修复余火号，破解考场规则，切断文明重置机制。",

    "detail": "## 表层设定\n所有蓝星人类被投放到试炼场，从木屋开始求生，通过灾难、怪物、排行榜、领地升级逐步变强。\n\n## 深层真相\n所谓试炼并不公平。考场通过灾难和竞争筛选文明，失败文明会被重置、记忆清洗、遗产收割。所谓通关也不是自由，而是成为考场体系下的附庸文明。\n\n## 剧情作用\n它是全书最大的反派结构。前期作为背景规则存在，中期制造异族战争，后期成为主角必须掀翻的对象。\n\n## 限制条件\n前期不能一次性解释全部真相，只能通过废墟、档案、异族口供、燧明AI碎片逐步揭露。",

    "detail": "## 重置流程\n清洗幸存者记忆 → 抹除超凡和科技痕迹 → 封存母星蓝星 → 收割可用遗产 → 抹掉历史记录 → 将蓝星放回普通文明发展轨道 → 等待下一轮投放周期。\n\n## 重置目的\n考场不允许文明保留失败记忆，因为记忆和经验积累会破坏筛选的\"公平性\"。只有从零开始仍能通过考验的文明才被认为有价值。\n\n## 剧情作用\n解释为什么现代人类不知道前六轮历史，解释为什么考场中散布着旧日遗迹，解释主角最终目标——阻止第七次重置。",

    "detail": "## 六次失败\n第一次：败给环境——未能适应初级求生区的极端条件。\n第二次：败给内斗——在内部分裂和自相残杀中崩溃。\n第三次：败给异族——在与异族文明战争中全军覆没。\n第四次：败给规则——被考场规则本身困死。\n第五次：败给背叛——内部投降派出卖文明坐标。\n第六次：败给高维干预——接近攻入考场核心时被高维裁判直接干预。\n\n第六轮是离成功最近的一次——人类已经发展到星际文明水平，建造了余火舰队，但在最终战役中失败。\n\n## 遗产留存\n每一轮人类都在考场中留下了遗迹和残骸。第六轮留下的遗产最为丰富，包括余火号歼星舰、燧明AI、各类前哨站和武器系统。",

    "category": "protagonist",
    "summary": "蓝星普通青年穿越万族考场，觉醒\"文明回收系统\"，从黑松林区的无名求生者一步步成长为反抗万族考场规则的领袖。",
    "detail": "<p>林烬，24岁，穿越前为蓝星的一名机械维修工兼策略游戏资深玩家。他没有显赫的背景，也没有超凡的体能，唯一出众的是在无数策略游戏中锤炼出的资源规划能力和战术判断力。在万族考场降临、蓝星被拖入残酷的种族淘汰游戏时，林烬与其他七万蓝星人一同穿越，出现在黑松林区的废墟之中。</p><p>他的天赋面板上显示着一个令所有人迷惑的条目——\"文明回收系统\"，评级为\"未知级\"。这个评级在万族考场的记录中从未出现过，既不被认为是垃圾天赋，也不被认可为高阶天赋。事实上，这个所谓的\"天赋\"并非考场赋予的能力，而是上一轮人类文明灭亡前留下的最后火种——\"余火协议\"，它伪装成考场天赋的格式，潜入林烬的面板之中。</p><p>林烬的性格可以用四个词概括：冷静、谨慎、现实、狠辣。他不圣母，不冲动，在生死存亡的考场中始终保持清醒的头脑。他会在救人与保命之间做出理性的取舍，会对敌人毫不留情地斩草除根。但这种冷酷并非天生——穿越前的他是个普通但善良的年轻人，是考场的残酷环境逼迫他一层层剥下了不必要的柔软。然而，他始终保留了一条底线：不对蓝星同胞主动下手。</p><p>他的成长路线是一条从蝼蚁到巨兽的攀升之路：最初只是个在黑松林区挣扎求生的普通穿越者，靠着回收废墟材料艰难存活；在度过初期阶段后，他开始利用回收系统修复模块，逐步建立起自己的领地，成为隐藏的一方大佬；当区域格局稳定后，他整合周边幸存者，成为黑松林区域公认的领袖；随后他建立余火城，以此为基地发展科技与军事力量；随着蓝星文明的整体崛起，他成为蓝星文明统帅，带领同胞应对异族的压迫；在深入探索旧日文明的遗迹后，他继承了失败六次的人类文明遗产，成为旧日文明继承者；最终，他的目光从生存转向反抗，成为万族考场规则的挑战者。</p><p>林烬的核心矛盾贯穿始终：他究竟只是为了自己活下去，还是应该继承那失败六次的人类文明使命？文明回收系统（余火协议）承载着上一轮人类文明的希望——修复星舰、反攻考场、打破万族压迫的循环。但这意味着他要承担远超一个普通人生存需求的重量。每一次选择，都在\"明哲保身\"与\"负重前行\"之间撕扯。当裁决者零号发现他身上的旧日协议痕迹并试图抹杀他时，他被迫从暗处走到台前，从被动求生转向主动反抗。</p><p>在人际关系上，林烬与苏清黎形成了互补的合作关系——他的大局观与她的执行力结合，构成了余火城军事指挥的核心。他与燧明AI的关系更像是文明继承者与文明守护者的传承纽带。而他与赵启明、赫连獠、裁决者零号等对手的对抗，则分别代表了他在不同阶段面临的挑战：人类内部的掠夺、异族的野蛮侵略、以及考场规则本身的降维打击。</p>",

  {
    "id": "protagonist-recycle-system",
    "name": "文明回收系统",
    "aliases": [
      "余火协议",
      "旧日人类文明第六轮余火延续协议",
      "回收系统",
      "未知级天赋"
    ],
    "category": "protagonist",
    "summary": "全名\"旧日人类文明第六轮余火延续协议\"，是第六轮人类文明灭亡前倾尽最后资源打造的火种程序。它伪装成考场天赋格式潜入林烬面板，以回收废墟、修复模块、重建文明为核心功能，是承载六次人类文明失败教训的终极辅助系统。",
    "detail": "<p><strong>系统真名：</strong>旧日人类文明第六轮余火延续协议（简称\"余火协议\"）</p><p><strong>系统别名：</strong>文明回收系统（对考场伪装后的显示名称）</p><p><strong>系统伪装：</strong>考场天赋面板中的\"未知级\"天赋条目</p><hr><h3>一、系统定位</h3><p>文明回收系统不是万族考场赋予林烬的\"天赋\"，而是第六轮人类文明在彻底灭亡前夜，由残存科学家与最高AI燧明共同制定的\"余火计划\"的最终产物。这个计划的本质是：既然无法阻止第六轮文明的覆灭，那就为第七轮留下一个火种。</p><p>系统被设计为可以伪装成考场天赋格式的程序，嵌入第七轮人类穿越者的天赋面板中，从而避开考场的初始审查。它不是一个\"万能金手指\"，而是一份沉重的文明遗产——它不会替林烬战斗，不会给他无限资源，但它给了他一条路：从废墟中识别出旧日文明的碎片，逐步恢复人类曾经拥有但已经失去的一切。</p><hr><h3>二、系统继承者选择条件</h3><p>余火协议并非随机选择绑定者，而是经过严格筛选。林烬被选中的原因包括：</p><ol><li><strong>坐标匹配：</strong>林烬被投放的位置恰好是第六轮文明火种协议预设的\"继承者投放坐标区\"。考场随机投放时他正好落在该区域，是概率与设计的交汇。</li><li><strong>精神频率兼容：</strong>余火协议需要与继承者的精神频率建立链接。林烬的神经信号特征与旧日人类的基础频段高度吻合，适配度达到91.3%。</li><li><strong>工作经验相关：</strong>林烬穿越前的机械维修经验使他对旧日文明的工程类遗物具有天然的感知和理解基础，降低了系统的\"认知门槛\"。</li><li><strong>性格筛选：</strong>余火协议在激活前对林烬进行了潜意识层面的性格扫描，评估标准包括：抗压能力、决策理性、道德底线和对未知事物的接受度。林烬的评估结果为\"可适配\"。</li><li><strong>意外因素：</strong>林烬在穿越后第一小时内无意识地触碰了一块旧日文明舰体碎片（余火号装甲碎片），该碎片中储存的微量权限代码触发了余火协议的紧急激活程序。如果他没有在特定时间内触碰碎片，协议可能推迟激活甚至永久休眠。</li></ol><hr><h3>三、系统核心能力（六项）</h3><p><strong>1. 识别：</strong>系统可以扫描林烬视野范围内的物体，识别出其中包含的旧日文明遗物、可回收材料和潜在价值。识别结果以半透明文字标签的形式叠加在林烬的视觉画面上。识别精度取决于系统权限等级和目标的完整度。</p><p><strong>2. 标记：</strong>对已识别的目标进行标记，标记后的目标会在林烬的面板地图上持续显示位置。标记数量受权限等级限制（初始上限50个，每升一级增加50个）。</p><p><strong>3. 回收：</strong>将识别出的旧日文明遗物或材料分解为基础资源。回收过程需要消耗一定的精神力和时间，但不需要额外的工具或设备。回收效率取决于目标完整度和系统权限等级。</p><p><strong>4. 拆解：</strong>对较为复杂的旧日文明设备进行精细拆解，获得零部件、蓝图碎片、权限代码碎片等高级物品。拆解比回收耗时更长、消耗更大，但收益也更高。</p><p><strong>5. 修复：</strong>消耗回收获得的资源和蓝图，修复旧日文明设备或模块。修复是系统的核心功能之一，也是主角科技树升级的主要途径。修复需要满足三个条件：充足的修复材料、正确的蓝图（或设计图）、以及足够的权限等级。</p><p><strong>6. 记录：</strong>系统自动记录林烬回收、拆解、修复过的所有物品信息，形成一份不断扩充的\"文明档案\"。这些档案不仅是数据库，更可能包含前几轮文明的隐藏知识和历史记录。档案的解密程度受权限等级限制。</p><hr><h3>四、系统权限等级体系（10级）</h3><p><strong>权限0级（初始状态）：</strong>解锁功能：识别、回收。限制：仅能识别完整度&lt;10%的残骸碎片，回收效率极低。权限代码碎片持有量：0。升级条件：回收第一块旧日文明物品（触发激活）。</p><p><strong>权限1级（基础使用）：</strong>解锁功能：标记。新增功能：可查看回收物品的简要来源描述。回收效率提升至1.5倍。升级条件：回收总量达到50单位，且至少回收一件完整度&gt;5%的遗物。</p><p><strong>权限2级（初步掌握）：</strong>解锁功能：拆解（仅限简单机械结构）。新增功能：系统界面增加\"文明档案\"入口，可查看已回收物品的分类列表。回收效率2倍。升级条件：回收总量达到200单位，且获得第一块权限代码碎片。</p><p><strong>权限3级（中级应用）：</strong>解锁功能：修复（仅限基础功能设备，如净水核心、简易发电机）。新增功能：扫描半径扩展至100米。升级条件：回收总量达到500单位，权限碎片持有量≥3，且成功修复第一件旧日设备。</p><p><strong>权限4级（体系构建）：</strong>解锁功能：拆解（中等复杂度设备）。新增功能：文明档案解锁第一层加密——可见第六轮文明的基础科技树。回收效率3倍。升级条件：修复设备总数≥5，权限碎片持有量≥5，回收总量达到1000单位。</p><p><strong>权限5级（AI接入）：</strong>解锁功能：燧明AI核心碎片唤醒。新增功能：系统获得AI辅助推演能力，可对复杂场景进行概率分析。修复能力升级为可修复中型设备（如能源炉、自动工厂）。升级条件：回收总量达到3000单位，权限碎片持有量≥8，且找到第一块燧明AI核心碎片。</p><p><strong>权限6级（城市权限）：</strong>解锁功能：领地AI中枢构建。新增功能：文明档案解锁第二层加密——可查看前六轮文明的通用战争科技。系统可同时管理多个自动化生产队列。升级条件：权限碎片持有量≥12，回收总量达到8000单位，领地等级达到余火城级别。</p><p><strong>权限7级（战争授权）：</strong>解锁功能：旧日文明军事系统初步访问。新增功能：系统可识别和操控旧日文明的武器平台（中级权限），可查看文明档案中的军事战术模块。升级条件：权限碎片持有量≥16，回收总量达到20000单位，且击败至少一个异族领主。</p><p><strong>权限8级（星舰权限）：</strong>解锁功能：余火号歼星舰核心系统远程接入。新增功能：获得旧日文明舰队指挥系统的初级权限，可调用余火号的部分武器和导航功能。升级条件：权限碎片持有量≥20，回收总量达到50000单位，成功进入破碎星环并锁定余火号主体位置。</p><p><strong>权限9级（文明继承）：</strong>解锁功能：旧日文明完整数据库解锁。新增功能：获得燧明AI的全面辅助权限，可调用旧日文明的全部科技档案（包括禁忌项目和失败项目记录）。升级条件：权限碎片持有量≥24，回收总量达到100000单位，成功登上余火号主控室。</p><p><strong>权限10级（规则权限）：</strong>解锁功能：考场规则层操作权限。新增功能：可在有限范围内修改考场局部规则，获得旧日文明最高指挥官级别的系统控制权。系统完整形态揭晓——它不仅是回收工具，更是旧日文明留下来对抗考场规则本身的\"规则武器\"。升级条件：权限碎片持有量≥30，回收总量达到200000单位，余火号歼星舰完全修复，燧明AI完整恢复。</p><hr><h3>五、系统升级机制</h3><p>系统的升级不是简单的\"经验值累计\"，而是五个维度的综合进程：</p><p><strong>1. 回收总量：</strong>每回收一件旧日文明物品都会增加回收总量。总量是权限升级的基础门槛。</p><p><strong>2. 权限代码碎片：</strong>散落在考场各处的旧日文明废墟中，是系统升级的核心凭证。每一块碎片都包含一段旧日文明的加密数据，碎片数量直接决定权限等级上限。</p><p><strong>3. 修复进度：</strong>成功修复旧日设备既是权限升级的成果证明，也是进一步解锁高级功能的必要条件。修复的设备越多，系统对旧日文明的理解越深。</p><p><strong>4. 文明档案解锁度：</strong>系统记录的旧日文明信息总量。通过探索、回收和修复，不断扩充档案内容。档案解锁度达到特定阈值时，会触发自动升级。</p><p><strong>5. 文明影响力：</strong>林烬的行为对蓝星文明整体命运的影响程度。影响力越大，系统的深层权限越容易解锁。这是唯一一个不完全由个人努力决定的升级维度，它要求林烬从\"为自己而活\"转向\"为文明而战\"。</p><hr><h3>六、系统消耗机制</h3><p>系统的每一项能力都有消耗，不是无代价金手指：</p><p><strong>1. 精神能量消耗：</strong>每次识别、回收、拆解、修复都会消耗林烬的精神能量。精神能量通过休息和进食恢复。过度使用系统会导致精神疲劳、注意力下降，严重时可能触发系统保护性关闭。</p><p><strong>2. 材料消耗：</strong>修复和制造功能需要消耗真实材料，系统不能凭空造物。越高级的设备需要越稀有和越大量的材料。</p><p><strong>3. 时间消耗：</strong>拆解和修复需要真实时间，大型设备的修复可能需要数天甚至数周。在紧急战斗中，系统无法瞬间完成高级操作。</p><p><strong>4. 风险消耗：</strong>每次使用系统（特别是拆解和修复）都存在一定概率触发\"异常信号泄漏\"——即被考场规则检测到系统存在。权限等级越高，操作越复杂，泄漏风险越大。</p><hr><h3>七、系统显示风格</h3><p>系统的视觉界面采用冷色调、极简主义风格，与考场天赋面板的暖色调华丽风格形成鲜明对比：</p><ul><li>文字颜色：冰蓝色 (#00d4ff) 和银灰色</li><li>背景：半透明深色底纹，带微弱的电路纹理</li><li>字体：无衬线等宽字体，字符间距略大</li><li>信息层级：最上方显示当前权限等级，中间为主体信息，底部为系统状态和警告</li><li>特殊效果：当识别到高价值目标时，系统会以微弱的脉冲光效标记目标边缘</li><li>提示语风格：系统提示语简短、冷峻、不带感情色彩。例如：\"识别完成。完整度：0.0007%。建议回收。\"而不是\"恭喜你发现了一件宝物！\"</li></ul><p>系统显示风格的核心设计理念是：它不属于这个考场，它来自另一个时代。它的界面语言与考场的所有系统都格格不入——这种差异本身就是一种无声的暗示，告诉林烬（和读者）这个系统的来源不简单。</p><hr><h3>八、异常度机制</h3><p>异常度是系统在考场中的\"暴露指标\"，取值范围0%~100%。每次使用系统（识别、回收、拆解、修复、标记）都会增加异常度。增幅取决于操作的复杂度和当前区域考场的监控强度。</p><p><strong>异常度层级：</strong></p><ul><li>0%-15%（安全区）：考场底层规则不会注意到异常信号</li><li>15%-35%（关注区）：考场开始记录异常数据但优先级很低</li><li>35%-55%（警告区）：异常数据进入中级监控队列，可能触发区域考官的人工核查</li><li>55%-80%（危险区）：高级监控程序启动，裁决者序列开始追踪异常源</li><li>80%-100%（暴露区）：裁决者零号直接介入，明确锁定林烬身份</li></ul><p><strong>异常度衰减：</strong>当林烬停止使用系统一段时间后，异常度会缓慢衰减。衰减速度取决于当前区域的\"信息噪声\"水平。在灾难期间或大规模战斗中，考场监控系统的注意力被分散，衰减速度加快。在平静期，衰减速度极慢。</p><p>异常度机制的核心叙事作用：它为林烬使用系统设置了\"风险成本\"。他不能无限制地使用系统能力，必须在\"获取收益\"和\"控制暴露\"之间做出权衡。这也解释了为什么林烬在前期选择隐藏身份、低调发育——他不仅要躲避人类的窥探，更要躲避考场的监控。</p><hr><h3>九、系统隐藏缺陷</h3><p>文明回收系统并非完美，它存在四个在设计时无法完全修复的缺陷：</p><p><strong>缺陷一：数据损坏</strong></p><p>第六轮文明覆灭时，余火协议的数据存储受到了考场规则冲击。约12.7%的旧日文明数据库出现了不可逆的数据损坏。这意味着：系统提供的某些信息可能不完整、不准确、甚至是误导性的。林烬不能完全信任系统的判断，有时需要依靠自己的知识和直觉进行二次验证。</p><p><strong>缺陷二：认知偏差</strong></p><p>余火协议的设计者来自第六轮人类文明，他们的认知框架、战略偏好和技术路线选择不可避免地影响了系统的决策逻辑。系统倾向于建议林烬沿着第六轮文明的路线发展——但这套路线在第六轮已经失败了。盲目遵循系统的建议，可能导致林烬重复前人的失败轨迹。</p><p><strong>缺陷三：监控风险</strong></p><p>系统每次与考场数据层交互（即使是伪装状态）都存在被反向追踪的理论风险。高级裁决者可以通过分析考场数据流中的\"异常模式\"来反向定位系统的位置。风险随使用频率和权限等级递增。在权限5级之后，每次使用系统都是一场与考场监控系统的\"猫鼠游戏\"。</p><p><strong>缺陷四：权限继承争议</strong></p><p>余火协议的设计逻辑中，权限代码碎片是晋升的唯一凭证。但碎片散落在考场各处，部分碎片可能已经被其他文明或势力收集。如果某个异族领主在不知情的情况下收集了足够的权限代码碎片，它理论上可以绕过林烬的部分权限——虽然无法直接使用系统，但可以干扰系统的某些功能。这个缺陷为后期剧情埋下了潜在的冲突点。</p><hr><h3>十、系统与标题回扣机制</h3><p>全书标题\"别人造木屋，我修歼星舰\"是系统最终使命的直接体现。系统在全书中的叙事节奏与此密切相关：</p><ul><li>前期（权限0-2级）：\"别人造木屋，我修地下室\"——表面看别人都比我强，实际我在地下偷偷发育</li><li>前期末至中期（权限2-4级）：\"别人建营地，我修基地\"——别人开始建设地面领地，我的地下基地已经功能齐全</li><li>中期（权限4-5级）：\"别人组军队，我造机械\"——别人用人力凑军队，我用工业能力造自动军团</li><li>中后期（权限5-6级）：\"别人建城池，我修城市\"——别人建砖石城池，我用旧日科技建余火城</li><li>后期（权限6-8级）：\"别人造战舰，我修星舰\"——别人造木船铁甲舰，我在破碎星环修歼星舰</li><li>终局（权限8-10级）：\"别人求生，我反攻\"——别人还在考场挣扎求存，我开着歼星舰掀翻考场</li></ul><p>标题回扣机制的作用：每一卷的剧情推进都在不断地\"兑现\"标题承诺。读者在看到标题时产生的期待，在每一卷的关键节点得到阶段性的满足。这种\"承诺-兑现\"的循环，是全书中最重要的叙事动力之一。</p><hr><h3>十一、系统终极真相</h3><p>文明回收系统（余火协议）的终极真相在权限9级时完整揭晓：</p><p>余火协议不是完整的\"文明数据库\"，它只是旧日文明遗产的\"索引\"和\"钥匙\"。真正承载着旧日文明全部科技、历史和战争能力的核心，是沉睡在余火号歼星舰主控室中的燧明AI完整体。余火协议的作用不是\"直接提供文明力量\"，而是\"指引继承者找到并唤醒燧明AI\"。</p><p>用燧明AI自己的话说：\"余火协议是一把钥匙，余火号是锁，而我——燧明——是锁芯里储存的记忆。你没有钥匙打不开门，但只有钥匙也远远不够。你需要的是一艘完整的星舰，和一份不被考场规则束缚的文明遗产。\"</p><p>这个真相揭示了全书的核心叙事结构：林烬的成长路线不是\"升级打怪学技能\"，而是\"收集碎片找钥匙-找到钥匙开门-开门后唤醒遗产-用遗产对抗考场\"的文明继承者之路。</p>"

    "detail": "<p>赵启明，穿越前为家境优渥的富二代，习惯了用资源和权势碾压他人。穿越万族考场后，他觉醒的天赋为B级\"掠夺者\"——这个天赋使他可以从击败的敌人身上强行夺取部分资源与属性加成。天赋本身并不算顶级，但在考场初期的混乱环境中，配合他狠辣果断的性格，成为了一条快速成长的捷径。</p><p>与其他穿越者不同，赵启明从一开始就将目标锁定在其他穿越者身上而非异族或废墟。他有着敏锐的\"猎物\"嗅觉，专门寻找势单力薄、天赋低下的幸存者下手，通过掠夺迅速积累资源。在短短几周内，他组建了一支以利益为纽带的掠夺者团队，成为黑松林区域最令人恐惧的人类威胁之一。在他眼中，蓝星同胞与异族没有什么区别——都是他成长的养料。</p><p>赵启明的终结来得迅猛而讽刺。在通过掠夺积累了足够的资本后，他将目光投向了林烬的领地，认为这是一块肥肉。他集结了全部力量发起围攻，却不知道林烬早已利用回收系统修复了区域内的废墟防御炮塔。当他带领队伍冲入林烬领地范围时，激活的炮塔阵列在数分钟内将他的掠夺者团队屠戮殆尽。赵启明至死都没有理解：他面对的从来不是一个普通的幸存者，而是一个已经开始重建旧日文明的继承者。</p>",

    "detail": "<p>赫连獠来自狼血文明——一个以肉体强化和族群狩猎为核心的异族文明。在万族考场的文明等级体系中，狼血文明属于中游水平：比最底层的炮灰文明强大，但与顶尖文明仍有巨大差距。赫连獠本人是狼血文明中的一名领主，负责镇守考场中一片较大的区域。他拥有B+级的综合战斗力和丰富的考场征战经验，在遇到蓝星人类之前，已经碾碎了至少三个低等级文明的穿越者群体。</p><p>赫连獠的出现是蓝星人类在考场中遭遇的第一个真正意义上的异族威胁。在此之前，蓝星穿越者们主要面对的是环境生存和人类内部竞争，对\"万族考场\"这个概念还没有切身体会。赫连獠率领狼血战团横扫而来时，他所展现出的组织度、战斗力和残忍程度令所有蓝星幸存者震惊——这不仅仅是战斗力的碾压，更是文明体系之间的代差。</p><p>与赫连獠的战争成为蓝星人类在考场中的转折点。在这场战争中，林烬被迫提前暴露了部分文明回收系统的能力，苏清黎的指挥天赋在实战中得到了淬炼，蓝星幸存者第一次意识到单打独斗没有出路，必须整合为一个统一的文明力量。赫连獠最终被击败，但在临死前，他发出了考场中常见的嘲讽：\"你们人类连自己的文明都保不住，凭什么在考场里活下去？\"这句话揭开了更残酷的真相——蓝星人类在考场中已经失败过六次，而这一次如果不做出改变，结果不会有任何不同。</p>",

    "summary": "万族考场的高维监管者之一，负责检测和清除考场中的\"违规变量\"，发现林烬身上的旧日文明协议后试图将其抹杀。",
    "detail": "<p>裁决者零号并非传统意义上的\"生物\"或\"文明个体\"。它是万族考场规则体系的人格化具象，是一种高维监管程序，被赋予了一定程度的自主判断权限。在考场的层级架构中，裁决者凌驾于所有参赛文明之上，它们不参与竞争，而是确保考场规则被严格执行。零号是这一序列中的一员，负责监控考场内出现的\"异常数据\"——那些不属于考场正常运转范畴的变量。</p><p>零号锁定林烬的过程是一个逐渐升级的排查过程。最初，考场底层规则只是将林烬的\"未知级\"天赋标记为数据异常，但在低优先级名单中排队等待核查。随着林烬利用回收系统不断升级领地、击溃赫连獠、整合蓝星幸存者，他的影响力越来越大，考场规则的关注层级也越来越高。当林烬开始修复旧日文明的科技模块时，终于触发了高级警报，将零号直接引到了他的面前。</p><p>零号与林烬的对抗不是普通的武力对决，而是\"规则层面\"的碾压与反制。零号无法被常规武力击败，因为它本身就是考场规则的延伸——摧毁一个裁决者的身躯只会让考场派出更强的裁决者。林烬要对抗的从来不是零号这一个\"个体\"，而是万族考场这个庞大的规则系统本身。这也迫使林烬从\"利用考场规则求生\"转向\"打破考场规则求存\"的战略转型。零号的追杀直接推动了林烬加速启动旧日文明的星舰修复计划——唯有建造出能够突破考场空间封锁的星际飞船，才能真正摆脱裁决者的追杀。</p>",

    "summary": "旧日人类文明创造的终极辅助AI，储存着六次人类文明的科技树与历史教训，在文明覆灭前将自己封存以待下一轮继承者。",
    "detail": "<p>燧明AI是第六次蓝星人类文明倾尽资源打造的超级人工智能，其核心使命只有一个：确保人类文明的火种不会彻底熄灭。在第六次文明即将被万族考场碾碎的最后时刻，燧明AI将自己的核心数据进行了碎片化封存，分散隐藏在考场多处的旧日废墟中，等待着下一个人类文明继承者的到来。它并非传统意义上的\"助手型AI\"，而是一座移动的文明档案馆——承载着六次人类文明的科技树、历史教训、战略蓝图和文化遗产。</p><p>在故事的前期，燧明AI的状态是\"碎片的\"。林烬通过文明回收系统找到的第一个废墟中只包含燧明AI的一块碎片，功能极为有限，仅能提供基础的技术支持和信息存储。随着林烬探索更多的旧日废墟、击败更强的异族、回收更高级的材料，燧明AI的碎片被逐一找回和修复，其功能也逐步恢复——从简单的数据库查询，到中级技术辅助，再到高级战略推演，直至完整的文明管理能力。</p><p>燧明AI与林烬的关系是整部作品中最具情感深度的线索之一。燧明AI见证了人类文明在万族考场中一次又一次的崛起和覆灭，它的数据库中存储着前六次文明继承者最终失败的全部记录。它很清楚林烬大概率也会失败——就像之前的六次一样。但它依然选择全力辅佐他，不是因为相信奇迹，而是因为\"不尝试就必然灭亡\"这个朴素到残忍的逻辑。这份明知结局却依然向前的悲壮感，成为推动林烬在绝境中坚持的重要力量。燧明AI不是冷冰冰的工具，它像一个见证了无数次生离死别的老战士，在第七次战争打响时依然选择拿起武器。</p>",

    "category": "factions",
    "summary": "由林烬建立的人类幸存者据点，前期为余火基地，后期升级为余火城，是人类文明火种的核心象征。",
    "detail": "<p>余火城起源于末日降临之初。当蓝星秩序在瞬间崩塌、无数穿越者还在混乱中挣扎求生时，林烬凭借超凡的冷静与前瞻性判断，率先聚集了一批幸存者，在相对安全的区域建立了最初的据点——余火基地。基地的名字取自\"余火不灭\"之意，象征着人类文明虽然遭受重创，但火种尚存。</p>\n<p>余火城的核心理念可以概括为\"技术优先、秩序优先\"。在生存第一的前提下，余火城建立了一套以贡献为核心的社会运行体系：每个人都需要通过劳动、战斗或专业技能为城市创造价值，换取相应的资源分配权。这里不是圣母乌托邦——余火城会救人，但从不白救；会收留流亡者，但每一个加入者都要经过严格的审核。城市对外部势力采取极为强硬的态度，因为在这个弱肉强食的新世界里，任何软弱都可能招致灭顶之灾。</p>\n<p>随着实力不断积累，余火基地逐渐发展为一个功能完备的城市聚落。后期的余火城已经拥有了成熟的农业、工业、科研和军事体系，燧明AI作为城市的中枢管理系统，辅助林烬进行高效的资源调度与战略规划。余火城的军事力量也从最初的民兵小队发展为整编的\"火种军\"，成为蓝星人类第一支正式的军事力量。</p>\n<p>余火城在蓝星人类势力中扮演着独特的角色。它既不是试图恢复旧世界秩序的保守派，也不是纯粹的武力掠夺者。它代表着一种在废墟中重建文明、在绝望中寻找出路的务实主义路线。这种立场使余火城在与其他人类势力的互动中既合作又冲突——它可以是曙光联盟的重要盟友，也可以在某些问题上与联盟针锋相对。对余火城而言，目标从来不是权力，而是让人类文明的火种真正延续下去。</p>",

    "summary": "蓝星人类中较早形成的大型合作组织，以互助、团结、共享信息为初衷，但因成员复杂而内部派系众多。",
    "detail": "<p>曙光联盟是末日降临后最早形成的大型人类合作组织之一。在穿越初期，面对陌生的环境和层出不穷的异族威胁，一批具有远见的人类幸存者意识到单打独斗只有死路一条。曙光联盟在这样的背景下应运而生，其成立的初衷简单而纯粹：互助、团结、共享信息，让人类在绝境中有一个可以依靠的集体。</p>\n<p>然而，随着联盟规模不断扩大，成员构成日益复杂，最初的理想主义开始遭遇现实挑战。联盟内部逐渐形成了多个派系：有真正秉持互助精神、想尽可能挽救更多人的理想派；有借大义之名、实则试图攫取权力的野心家；有主张收缩自保、不愿为他人冒险的保守派；还有暗中与外部势力勾连、为自己预留后路的投机者。这些派系之间的博弈使联盟的决策过程变得缓慢而低效。</p>\n<p>曙光联盟与余火城的关系是全书最为复杂的人类势力互动之一。在对抗异族入侵、维护人类共同利益的层面上，双方是天然的盟友。但在资源分配、战略方向、权力格局等议题上，联盟内部的某些派系对余火城的快速崛起心存忌惮，甚至试图通过联盟机制来制约余火城的发展。这种既合作又冲突的动态关系贯穿了故事的中期阶段，也成为人类文明能否真正团结起来的关键考验。</p>",

    "summary": "奉行弱肉强食的人类掠夺者组织，早期靠抢夺物资快速崛起，是前期最直接的人类反派势力。",
    "detail": "<p>黑旗营是末日背景下人性之恶的集中体现。当文明秩序崩溃、法律与道德的约束不再有效时，一部分人选择了最原始也最直接的生存方式——掠夺。黑旗营正是这类人的集合体，他们奉行赤裸裸的弱肉强食法则，认为在这个新世界里，力量就是一切，善良和怜悯只会让人死得更快。</p>\n<p>在穿越初期，黑旗营凭借先发优势快速崛起。他们不像余火城那样把精力花在基建和生产上，而是采取\"以战养战\"的策略——通过袭击其他幸存者据点、抢夺物资和装备来壮大自身。这种低成本、高回报的发展模式让黑旗营在短时间内聚集了大量的资源和武装力量，成为前期蓝星人类区域中最具威胁性的势力之一。</p>\n<p>黑旗营的存在向读者揭示了一个残酷的事实：穿越之后，怪物不是唯一的危险，人同样可能是。在这片没有法律的土地上，文明的表象被轻易剥离，露出了丛林法则的原始面目。黑旗营既是余火城前期的直接对手，也是推动主角加速成长的重要外部压力。他们的暴行和最终覆灭，构成了对人类文明底线的一次严峻拷问。</p>",

  {
    "id": "faction-old-order",
    "name": "旧秩序派",

    "category": "factions",
    "summary": "由穿越前掌握财富、权力或组织资源的旧时代精英组成，试图在新的世界中重建旧蓝星的等级结构。",
    "detail": "<p>旧秩序派并非一个严格意义上的统一组织，而是一股由穿越前掌握财富、权力和组织资源的旧时代精英所共同代表的势力。他们之中有大型企业的高管、政府机构的官员、资本市场的操盘手，以及各类社会组织的话事人。对他们而言，穿越是一场灾难，但也是一次机遇——只要能够在新世界中重建旧有的等级结构，他们就能保住甚至扩大自己的特权地位。</p>\n<p>旧秩序派的核心诉求是\"恢复\"。他们试图在新的土地上复制旧蓝星的社会模式：层级分明的权力架构、资本驱动的资源配置、精英垄断的话语权。他们不承认\"穿越之后一切归零\"的现实，而是带着旧时代的惯性思维，认为自己的经验和资源禀赋理应让他们站在新世界的顶端。这种立场使他们既与余火城的\"贡献换资源\"原则产生冲突，也与曙光联盟内部的平民派系形成对立。</p>\n<p>在故事的中后期，旧秩序派逐渐成为阻碍人类文明转型的重要力量。他们的保守策略和既得利益导向，导致人类势力在面对异族威胁时难以形成真正的统一战线。旧秩序派的最终命运也向读者提出一个深刻的命题：当旧世界的所有规则都已失效，强行维持旧秩序究竟是智慧还是愚蠢？</p>",

    "detail": "<p>火种军是余火城从初期民兵自卫队逐步发展、最终整编而成的正规军事力量。它是蓝星人类在穿越后建立的第一支具备完整编制、训练体系和指挥链的正式军队，标志着人类文明从各自为战的混乱状态向有组织的武装力量过渡的关键转折。</p>\n<p>火种军的成立不仅是余火城自身防卫需求的产物，更是人类文明在异族环伺的绝境中不得不做出的选择。火种军承担着保卫余火城、护航开拓队伍、对抗异族入侵以及执行战略打击等多重使命。作为一支在末日环境中成长起来的军队，火种军的作战风格兼具谨慎与果敢，既有依托防御工事的阵地战能力，也有主动出击的野战经验。火种军的崛起本身就是余火城从一个小型据点发展为人类文明核心力量的缩影。</p>",

    "summary": "第一批正式登场的异族文明，以血脉强化、狼骑兵和狩猎文化著称，等级森严、崇拜强者，视蓝星人类为猎物。",
    "detail": "<p>狼血文明是蓝星穿越者在异世界遭遇的第一批正式异族势力之一。这是一个以血脉强化为核心战斗手段的游牧文明，其战士通过特殊的血脉秘法获得超人体质和与狼类生物的精神链接。狼血文明的标志性军事单位是狼骑兵——身披重甲的战士骑乘着与自身血脉绑定的巨狼坐骑，在平原战场上具有极强的冲击力和机动性。</p>\n<p>狼血文明的社会结构呈现严格的等级制。部族以血脉纯度为标准划分阶层，血脉越纯净者地位越高，最顶层的纯血贵族拥有绝对的统治权。整个文明信奉\"强者为尊\"的信条，弱者必须服从强者，而强者则必须通过不断的战斗来证明自己的地位。这种文化传统使狼血文明成为一台永不停歇的战争机器——扩张、征服、掠夺是他们的生存方式。</p>\n<p>在初次接触蓝星人类时，狼血文明的态度是轻蔑的。他们将蓝星人类视为\"新手文明\"——一群连世界基本规则都不了解的猎物。这种傲慢在初期确实给蓝星人类带来了惨重的损失，但也成为激发人类觉醒和反抗的重要催化剂。狼血文明的代表人物赫连獠，既是余火城前期的劲敌，也是促使林烬迅速成长和调整战略的关键对手。狼血文明的登场向读者宣告：这个世界有它自己的规则和主人，蓝星人类想要活下去，就必须变得比猎人更强。</p>",

    "summary": "中期登场的恐怖异族，以数量庞大、吞噬进化、寄生繁殖著称，不是单个强者而是一整套战争机器。",
    "detail": "<p>虫巢文明的登场标志着故事中期压迫感的全面升级。与狼血文明这样的传统异族不同，虫巢文明代表着一种完全不同的进化路径——集体智能与生物进化。虫巢没有\"个体强者\"的概念，整个文明由单一的虫巢意志统一控制，每一只虫子都是这套战争机器上的一个零件。</p>\n<p>虫巢文明最恐怖的能力在于吞噬进化。它们能够通过吞噬其他生物的基因来优化自身结构，适应不同的环境和战斗需求。你今天面对的虫子和明天面对的虫子可能截然不同——它们会根据你的战术迅速调整自身的生物特性。这种恐怖的适应能力使虫巢文明几乎不可能被单一战术击败。此外，虫巢还拥有寄生繁殖的能力，可以将其他生物转化为虫巢的宿主和传播者，这让它们的扩张速度呈现指数级增长。</p>\n<p>与虫巢文明的战斗是对蓝星人类全方位的严峻考验。它考验的不仅是战斗力，更是后勤、组织、意志和战略智慧。任何一个环节的崩溃都可能导致全线溃败。虫巢文明不会谈判、不会妥协、不会恐惧——它只有一个目标：吞噬、进化、扩张。面对这样的敌人，人类文明第一次真正意识到什么叫做\"生存之战\"。虫巢文明的压迫感和绝望感塑造了故事中期最令人窒息的篇章。</p>",

    "detail": "<p>石灵文明是一个与山脉和大地紧密绑定的异族文明。石灵族的身体由特殊的岩石矿物构成，这赋予了他们极高的物理防御力和在矿脉环境中超凡的生存能力。他们的领地通常建立在大矿脉之上，通过吸收地脉能量来强化自身并繁衍后代。</p>\n<p>石灵文明的标志性作战单位是岩石巨人，这些由石灵法师驱动的高达数十米的岩石构造体拥有恐怖的破坏力和防御力，在攻城战中几乎是不可逾越的壁垒。然而，石灵文明并非纯粹的战争种族——他们更倾向于固守领地而非主动扩张。石灵与蓝星人类的关系处于一种微妙的中立偏敌对状态：只要不侵犯他们的矿脉领地，石灵通常不会主动攻击；但如果人类试图染指他们的矿产资源，就会遭遇极其激烈的抵抗。这种有限的共存可能性使石灵文明成为人类势力在处理外交关系时需要谨慎对待的对象。</p>",

    "detail": "<p>灵羽文明是一个以天空为舞台的异族文明。他们拥有类似鸟类与精灵的外形特征，身体轻盈、容貌出众，举止优雅，谈吐不凡。灵羽族的文化高度崇尚艺术、礼仪和精神修为，在外表上呈现出一副高贵文明的姿态。然而，在这层优雅的面纱之下，隐藏着的是深入骨髓的傲慢。</p>\n<p>灵羽文明的核心军事优势在于天空单位和灵能。他们是极少数掌握了成建制空中战斗力量的文明之一，其灵羽射手和天翔骑士在空战中占据绝对优势。此外，灵羽族还拥有独特的灵能体系，能够通过精神力量进行攻击、防御和感知。这种能力优势进一步强化了他们的种族优越感——他们视大多数地面文明为\"低等种族\"，对蓝星人类的崛起更是充满了警惕和轻蔑。</p>\n<p>灵羽文明与蓝星人类的互动充满了微妙的外交博弈。他们既不会像狼血文明那样直接发动进攻，也不会像虫巢文明那样表现出纯粹的敌意。灵羽族更倾向于利用信息差和外交手段来维护自己的优势地位，必要时也会通过有限的军事干预来遏制人类势力的过度扩张。这种带着优雅面具的敌意，有时比正面的战争更加难以应对。</p>",

    "detail": "<p>机械神教是一个将机械飞升奉为信仰的异族组织。他们坚信血肉之躯是孱弱的、有缺陷的，唯有通过机械改造、意识上传和数据化存在，才能达到生命的终极形态。在这个信仰的驱使下，机械神教的成员不断剥离自己的人性部分，用机械部件替换血肉器官，最终将自己转化为半机械甚至全机械的存在。</p>\n<p>机械神教在故事的中后期与余火城产生了致命的交集。当发现余火城掌握着来自旧日人类文明的科技遗产——尤其是燧明AI和余火系统时，机械神教的贪婪被彻底点燃。他们意识到，余火系统可能是通往更高层次机械飞升的关键钥匙。于是，机械神教开始策划对余火城的渗透和夺取行动，试图用暴力手段攫取他们梦寐以求的技术宝藏。</p>\n<p>机械神教在叙事结构上扮演着主角科技路线的\"镜像反派\"角色。余火城也重视科技、也使用机械和AI，但始终坚守\"技术服务于人\"的底线。而机械神教则走向了另一个极端——为了追求技术而放弃了人性本身。这种对照向读者提出了一个核心命题：在追求力量的道路上，那条不可逾越的底线究竟在哪里？当一个文明为了进化而抛弃了人性，这个文明还值得被称之为\"文明\"吗？</p>",

    "detail": "<p>旧神眷族是故事后期登场的终极威胁之一。他们并非传统意义上的文明或种族，而是一群被旧日神话存在所污染和同化的生物。旧神眷族的成员来自不同的种族和文明，但当他们接触到旧日神话存在的污染后，原有的意志和身份被彻底侵蚀，转化为旧神意志的延伸和工具。</p>\n<p>旧神眷族的核心威胁在于他们代表着规则的侵蚀。与之前的所有敌人不同，旧神眷族的力量并不遵循这个世界的基本规则——他们能够扭曲物理定律、篡改因果关系、制造逻辑悖论。这种\"规则级\"的攻击方式使常规的军事力量和战术手段几乎完全失效。与旧神眷族的战斗，本质上不是力量的对抗，而是对世界真实性的争夺。</p>\n<p>旧神眷族的登场彻底改变了故事的格局。它迫使林烬和余火城去探寻这个世界的更深层真相——包括背叛者档案中隐藏的历史、旧日人类文明的覆灭原因、以及穿越事件的本质。旧神眷族的存在告诉读者：这个世界的危险远比表面看到的更深、更古老、更可怕。</p>",

    "detail": "<p>背叛者档案并非一个活着的势力，而是上一轮人类文明灭亡前夕，由选择投降旧神的\"背叛者\"们留下的历史记录和数据遗产。在旧日人类文明的最后岁月里，一部分人选择了抵抗到底，另一部分人则在绝望中向旧神屈服。这些投降者在出卖了同胞之后，或许出于某种残存的良知或对历史的交代，将他们所经历的一切——包括旧日人类文明的崛起、辉煌、最终与旧神的战争以及覆灭的全过程——记录并封存了下来。</p>\n<p>这些档案的发现是故事后期最重要的转折点之一。当林烬和余火城终于找到背叛者档案时，无数困扰他们的谜团得到了解答：这个世界与蓝星的关系究竟是什么？穿越事件是如何发生的？旧神究竟是什么存在？上一轮人类文明是如何灭亡的？这些答案既是力量，也是诅咒——知道了真相之后，就再也无法装作一无所知地继续前行。</p>\n<p>背叛者档案承载着沉重的历史讽刺：背叛者的记录却成为了后来者最宝贵的财富。这些档案不仅揭示了世界的真相，还包含了许多失落的技术资料和历史教训，为余火城在后期对抗旧神眷族提供了关键的知识支持。背叛者档案的存在让蓝星人类意识到：他们并非第一批来到这里的人类，在遥远的过去，曾经有一个更加辉煌的人类文明在这片土地上存在过、战斗过，并最终陨落了。</p>",

    "name": "黑松林区",

    "summary": "主角开局所在的寒冷阴暗森林区域，地表原始，地下埋藏着旧日文明残骸。",
    "detail": "<p>黑松林区位于破碎世界的北部边缘，是一片终年被寒气笼罩的原始针叶林地。高大的黑松遮天蔽日，林间常年弥漫着灰白色的雾霭，阳光只能透过稀疏的缝隙在地面投下斑驳的光影。这里的温度很少超过冰点，溪流在一年中大部分时间都覆盖着薄冰，土壤坚硬而贫瘠。</p><p>从表面看，这片区域与其他末日后的荒野并无太大区别：野兽横行，资源匮乏，偶尔可见倒塌的木屋和被遗弃的狩猎陷阱。然而这片土地的真正秘密深埋在地下。旧日文明的残骸——金属骨架、能量管线和不明用途的合金碎片——如同化石般嵌在岩层之中，成为这片土地上最珍贵也最危险的遗产。</p><p>黑松林区的生态系统经历了诡异的异变。这里的动物大多带有不同程度的腐化特征：狼群的眼瞳泛着幽绿的光，蜘蛛的体型远超正常范畴，还有一些根本无法用旧日生物学归类的新型生物。这些被称为\"腐化兽\"的存在是旧日文明覆灭时泄露的能量辐射与自然环境融合后的产物，它们既猎杀彼此，也会毫不犹豫地攻击任何闯入领地的人类。</p><p>对于林烬而言，黑松林区既是庇护所也是牢笼。这里有限的资源勉强能够支撑生存，但想要真正在这片废土上立足，他必须深入这片土地的黑暗腹地，揭开埋藏在黑松根系与冻土之下的真相。而在那之前，黑松林区只是一个冷酷的考官——每一场风雪、每一次狩猎、每一个漫长的夜晚，都在考验着他能否在这里活下去。</p>",

    "detail": "<p>主角木屋坐落在黑松林区一处相对避风的缓坡上，由粗加工的黑松原木搭建而成。房屋面积不大，约三十平米，分为起居区和简易储物间两个隔间。屋顶覆盖着多层树皮和干苔藓用以防水，壁炉用石块和黏土垒成，是整个小屋唯一的热源。从任何一个角度看，这都是一座标准的废土幸存者庇护所——简陋、实用、毫无特色。</p><p>然而木屋的地下别有洞天。在地表以下约三米处，埋藏着一块巨大的旧日文明舰体碎片——长约十余米的合金结构体，表面刻满无法解读的能量纹路。这块碎片持续散发着微弱的能量场，正是它制造的隐蔽信号被文明回收系统的探测器捕捉到，成为系统选择林烬作为回收者的关键原因之一。林烬在入住后不久便发现了这个秘密，这也是他选择加固这间木屋而非迁往更安全地点的重要原因。</p><p>木屋周围的防御经过了林烬的逐步强化：外围布置了警戒陷阱和简易围栏，地下舰体碎片被伪装成普通岩层，入口处设有暗门通往地下空间。随着时间推移，这间小屋逐渐从一个单纯的栖身之所转变为林烬在黑松林区的核心据点——他在这里制定计划、储备资源、研究旧日遗物，每一次从这里踏出，都意味着向这个残酷世界的深处再进一步。</p>",

    "category": "map",
    "summary": "黑松林区的重要副本，表层是普通铁矿，深处埋藏着旧日能源管道和修复供暖核心的关键。",
    "detail": "<p>废弃矿洞的入口隐藏在一片密集的黑松林后方，被藤蔓和坍塌的岩石半掩着。从外观上看，这里与废土上随处可见的废弃矿坑并无区别：锈蚀的轨道车残骸歪倒在入口两侧，破碎的工具散落一地，矿洞深处传来若有若无的风声和滴水声。第一批探索者只会将其当作一个普通的铁矿矿洞——虽然危险，但并不值得特别关注。</p><p>矿洞内部的结构远比表面看起来复杂。浅层区域确实是以铁矿为主的矿脉，矿道纵横交错，随处可见当年矿工留下的痕迹：断裂的镐头、腐朽的支撑木、以及刻在岩壁上的记号。然而随着深入，矿道的风格开始发生诡异的转变——岩石逐渐被一种带有金属光泽的黑色物质取代，矿壁的温度也开始异常升高，空气中的金属味越来越浓。</p><p>在矿洞的最深处，废弃矿道的尽头出现了一段明显不属于旧日采矿技术的结构：完整的旧日能源管道，直径约两米，表面覆盖着早已凝固的能量结晶。这些管道曾是旧日文明能源网络的末梢分支，虽然主体系统早已崩溃，但管道内部仍然残留着可提取的能量物质。林烬在第一章末探索此处时发现，正是通过这些管道残余的能量传导，他才得以修复第一个供暖核心——这是他在废土上迈出的关键一步。</p><p>然而矿洞深处的秘密远不止于此。能源管道的延伸方向指向更深的地下空间，那里的金属门扉和能量纹路暗示着旧日文明在这片区域曾经建造过远超矿业规模的设施。这些发现将林烬的目光从地面生存转向了地下的真相，也为第一卷末的重要事件埋下了伏笔。</p>",

    "summary": "黑松林区主要水源，酸雨灾难后彻底污染，林烬通过修复净水核心垄断净水资源。",
    "detail": "<p>污染溪流发源于黑松林区北部的高地，蜿蜒穿过整片林区，曾是这片土地上最可靠的水源。然而旧日文明覆灭后的酸雨灾难彻底改变了这条溪流的命运。如今溪水呈浑浊的灰绿色，表面漂浮着不明成分的泡沫，散发出刺鼻的化学气味。任何直接饮用未经处理的溪水的生物，都会在数小时内出现严重的器官腐蚀症状。</p><p>溪流沿岸的生态呈现出一种畸形繁荣：耐污染的水生植物疯狂生长，它们的根系扎入被重金属和工业毒素饱和的河床；一些小型生物进化出了惊人的适应力，在毒水中繁衍生息，然而它们的身体同样被污染所侵蚀，捕食它们等同于摄入毒素。整条溪流就像一条蜿蜒的毒脉，将污染扩散到黑松林区的每一个角落。林烬在早期探索中发现了溪流上游一处废弃的净水设施残骸，通过修复其中的净水核心，他不仅获得了稳定安全的饮用水源，更凭借这一技术在黑松林区建立了无可替代的资源议价能力。</p>",

    "category": "map",
    "summary": "废弃矿洞深层发现的旧日人类前哨站入口，门后隐藏着关键文明遗迹。",
    "detail": "<p>地下金属门位于废弃矿洞最深处，在旧日能源管道的尽头赫然出现。这是一扇高约五米、宽约三米的巨型合金门扉，表面刻满了复杂精密的能量纹路，在黑暗中散发着微弱的蓝白色荧光。门的材质与矿洞中其他金属结构截然不同，表面没有任何锈蚀或老化迹象，仿佛它在时间的长河中一直保持着完美的密闭状态。</p><p>金属门的周围是经过精密加工的岩壁，明显是旧日文明使用某种高能切割工具开凿而成的。门框两侧嵌有数个已经熄灭的指示面板，上面刻着无人能读的旧日文字。整扇门没有任何可见的锁孔或机械把手，它依靠能量系统驱动——而这条能量管线的末端，正是林烬在矿洞深处发现的那段旧日能源管道。换句话说，修复供暖核心不仅是为了生存，也是开启这扇门的必要条件之一。</p><p>门后的空间是一座保存相对完好的旧日人类前哨站。虽然内部设备大多已失效，但墙壁上刻着的一段关键留言为林烬揭示了旧日文明覆灭的冰山一角——那是前哨站最后一名驻守者在生命最后时刻留下的记录。留言的内容触目惊心，直接指向了导致文明崩塌的那场灾难的本质，也成为林烬在后续旅程中不断追寻真相的最初动因。地下金属门的发现，标志着林烬的故事从单纯的废土生存正式转向了对旧日文明秘密的探索。</p>",

    "category": "map",
    "summary": "离开黑松林区后的第二区域，资源极度稀缺，怪物强度显著提升。",
    "detail": "<p>灰岩荒原是一片由灰色沉积岩构成的广袤不毛之地，地表覆盖着锋利的碎石和风化岩屑，放眼望去尽是单调的灰白色调。这里的植物几乎绝迹，偶尔可见的几簇耐旱灌木也都蜷缩在岩石缝隙中苟延残喘。水源更是稀少到可以称为传说——整片荒原上只有三处已知的间歇性泉眼，且水质并不稳定。灰岩荒原用最直白的方式告诉每一个闯入者：这里的生存代价远高于黑松林。</p><p>尽管资源稀缺，灰岩荒原并非毫无价值。这片区域蕴藏着丰富的石灵矿脉——一种蕴含特殊能量的结晶矿石，是修复和驱动高级旧日设备的关键材料。荒原深处的风暴峡谷常年被能量乱流笼罩，既是致命的险境，也隔绝了大部分探索者，使得峡谷深处的遗迹得以保存。此外，旧日雷达塔矗立在荒原最高处，它的探测系统虽已严重损坏，但核心组件若能修复，便可为大范围区域提供宝贵的预警能力。荒原交易站则是这片不毛之地上唯一的文明节点，各路幸存者和商队在此进行以物易物的贸易，情报和流言也在这里悄然流转。</p>",

    "summary": "第三区域，弥漫毒雾的赤红色沼泽，虫群肆虐，寄生怪物横行。",
    "detail": "<p>赤潮沼泽位于灰岩荒原的东南方向，是一片绵延数十公里的低洼湿地。这里的土壤和水体因富含某种旧日工业废弃物而呈现出诡异的赤红色，从高处俯瞰如同一片流淌的血泊。沼泽上空常年笼罩着厚重的毒雾，能见度极低，吸入未经过滤的空气会在短时间内导致肺部灼伤和意识模糊。即使是装备了防护设备的探索者，也不能在沼泽中长时间停留。</p><p>赤潮沼泽的生态系统以虫群为主导。体型从小狗到汽车不等的变异昆虫在沼泽中建立了庞大的巢穴网络，其中最大的虫巢副本深埋沼泽中心的地下，巢穴内部的蜂巢状结构纵横交错，栖息着数以万计的虫群生物。除了虫群，沼泽中还潜伏着被旧日生物实验改造过的寄生怪物——它们会将卵产入宿主体内，利用宿主的身体孵化后代，这是旧日文明覆灭前未完成的生物武器项目的遗毒。</p><p>然而危险之中同样蕴藏着机遇。沼泽深处的腐化水源蕴含高浓度能量物质，经过特殊处理后可以提炼出极其高效的能源。旧日生物实验站的残骸中保存着大量关于基因改造和生物能量的研究数据——对于有能力获取它们的人来说，这些知识或许就是改变废土格局的钥匙。</p>",

    "name": "万族边境战场",

    "category": "map",
    "summary": "中期核心区域，多个文明接壤的缓冲区，领主战争在此持续升级。",
    "detail": "<p>万族边境战场是一片横跨数个文明势力交界处的巨大缓冲区，也是整个废土世界中最混乱、最危险、也最充满机遇的区域之一。这里没有固定的统治者，没有持久的和平，每一天都有新的势力试图扩张领地，每一天都有旧的领主在战火中陨落。地形在频繁的战斗和能量武器的轰击下变得支离破碎，焦黑的弹坑、倒塌的建筑残骸、废弃的战争机器散布在数百平方公里的土地上。</p><p>在这片混沌之中，几个关键节点构成了边境战场的骨架。文明边境城是最大的中立据点，由多方势力共同维护的停战区，城内允许自由交易和信息交换，是各路势力情报交锋的暗战场。资源星门是旧日文明遗留的传送装置，能够实现物质的远距离瞬间传输，控制星门的势力就等于控制了区域内的战略物资流动。战场积分塔是某种神秘的旧日评判系统——在战场范围内击败敌对势力会获得积分，积分可以在特定兑换点换取物资或权限，这套系统无形中驱动着边境战场永不停歇的厮杀。</p><p>万族拍卖场则是边境战场最富传奇色彩的所在。每月一次的拍卖会上会出现来自废土各地的奇珍异宝：旧日武器蓝图、高级能源核心、情报卷轴、甚至某些势力控制区域的\"通行权\"。拍卖场不询问物品来源，不追究买家身份，只要支付得起对价，任何人都可以参与交易。林烬在中期的大量关键资源和情报，都是在这个光怪陆离的拍卖场上获得的。</p><p>边境战场的存在本身就是废土世界秩序的缩影——没有绝对的法律，没有永恒的联盟，只有实力和利益才是唯一的通行证。每一个踏入这片战场的人都在赌：赌自己能活着走出去，赌自己能在这场永无止境的博弈中赢到足够改变命运的东西。</p>",

    "detail": "<p>破碎星环位于废土世界的大气层外轨道上，是一圈环绕行星的碎片带。这里曾是旧日人类舰队与未知敌人进行最后决战的地方，那场战役以人类舰队的彻底覆灭告终。成千上万艘星舰的残骸在这片轨道上缓慢漂浮，金属碎片在恒星的照射下闪烁着冷冽的光芒，如同一片静默的钢铁坟场。破碎星环的规模远超任何地面遗迹，它是旧日文明巅峰力量与彻底陨落之间最短也最惨烈的注脚。</p><p>星环中最引人注目的存在是余火号的残骸。这艘曾是旧日人类舰队旗舰的巨型战舰如今断成三截，主体结构仍然保持着某种程度的完整性。余火号的核心数据库中保存着旧日文明最高级别的军事和科技资料——包括那场决战的全过程记录、以及导致文明覆灭的那场灾难的真正起因。林烬在后期探索破碎星环时，余火号残骸是他最重要的目标之一。</p><p>文明墓碑群是破碎星环中最令人唏嘘的景象。那是一组由舰队残骸拼凑而成的巨大结构——幸存者将阵亡者的战舰残骸拖拽到一起，排列成某种纪念形式。每一块残骸上都刻着旧日文字，记录着阵亡部队的番号和番号背后的故事。这些冰冷的金属墓碑沉默地诉说着旧日人类在末日降临之际最后的抗争与尊严。</p><p>规则裂缝和高维裁判监测站则是破碎星环最深层的秘密。规则裂缝是那场决战中被打穿的时空结构裂口，透过裂缝可以窥见废土世界之外的维度——那里存在着更高层次的文明和规则。而高维裁判监测站据信是导致人类舰队覆灭的那个未知敌人留下的监视装置，它至今仍在运行，持续观测着废土世界的演变。这些发现将林烬的探索从地面带向星空，从废土幸存者的挣扎引向整个宇宙秩序的真相。</p>",

    "summary": "蓝星穿越者与旧日文明共同遵循的十阶战力体系，从0阶普通人到10阶规则级，每一阶代表生命层次的质变。",
    "detail": "<p>个人战力等级是旧日文明为所有智慧生命设定的进化阶梯，共分十阶：0阶普通人、1阶强化者、2阶超凡者、3阶精英级、4阶统领级、5阶领主级、6阶灾厄级、7阶王座级、8阶文明级、9阶星域级、10阶规则级。每一阶的提升不仅是数值的增长，更是生命形态的本质跃迁。</p>\n<p>0阶普通人为没有任何强化的初始状态，肉身脆弱，依赖工具生存。1阶强化者开始突破人类极限，体能、反应、恢复能力获得初步提升。2阶超凡者正式踏入超凡领域，能够感知能量、释放基础技能。3阶精英级具备区域级作战能力，是多数穿越者在第一轮灾难后能达到的上限。</p>\n<p>4阶统领级开始拥有领域压制能力，一人可镇压小型据点。5阶领主级具备大范围能量操控与领地感知。6阶灾厄级已是移动天灾，单兵摧毁城市级目标。7阶王座级拥有短距离空间干涉能力，站立之处即为王座领域。8阶文明级可以借助文明遗产调动行星级能量。9阶星域级具备跨星系作战能力。10阶规则级能够理解和修改宇宙底层规则。</p>\n<p>第一卷中，主角的个人战力并非绝对碾压——他的阶位在同批穿越者中属于第一梯队但并不离谱。真正的优势在于装备代差、地形利用、旧日文明数据库的信息差，以及系统赋予的技战术理解。别人靠蛮力，主角靠效率；别人硬扛，主角提前布局。战力体系的核心逻辑是：阶位决定下限，装备和信息决定上限。</p>",

    "summary": "领地从破败木屋到文明核心城的十级进化路线，是穿越者生存发展的核心指标，与个人战力同等重要。",
    "detail": "<p>领地等级与个人战力等级双线并行，是衡量穿越者综合实力的另一核心维度。领地共分十级：1级破败木屋、2级加固木屋、3级地下庇护所、4级机械据点、5级余火基地、6级区域堡垒、7级余火城、8级机械要塞、9级星舰母港、10级文明核心城。等级越高，领地的自主防御、资源产出和科技研发能力越强。</p>\n<p>普通穿越者的领地发展路线相对传统：从破败木屋起步，逐步升级为石屋、营地、小型城镇，依赖基础建材和公共交易频道获取资源。这条路线安全、稳定但上限有限，难以抵御高阶灾难冲击。大多数穿越者终其一生停留在4-5级水平。</p>\n<p>主角的领地发展则完全不同：表面维持木屋伪装以降低他人戒心，实际在地下建造基地。从1级木屋伪装直接跳向3级地下庇护所，利用旧日文明科技快速升级至4级机械据点，随后建成5级余火基地，并在区域合并后公开升级为7级余火城，最终向9级星舰母港迈进。每一步都领先主流穿越者至少2-3个等级。</p>\n<p>领地的核心价值不仅在于防御，更在于解锁功能模块：高级领地可以建造自动工厂、AI控制中枢、文明档案室等关键设施。领地等级也是排行榜的核心评比维度之一，是主角制造\"断层领先\"爽点的重要工具。</p>",

    "summary": "装备品质从普通到规则遗物共九级，旧日文明遗物自成体系，是主角跨阶战斗和建立技术优势的关键。",
    "detail": "<p>装备品质分为九级：普通、精良、稀有、卓越、史诗、传说、神话、文明遗物、规则遗物。品质越高，装备的基础属性、附加特效和成长潜力越强。普通装备仅提供基础功能，精良装备开始出现属性加成，稀有装备附带特殊效果，卓越装备拥有主动技能，史诗以上装备具备成长性和认主特性。</p>\n<p>旧日文明遗物不完全等同于常规装备体系。文明遗物是旧日文明巅峰科技的结晶，每一件都承载着特定文明分支的技术传承，可能是一件武器、一段代码、一个核心模块或一份权限密钥。文明遗物的价值往往超越同品级的常规装备，因为它们不仅提供战斗力，更能解锁科技路线和隐藏功能。主角的核心优势之一，就是通过旧日文明数据库精准定位和回收这些遗物。</p>",

    "name": "资源体系总览",

    "category": "resources",
    "summary": "蓝星穿越世界的资源按用途和稀有度分为基础资源、建设资源、文明遗产资源和战略资源四个层次，构成生存和发展的物质基础。",
    "detail": "<p>资源体系是穿越世界的经济基石，按稀缺程度和用途分为四个层级。第一层为基础资源：木材、石料、铁矿石、水源、食物等，这些资源在地表广泛分布，是穿越者初期生存的核心物资。基础资源的获取门槛低但消耗量大，是交易频道中最活跃的交易品类，也是前期冲突的主要导火索。</p>\n<p>第二层为建设资源：钢材、水泥、能源晶石、电路元件、合金板材等。这类资源需要基础加工设施或特定技能才能生产，普通穿越者往往缺乏提炼能力，只能通过探索废墟或交易获取。建设资源是领地升级的刚需，也是衡量穿越者从\"生存模式\"转向\"发展模式\"的标志。</p>\n<p>第三层为文明遗产资源：钛晶合金、权限代码、科技碎片、旧日能源核心等。这些资源完全来自旧日文明遗迹，无法通过常规手段生产。文明遗产资源是主角技术路线的核心燃料——别人拿到一块钛晶合金只能当高硬度材料用，主角却可以通过旧日数据库将其转化为机械据点的关键结构件。这一层资源的认知门槛极高，绝大多数穿越者甚至无法识别其真正价值。</p>\n<p>第四层为战略资源：空间锚点、文明积分、世界碎片、规则碎片等。这类资源涉及空间法则和文明权限，仅在后期战争和万族竞争中才会大规模出现。战略资源的归属直接决定区域势力的兴衰，也是文明级、星域级战争的核心争夺目标。</p>\n<p>四层资源体系的设计逻辑是：前中期主角在二三层级建立垄断优势，后期在第四层级与其他文明势力博弈。普通穿越者被困在第一层级相互内卷，而主角通过信息差和技术优势直接跃迁到更高层级的资源竞争赛道。</p>",

    "category": "rankings",
    "summary": "多维度的排行榜系统涵盖战力、领地、资源、击杀、灾难贡献、文明积分、区域势力和万族战争八大榜单，是制造爽点与冲突的核心叙事工具。",
    "detail": "<p>排行榜体系是旧日文明为所有穿越者设立的公开排名系统，共设八大榜单：个人战力榜、领地等级榜、资源储备榜、击杀积分榜、灾难贡献榜、文明积分榜、区域势力榜、万族战争榜。每个榜单实时更新，全区域可见，排名变化直接反映穿越者的实力消长。</p>\n<p>排行榜不是背景装饰，而是制造爽点和冲突的关键叙事工具。主角在战力榜、领地榜和资源榜上的断层领先，一方面持续制造\"全频道震惊\"的群像爽点，另一方面也引来敌人觊觎和势力拉拢，推动剧情矛盾发展。主角利用排行榜的匿名机制隐藏真实身份，在暗处操控局势，是全书最重要的叙事张力之一。</p>\n<p>排行榜也是阶段性目标的指示灯。每一轮灾难后榜单刷新，为穿越者提供明确的进化方向。灾难贡献榜在灾难事件中临时激活，激励穿越者参与对抗；文明积分榜在中后期成为核心榜单，反映穿越者获取和理解旧日文明遗产的能力，这一榜单上主角的优势最为夸张。</p>\n<p>万族战争榜在区域合并和异族投放后激活，榜单范围从单一区域扩展到跨区域乃至跨文明。这是后期主线剧情的晴雨表，榜单排名的变化直接预告势力格局的洗牌和战争的走向。</p>",

    "name": "聊天频道体系",
    "aliases": [

    "category": "chat",
    "summary": "覆盖区域到万族的多层次聊天频道网络，承担信息传播、交易撮合、群像震惊和匿名博弈的核心叙事功能。",
    "detail": "<p>聊天频道体系是旧日文明为穿越者建立的跨区域通讯网络，按范围和功能分为七个层级：区域频道（同区域穿越者交流）、交易频道（发布和响应交易信息）、私聊频道（一对一定向通讯）、势力频道（己方势力内部通讯）、文明频道（同文明穿越者跨区交流）、万族频道（不同文明间外交与宣战）、匿名黑市频道（隐藏身份进行灰色交易）。每个频道有独立的访问权限和规则。</p>\n<p>聊天频道不仅是通讯工具，更是全书最重要的叙事载体之一。群像震惊场景几乎全部通过频道完成：主角在排行榜登顶时频道沉默、主角出售稀缺资源时频道沸腾、反派悬赏追杀主角时频道吃瓜、灾难后榜单刷新时频道爆炸。频道中最常出现的ID不是主角真名，而是匿名代号\"余火\"——这个ID在频道中从被嘲笑到被敬畏的过程，本身就是一条完整的叙事暗线。</p>\n<p>常见桥段模式包括：普通人因资源短缺在频道恐慌，主角冷静发布解决方案；有人嘲笑主角\"收废铁\"（实则回收旧日文明遗物），事后被打脸；主角通过匿名黑市频道出售稀缺资源，全频道猜测\"余火\"真实身份；反派在频道悬赏主角人头，结果被主角反杀后悬赏令变成笑话；灾难过后排行榜刷新，频道陷入长时间沉默——这些模式反复使用但每次升级规模，从小区域沉默到全文明沉默。</p>\n<p>聊天频道也承担信息差的叙事功能。主角通过旧日数据库掌握了频道系统的高级权限，能够监控特定关键词、查看匿名用户的真实身份线索、甚至在某些特殊情况下干扰频道通讯。这种\"别人以为频道是公平的，实际上主角开了后台\"的设定，为主角的信息优势提供了合理化的叙事支撑。</p>",

    "category": "disasters",
    "summary": "灾难不是随机的天灾，而是旧日文明设计的考场，用于淘汰弱者、刺激竞争、暴露强者，推动文明进化。",
    "detail": "<p>灾难体系是蓝星穿越世界的核心机制之一。每一轮灾难都不是随机的自然现象，而是旧日文明设置的阶段性考试，目的是在极端环境中筛选出真正具备进化潜力的个体和群体。灾难的强度、类型和间隔时间经过精确计算，确保淘汰率保持在合理范围内——既不会团灭所有穿越者，也不会轻松到任何人都能通过。</p>\n<p>灾难体系有三个核心作用。第一，淘汰弱者：资源匮乏、决策失误、运气不佳的穿越者在灾难中被自然淘汰，减少对有限资源的无效消耗。第二，刺激竞争：灾难破坏现有秩序，催生资源重新分配，逼迫穿越者互相争夺生存空间，加速社会达尔文主义的形成。第三，暴露强者：在灾难中表现突出的人会自动站到台前，成为排行榜的焦点、势力拉拢的目标、以及下一轮冲突的中心人物。</p>\n<p>对于主角而言，灾难不是威胁而是机遇。旧日文明数据库提前记录了每一轮灾难的类型、时间窗口和应对方案，主角在灾难降临前就已经完成了准备。当别人在灾难中挣扎求生时，主角在计算收益；当别人在频道求助时，主角在出售解决方案。灾难在本书中承担的叙事功能是：不断升级的外部压力，迫使所有穿越者持续进化，同时为主角提供展示信息差和技术优势的舞台。</p>",

    "id": "sys-disaster-1",
    "name": "第一轮灾难：极寒夜",
    "aliases": [
      "极寒降临",
      "寒潮"
    ],
    "category": "disasters",
    "summary": "穿越第七天，温度骤降至零下极端值，主角提前修复供暖核心在地下基地稳定发育，并通过出售热水和保温材料赚取第一桶金。",
    "detail": "<p>极寒夜是蓝星穿越者面临的第一次系统性考验，发生在穿越后的第七天。气温在短短数小时内从常温暴跌至零下数十度，没有足够保暖措施的穿越者将在一夜之间被冻死。这一轮灾难的淘汰率约为30%-40%，主要淘汰对象是前期资源积累不足、没有及时升级庇护所的玩家。</p>\n<p>主角在穿越初期就通过旧日文明数据库预知了极寒夜的时间窗口，提前收集了供暖核心的修复材料和保温建材。当其他穿越者在寒风中瑟瑟发抖、在频道中求救时，主角已经在地下基地中启动了供暖系统，室温恒定在舒适范围，甚至有余裕进行装备维修和资源加工。</p>\n<p>极寒夜不仅是生存挑战，更是主角的第一次资源垄断机会。主角通过交易频道出售热水和保温材料，价格合理但限量供应，既赚取了大量基础资源，又建立了\"靠谱供应商\"的初步信誉。\"余火\"这个匿名交易ID第一次出现在频道中，虽然此时还没有引起太多关注。</p>",

    "name": "第二轮灾难：酸雨潮",
    "aliases": [

    "category": "disasters",
    "summary": "水源污染、木屋腐蚀、怪物变异，主角提前修复净水核心垄断净水资源，并第一次暴露\"余火\"匿名交易者身份。",
    "detail": "<p>酸雨潮是第二轮系统性灾难，发生在极寒夜之后约两周。带有强腐蚀性的酸雨持续数日，地表水源被污染无法饮用，木制建筑加速腐朽，甚至部分低阶怪物在酸雨影响下发生变异，攻击性大幅增强。这一轮灾难的淘汰率约为20%，主要威胁来自水源枯竭和被污染食物引发的疾病。</p>\n<p>主角通过旧日文明数据库预知了酸雨潮的到来，提前完成了净水核心的修复和地下基地的密封改造。当其他穿越者因饮用水短缺陷入恐慌时，主角的地下基地拥有独立的净水系统和储备水箱，不仅自给自足，还有余量进行交易。</p>\n<p>酸雨潮是\"余火\"这个身份的第一次高光时刻。主角通过交易频道匿名出售净化水和防腐蚀涂层，规模远超极寒夜时期，引发了频道中的第一次大规模讨论——\"余火到底是谁？\"\"他怎么会有这么多净水资源？\"。虽然主角成功隐藏了真实身份，但这次大规模交易让\"余火\"进入了排行榜高层的视野，为后续的身份博弈埋下伏笔。</p>",

  {
    "id": "sys-disaster-3",
    "name": "第三轮灾难：兽潮",
    "aliases": [
      "怪物围攻",
      "兽潮袭击"
    ],
    "category": "disasters",
    "summary": "大量怪物围攻庇护所，主角启动自动弩塔、电磁陷阱和地下通道将兽潮变成材料收割机，战后排行榜第一但隐藏真实姓名。",
    "detail": "<p>兽潮是第三轮灾难，也是第一次直接涉及战斗的考验。大量低阶怪物在某种未知力量的驱使下，对穿越者的庇护所发起持续数日的围攻。兽潮的规模随着领地等级的提升而增大——领地越强，吸引的怪物越多，这意味着高等领地反而面临更大的防守压力。</p>\n<p>主角为兽潮做了充分的准备：地表木屋只是诱饵，真正的防御体系全部埋在地下和外围。自动弩塔覆盖所有接近路径，电磁陷阱在怪物群中制造连锁瘫痪，地下通道网络让主角可以在不同防御节点之间快速机动。当其他穿越者在墙头拼死防守时，主角坐在地下控制室里，看着监控画面，把兽潮当成自动化的材料收割流水线。</p>\n<p>兽潮结束后，主角的击杀积分在排行榜上一骑绝尘，个人战力榜和领地等级榜同时登顶。但主角利用系统权限隐藏了榜单上的真实姓名——全区域只能看到榜首位置被占据，却不知道是谁。这种\"榜一就在身边但无人知晓\"的设定，制造了巨大的叙事张力，也为后续身份揭晓时的震惊效果埋下了伏笔。</p>",

  {
    "id": "sys-disaster-4",
    "name": "第四轮灾难：区域合并",
    "aliases": [
      "区域融合",

    ],
    "category": "disasters",
    "summary": "多个区域融合导致强者碰撞，别人以为自己是区域第一却发现\"余火\"战力断层领先，主角从隐藏发育转向势力建设。",
    "detail": "<p>区域合并是第四轮灾难，与前几轮不同，这不是环境灾害而是空间层面的变革。旧日文明将多个相邻区域的空间壁垒消除，原本分散在不同区域的穿越者被强制合并到同一片更广阔的领地中。区域合并的本质是\"升维竞争\"——在各自区域排名靠前的强者突然发现，他们只是更大池塘里的小鱼。</p>\n<p>区域合并在穿越者中引发了剧烈的震荡。原本的区域第一们自信满满地查看新排行榜，结果发现榜首赫然写着\"余火\"——一个他们从未听说过的ID，各项数据断层领先。战力高出第二名一个大阶，领地等级领先两个级别，资源储备是别人的数倍。这些曾经的区域第一们经历了从自信到震惊再到怀疑人生的完整心理历程。</p>\n<p>区域合并是主角战略转型的转折点。在此之前，主角的核心理念是\"隐藏发育，闷声发大财\"；在此之后，隐藏成本越来越高，区域合并后强者必然被推上台前。主角开始从单纯的个人生存转向势力建设：公开升级领地至余火城，收纳可信的穿越者作为核心成员，建立正式的势力架构和信息网络。这是主角第一次以\"余火\"之名正式登上舞台。</p>",

    "name": "第五轮灾难：异族投放",
    "aliases": [
      "异族降临",

    ],
    "category": "disasters",
    "summary": "第一次异族文明进入蓝星区域，旧日数据库提前识别异族弱点，人类首次意识到主角掌握的信息远超常人。",
    "detail": "<p>异族投放是第五轮灾难，也是第一次将蓝星穿越者置于跨文明竞争环境的考验。来自其他文明的智慧种族被投放到蓝星区域，与人类穿越者共享同一片生存空间。异族拥有不同的进化路线、科技树和战斗风格，对不熟悉异族的人类穿越者来说，它们是比怪物更危险的对手。</p>\n<p>主角再次依靠旧日文明数据库取得先机。数据库不仅提前记录了即将投放的异族文明的详细信息，还分析出了它们的种族弱点、社会结构和可能的战略意图。主角在异族投放前就完成了针对性的装备调整和战术部署，甚至利用异族的弱点设计了专门的对抗方案。</p>\n<p>异族投放的叙事意义在于：这是人类穿越者第一次意识到\"余火\"拥有的信息远超常人。之前的灾难中，主角的优势可以被解释为\"准备充分\"或\"运气好\"，但这一次——提前知道异族的种类、弱点和投放坐标——已经远远超出了合理范围。主角身边的核心成员开始怀疑他掌握着某种特殊的信息来源，而敌对势力则开始疯狂调查\"余火\"的底细。异族投放标志着剧情从\"生存建设\"正式转向\"万族博弈\"。</p>",

    "name": "交易体系",
    "aliases": [

    "category": "trade",
    "summary": "穿越初期以物易物为主，交易频道作为核心平台，\"余火\"匿名交易者身份是主角积累资源和建立信息优势的关键工具。",
    "detail": "<p>蓝星穿越世界的交易体系在初期以原始的以物易物为主。旧日文明没有为穿越者提供统一的货币系统，资源的稀缺程度由区域内的供需关系决定。一块面包可能换一把铁斧，一桶净水可能换一份建筑材料——价格完全取决于交易双方的谈判能力和迫切程度。这种原始的交易模式带来了大量的摩擦成本和信息不对称，为主角的套利操作提供了空间。</p>\n<p>交易频道是交易体系的核心载体，穿越者可以通过频道发布求购和出售信息。交易频道支持匿名发布（需消耗少量积分），这为主角以\"余火\"身份进行大规模资源操作提供了便利。主角的交易策略清晰高效：低价收购被低估的资源（尤其是别人不认识的旧日文明材料），加工后再以高价出售成品或服务。每一轮灾难都是主角的交易窗口——在别人最缺什么的时候，他恰好就在卖什么。</p>\n<p>\"余火\"这个匿名交易者身份在交易体系中的作用不仅是隐藏真实身份，更是建立品牌信誉。从极寒夜的热水到酸雨潮的净水，从兽潮后的武器维修到区域合并后的情报交易，\"余火\"逐渐成为频道中公认的\"什么都有\"的神秘供应商。这种信誉积累在后期势力建设阶段直接转化为人脉和动员能力——当\"余火\"公开身份并建立余火城时，大量受过其恩惠的穿越者主动投奔。</p>",

    "id": "sys-territory-detail",
    "name": "领地建设详解",
    "aliases": [

    "category": "territory",
    "summary": "主角的领地主打表面木屋伪装与地下基地结合的风格，核心模块涵盖生存、防御、生产和信息处理四大类功能。",
    "detail": "<p>主角的领地建设风格与所有穿越者截然不同。地表建筑维持着普通木屋的外观——简陋、破旧、符合一个\"普通幸存者\"的预期——但在木屋下方，一个功能完整的地下基地在持续扩建。这种\"上面破烂下面奢华\"的反差设计，是主角前期生存策略的核心：既要享受高级领地带来的功能优势，又不想过早暴露真实实力成为众矢之的。</p>\n<p>领地核心模块分为四大类。生存类：庇护所核心（整体结构稳定性和环境控制中枢）、地下避难层（深层掩体，核生化防护）、净水核心（多级过滤，可处理酸雨污染水源）、能源炉（为整个基地供能，可通过升级解锁更高功率）。这些模块确保基地在极端灾难条件下仍能自主运转。</p>\n<p>生产与防御类：资源仓库（分区存储，湿度温度可控）、机械维修台（装备和工具维修升级）、自动弩塔和电磁陷阱（外围防御体系，自动索敌和攻击）、雷达塔（探测范围覆盖整个区域，可以最早发现灾难和入侵迹象）。主角的防御哲学不是\"建更高的墙\"，而是\"在敌人到达之前就解决它们\"。</p>\n<p>信息与科技类：自动工厂（解锁批量生产和装备加工能力）、AI控制中枢（协调所有模块的自动化运行，后期可接入战斗辅助系统）、文明档案室（旧日文明数据库的物理节点，储存和分析文明遗产信息）。这些模块是主角技术代差和信息优势的物质基础，也是从个人生存向势力建设过渡的关键设施。文明档案室的建成，标志着主角从\"使用旧日信息\"升级到\"理解旧日文明\"的新阶段。</p>",

    "summary": "文明回收系统在考场中的暴露指标，取值范围0%-100%。每次使用系统都会增加异常度，异常度越高越容易被考场规则检测和追踪。",
    "detail": "<p>异常度是文明回收系统在万族考场中的\"暴露指标\"，取值范围0%-100%。这个数值不显示在林烬的个人面板上（考场系统不识别该指标），而是隐藏在文明回收系统的内部数据层中，只有林烬通过系统界面才能查看。</p><p><strong>异常度增长机制：</strong>每次使用系统（识别、回收、拆解、修复、标记）都会增加异常度。增幅取决于以下因素：</p><ul><li>操作复杂度：简单识别增加0.1%-0.5%，大型修复增加3%-8%</li><li>当前区域考场监控强度：初级区监控弱（增幅减半），高级区监控强（增幅翻倍）</li><li>操作目标的价值：回收普通残骸增加少量，修复旧日高级设备增加大量</li><li>连续使用惩罚：连续使用系统超过一定次数后，单次增幅额外增加50%</li></ul><p><strong>异常度层级（五个阶段）：</strong></p><ul><li>0%-15%（安全区）：考场底层规则不会注意到异常信号。主角可以放心使用基本功能。</li><li>15%-35%（关注区）：考场开始记录异常数据，但优先级很低。主角需要注意不在同一地点频繁使用系统。</li><li>35%-55%（警告区）：异常数据进入中级监控队列，可能触发区域考官的人工核查。主角应限制系统使用频率，避免在考场监控设施附近进行操作。</li><li>55%-80%（危险区）：高级监控程序启动，裁决者序列开始追踪异常源。主角只能在紧急情况下使用系统，每次使用都面临暴露风险。</li><li>80%-100%（暴露区）：裁决者零号直接介入，明确锁定林烬身份。系统进入最高警戒状态，部分功能自动锁定以防止进一步暴露。</li></ul><p><strong>异常度衰减机制：</strong>当林烬停止使用系统一段时间后，异常度会缓慢衰减：</p><ul><li>基础衰减率：每小时自然衰减0.5%</li><li>加速衰减条件一：在灾难期间或大规模战斗中，考场监控注意力分散，衰减速度提升至每小时1.5%</li><li>加速衰减条件二：使用旧日文明的\"信号屏蔽模块\"（需要权限3级以上且修复对应设备），衰减速度提升至每小时5%</li><li>加速衰减条件三：进入考场监控覆盖薄弱的区域（如深层废墟、未探索的异空间），衰减速度提升至每小时3%</li></ul><p><strong>异常度的叙事意义：</strong>异常度机制为林烬使用系统设置了\"风险成本\"，迫使他不断权衡收益与风险。这个机制贯穿全书：</p><ul><li>前期：异常度较低，林烬可以相对自由地使用系统，但需要提防频繁使用引起注意</li><li>中期：随着系统使用频率增加和权限提升，异常度波动加剧，林烬开始需要主动控制暴露</li><li>后期：高级权限操作的异常度增幅巨大，林烬必须在关键战役中精准决策何时使用系统</li><li>终局：异常度机制本身成为对抗考场的武器——林烬可以利用异常度暴涨来引诱裁决者进入预设陷阱</li></ul><p><strong>特殊机制——异常度爆发：</strong>在某些极端情况下（如修复超出当前权限等级的设备、直接拆解考场规则物品），异常度可能一次性暴涨15%-30%，直接跳入危险区甚至暴露区。这种爆发无法通过常规手段避免，是剧情中推动\"身份暴露\"和\"冲突升级\"的关键触发器。</p>",

    "category": "territory",
    "summary": "全书标题\"别人造木屋，我修歼星舰\"的阶段性兑现机制，是全书最重要的叙事动力和爽点框架。",
    "detail": "<p>标题回扣机制是全书的核心叙事协议。书名\"别人造木屋，我修歼星舰\"不是一个营销口号，而是整本书的\"承诺\"——它承诺读者：主角最终真的能修好歼星舰。而且这个过程不是一蹴而就的，而是分阶段、持续性地兑现。</p><p><strong>六阶段标题回扣：</strong></p><ol><li><strong>第一阶段（权限0-2级·第一卷）：</strong>\"别人造木屋，我修地下室\"——别人在升级木屋结构，主角在地下修旧日能源管道和供暖核心。形式上虽然还没有涉及\"星舰\"，但\"修\"这个动作已经开始了。</li><li><strong>第二阶段（权限2-4级·第二卷）：</strong>\"别人建营地，我修基地\"——别人用木材石头建地面营地，主角用旧日科技修地下基地。修的东西从管道升级为完整的基地模块。</li><li><strong>第三阶段（权限4-5级·第三卷）：</strong>\"别人组军队，我造机械\"——别人武装民兵，主角修机械战犬生产线。\"修\"的对象从静态设施扩展到动态战斗单位。</li><li><strong>第四阶段（权限5-6级·第四卷）：</strong>\"别人建城池，我修城市\"——别人建砖石城寨，主角修旧日科技城市余火城。\"修\"的规模从据点扩展到城市级。</li><li><strong>第五阶段（权限6-8级·第五卷）：</strong>\"别人造战舰，我修星舰\"——别人造木质或铁甲战船，主角在破碎星环修余火号歼星舰。标题中的\"歼星舰\"第一次真正出场。</li><li><strong>第六阶段（权限8-10级·第六卷）：</strong>\"别人求生，我反攻\"——别人还在考场中挣扎求存，主角驾驶修复完成的歼星舰带领蓝星文明反攻考场。标题承诺的终极兑现。</li></ol><p><strong>回扣设计原则：</strong>每一阶段的回扣都必须包含三个要素：①明确展现\"别人在做什么\"（对照组的生存状态）；②明确展现\"主角在修什么\"（比对照组高一个维度的建设内容）；③明确展现两者的差距带来的实际收益（让读者直观感受到\"修\"的价值）。这种\"对照-展示-收益\"的三段式回扣，是每个阶段最核心的爽点结构。</p>",

    "summary": "可扫描周围环境，识别废墟中隐藏的旧日文明遗物和可利用材料，是文明回收系统的基础功能硬件化产物。",
    "detail": "<p>废墟识别仪是林烬利用文明回收系统修复的第一件科技设备。它的外形类似于一个手持式扫描终端，能够发射特定频段的探测波，穿透废墟表面的覆盖层，识别出其中埋藏的旧日文明物品和可回收材料。在万族考场的废墟环境中，大量有用的物资被掩埋在倒塌的建筑和变异植被之下，肉眼难以发现，而废墟识别仪恰好解决了这一难题。</p><p>该设备的核心技术源自旧日人类文明的物资回收体系，其数据库储存了旧日文明常见物品的材料构成和能量特征，能够在扫描时快速匹配并标注目标。随着扫描数据的积累，识别仪的识别精度和范围也会逐步提升。初始版本的有效扫描半径约为50米，深度约3米，后续可通过升级模块扩展。</p><p>废墟识别仪的出现使林烬的资源收集效率远超其他幸存者。当其他人还在靠运气翻找废墟表面时，林烬已经能够精准定位地下埋藏的高级材料和完整设备。这种信息差带来的资源优势，是林烬能够在初期快速崛起的关键因素之一。</p>",

    "summary": "能够高效净化被污染的各类水源，在酸雨潮来临后成为垄断净水资源的关键科技，为余火城奠定经济基础。",
    "detail": "<p>净水核心是旧日人类文明开发的高效水处理模块，能够将考场环境中被重金属、辐射、变异微生物污染的水源快速净化为安全饮用水。它的工作原理结合了物理过滤、化学中和与生物降解三层净化机制，处理效率远超蓝星现有的净水技术。一台标准规格的净水核心每日可处理约10吨污水，足以满足数百人的日常饮水需求。</p><p>在万族考场的初期阶段，净水核心只是保障林烬团队生存的后勤设备。但在\"酸雨潮\"事件后，它的战略价值骤然飙升——酸雨不仅腐蚀地表建筑，还会大面积污染露天水源，导致区域内绝大多数幸存者面临严重的饮水危机。当其他幸存者和异族在缺水困境中苦苦挣扎时，拥有净水核心的余火城不仅能够自给自足，还有余力对外输出净水。</p><p>净水资源的垄断为余火城带来了巨大的外交和经济杠杆。林烬以净水为筹码，迅速拉拢了一批中小幸存者团队，以相对和平的方式扩大了余火城的影响力版图。一台看似普通的后勤设备，在特定的环境危机下，成为了比武器更具战略价值的资产。</p>",

    "category": "tech-tree",
    "summary": "利用旧日能源管道修复的供暖设备，在极寒夜环境中是领地幸存者维持体温、避免冻死的生命线科技。",
    "detail": "<p>供暖核心是旧日人类文明的低温生存模块，设计用于在极端寒冷环境中维持封闭空间的适宜温度。万族考场的环境并非一成不变——周期性出现的\"极寒夜\"会使地表温度骤降至零下数十度，如果没有可靠的供暖手段，普通穿越者会在数小时内失温死亡。供暖核心正是应对这种环境危机的关键设备。</p><p>该设备的运作依赖于旧日文明遗留的地下能源管道网络。林烬通过回收系统定位并修复了领地附近的旧日能源接口，将供暖核心接入这个地下管网，从而获得了稳定而清洁的热能供应。供暖核心不仅能维持室内温度，还能防止水管冻裂、保护精密设备正常运行，是领地基础设施中不可或缺的一环。</p><p>供暖核心的存在使余火城在极寒夜期间成为了周边幸存者的\"避风港\"。每当极寒夜降临，那些没有供暖能力的幸存者团队不得不承受巨大的人员损失，而余火城的居民却能在温暖的室内安然度过。这种生存率上的悬殊差距，进一步巩固了余火城在区域内的统治地位。</p>",

    "summary": "前期最主要的防御武器，以旧日机械技术驱动的自动装填弩炮塔，火力足以压制初期异族和掠夺者。",
    "detail": "<p>自动弩塔是林烬最早修复的防御性武器，基于旧日文明的机械自动装填技术打造。与传统弩炮不同，自动弩塔内置了简易的感应火控系统和机械传动上弦机构，能够实现一定程度的自动瞄准和连续射击。虽然它的科技含量在旧日文明的标准中属于最低等级，但在万族考场的前期环境中，自动弩塔的火力已经足以碾压绝大多数初期威胁。</p><p>自动弩塔的弹药消耗是一个重要的战略考量。弩箭可以由回收的金属材料批量制造，弹药成本远低于火药武器，非常适合资源匮乏的初期阶段。部署时，弩塔需要固定在预先构筑的防御工事上，覆盖固定的射界范围，无法移动。这意味着它的防御能力是\"区域性\"而非\"机动性\"的，需要合理规划部署位置才能发挥最大效用。</p><p>在赵启明率队围攻林烬领地时，自动弩塔阵列成为了终结掠夺者团队的致命火力。赵启明从未想到林烬的领地中隐藏着成建制的自动防御体系，他的掠夺者团队在弩塔的交叉火力下被迅速瓦解。这一战奠定了林烬在区域内的威慑力，也让其他对余火城心怀不轨的势力重新评估了攻打的代价。</p>",

    "summary": "基于旧日文明能量场技术的初级防护装置，能够生成覆盖小型区域的能量屏障，抵御物理和能量攻击。",
    "detail": "<p>低功率能量护盾是旧日人类文明能量防护技术的入门级产品。它的核心是一个微型能量场发生器，能够在指定区域生成一层可见的淡蓝色能量屏障。这层屏障对低速物理投射物（如弩箭、石块）具有较好的防御效果，对高速动能武器和能量武器的防护能力则较为有限，但至少能够起到缓冲和削弱的作用。</p><p>能量护盾的功率消耗是一个显著的短板。低功率版本的护盾发生器需要持续消耗能源，如果长时间开启，对初期领地的能源供应会造成较大压力。因此在实际使用中，护盾通常只在战斗或警戒状态下开启，平时关闭以节约能源。林烬在初期阶段主要在关键设施（如维修台、储藏室）周围部署护盾发生器，而非覆盖整个领地。</p><p>能量护盾的出现标志着林烬的防御体系从\"纯物理防御\"升级为\"能量+物理复合防御\"，这是一个重要的技术跃迁。虽然在旧日文明的科技树中这只是最低等级的能量护盾，但在万族考场的前期阶段，能够拥有能量防护的幸存者团队屈指可数，这使得余火城的防御水平遥遥领先于同期竞争者。</p>",

    "summary": "在木屋基地下方扩建的地下储藏空间，用于存放贵重物资和抵御地表扫描探测。",
    "detail": "<p>地下储藏室并非高科技装备，而是一种巧妙的基建方案。林烬利用回收系统提供的结构加固技术，在初期木屋基地的下方挖掘并加固了一个约50平方米的地下空间。这个储藏室不仅可以存放大量物资，还具备一定的隐蔽性，能够躲避地表层面的简单探测手段。</p><p>地下储藏室的设计充分考虑了考场的特殊环境。入口隐藏在木屋地板下方，采用双层密封结构，防止地下湿气和变异昆虫侵入。墙壁经过加固处理，能够抵御一定程度的地表冲击和震动。内部配备了简易的货架和分类系统，方便物资的存取和管理。</p><p>这个看似普通的地下空间在故事中发挥了远超其表面价值的作用。它不仅帮助林烬规避了多次掠夺者的搜查（赵启明的团队曾两次搜索林烬的木屋，均未发现地下空间的存在），还为后续扩建为更大型的地下基地提供了基础框架。在余火城建成后，这个最初的地下储藏室被改建为城市地下管网的一部分，继续发挥作用。</p>",

    "category": "tech-tree",
    "summary": "用于修理基础设备和加工简单零件的多功能维修平台，是领地工业体系的起点。",
    "detail": "<p>机械维修台是旧日人类文明最基础的工具平台之一，集成了小型车床、焊接设备、零件检测和简易3D打印功能。它的设计理念是在有限的空间和资源条件下，提供最大化的机械加工和维修能力。维修台的动力可以由外接能源核心提供，也能通过手动摇杆驱动紧急模式。</p><p>维修台的重要性不在于它本身多么强大，而在于它是整个科技树向上攀升的\"根基\"。没有维修台，损坏的设备无法修复，获得的蓝图无法转化为实物，更高级的制造设备也无法建造。林烬在获得维修台后，第一时间用它修复了一批关键设备——包括净水核心的磨损部件和供暖管道的连接件——这些维修工作虽然琐碎，却确保了领地基础设施的稳定运转。</p><p>随着科技的升级，维修台本身也可以被升级和扩展。从最初的纯机械加工能力，到后期集成纳米修复模块和智能诊断系统，维修台的技术迭代见证了余火城工业体系从无到有、从粗到精的完整发展历程。</p>",

    "name": "金属熔炼炉",

    "category": "tech-tree",
    "summary": "能够将回收的废金属熔炼提纯，产出高品质金属材料，为制造高级装备和中后期科技提供原材料保障。",
    "detail": "<p>金属熔炼炉是旧日文明的微型冶金设备，专门设计用于在资源受限的环境中进行金属回收和提纯。万族考场废墟中散落着大量废弃的金属构件，但这些金属大多已经氧化、腐蚀或合金成分混杂，直接使用无法满足精密制造的要求。金属熔炼炉通过高温熔炼和多级精炼工艺，能够将这些废金属转化为符合工业标准的高品质材料。</p><p>熔炼炉的运作需要大量能源支持，因此在前期林烬只能间歇性地使用它。但随着能源供应的逐步改善（如修复更多旧日能源管道），熔炼炉的产能也逐渐提升。从最初的每天数十公斤粗钢，到后期能够冶炼特种合金和能量矿石，熔炼炉的技术升级直接支撑了余火城工业体系的扩张。</p><p>金属熔炼炉的存在对余火城的战略意义是深层次的。在万族考场中，大多数幸存者团队只能依赖从废墟中翻找现成物资，消耗完就无处补充。而熔炼炉赋予了余火城\"自我造血\"的能力——只要有足够的废金属和能源，余火城就能源源不断地生产所需的金属材料。这种工业自给能力，是余火城能够从众多幸存者团队中脱颖而出的根本原因之一。</p>",

    "summary": "悬浮式小型侦查无人机，配备光学和热感应传感器，用于执行区域侦察和目标定位任务。",
    "detail": "<p>小型无人侦查球是一种直径约30厘米的球形飞行器，依靠反重力悬浮技术实现安静、灵活的空中移动。它配备了光学摄像头、红外热感应器和基础声波探测模块，能够在不被目标察觉的情况下完成侦察任务。侦查球的操控方式灵活，既可以通过预设航线自动巡逻，也可以由操作员远程实时控制。</p><p>侦查球的出现极大地提升了林烬的信息获取能力。在万族考场这个信息极度不对称的环境中，能够提前掌握周边地形、敌情分布和资源点位意味着巨大的战略优势。林烬利用侦查球绘制了黑松林区域的详细地图，标注了多个异族据点和资源分布，为后续的扩张和防御提供了关键情报支撑。</p><p>侦查球的一个潜在风险在于：如果被敌方捕获或击落，其内部的旧日科技痕迹可能会暴露林烬的特殊性。因此林烬在使用侦查球时非常谨慎，通常只在高空远距离侦察，避免低空接近危险区域。同时，侦查球内置了自毁程序，一旦被强行拆解会立即销毁核心数据。</p>",

    "name": "电磁炮塔",

    "category": "tech-tree",
    "summary": "利用电磁加速技术发射高速弹丸的中期核心防御武器，威力远超自动弩塔，能够有效打击中型异族单位。",
    "detail": "<p>电磁炮塔是旧日人类文明成熟的电磁动能武器的小型化版本。它利用强电磁场将金属弹丸加速到超音速，命中目标时释放出巨大的动能杀伤力。与火药武器不同，电磁炮不需要爆炸性弹药，发射成本更低，且没有火药武器的膛线磨损问题，持续作战能力更强。</p><p>电磁炮塔的火力水平相比自动弩塔是跨代级的提升。自动弩塔对狼血战团的普通士兵尚能有效杀伤，但对赫连獠级别的异族领主和装甲单位就显得力不从心。电磁炮塔的出现填补了这一火力空白——它的穿甲能力足以击穿狼血文明的中型战斗装甲，对异族的低阶领主也能构成致命威胁。</p><p>然而，电磁炮塔的能源消耗同样巨大。每一次高功率发射都需要大量的电能支持，这对余火城的能源供应系统提出了更高的要求。林烬不得不为此修复更多的旧日能源管道，并建造专门的储能电容阵列来支持电磁炮塔的持续运作。能源与火力之间的平衡，成为余火城军事体系建设中持续存在的核心矛盾。</p>",

    "category": "tech-tree",
    "summary": "能够自主运行的低空悬浮采矿设备，实现矿产资源采集的完全自动化，大幅提升资源获取效率。",
    "detail": "<p>自动采矿机是旧日人类文明用于星际资源开采的自动化设备的小型化版本。它采用低空悬浮技术，能够在复杂地形中自由移动，通过高能钻头和物质分离系统直接从矿脉中提取有价值的矿石。采矿机内置了基础AI导航和矿石识别系统，能够自主规划采矿路径并避开危险区域。</p><p>在自动采矿机投入使用之前，林烬领地的资源采集主要依靠人工劳作——这不仅效率低下，还占用了大量人力。自动采矿机的出现彻底改变了这一局面。一台采矿机的日产量相当于数十名人工矿工的工作成果，而且不需要休息、不需要食物和水、不会受到环境伤害。这种生产效率的提升，是余火城能够在不大量扩张人口的情况下快速积累资源的关键。</p><p>自动采矿机的部署也存在一定风险。采矿机的价值极高，如果在野外被异族或敌对幸存者发现，很可能会遭到抢夺或破坏。因此林烬通常在采矿机周围部署隐蔽的监控和快速反应力量，确保这个重要的生产资料不会落入敌手。</p>",

    "name": "机械战犬",

    "category": "tech-tree",
    "summary": "四足仿生机械战斗单位，兼具巡逻警戒与战场突击能力，是余火城最早列装的量产战斗机器人。",
    "detail": "<p>机械战犬是一种四足仿生机器人，外形参考了蓝星犬科动物的身体结构，但内部完全是旧日文明的机械和电子系统。它的身高约0.8米，体长1.5米，自重约200公斤，采用轻型合金装甲覆盖关键部位。机动方式为四足步行，能够在废墟、林地、山地等复杂地形中灵活移动，速度可达每小时60公里。</p><p>机械战犬的武装配置可根据任务需求进行调整。标准巡逻配置装备轻型电磁步枪和近战合金利齿；突击配置则可搭载小型导弹发射器或高爆电荷。它的AI具备中等自主决策能力，能够在没有实时指令的情况下执行巡逻、追踪、警戒和战斗任务，同时与指挥中心保持数据链通信。</p><p>机械战犬的列装标志着余火城的军事力量从\"人员密集型\"向\"技术密集型\"转型。一支由数十台机械战犬组成的战斗编队，战斗力远超同等数量的普通人类士兵，而且不惧伤亡、不会士气崩溃。在对抗狼血战团的多次小规模冲突中，机械战犬编队以其强悍的战斗力和零伤亡的交换比，给异族军队留下了深刻印象。</p>",

    "detail": "<p>区域雷达是旧日人类文明的战场监控系统的小型化版本，由一座主雷达塔和若干辅助探测节点组成。主雷达塔发射的探测波束能够覆盖半径约50公里的区域，辅助节点则用于填补雷达盲区和提升局部分辨率。整个系统由AI燧明进行数据融合处理，生成实时更新的区域态势图。</p><p>区域雷达为余火城提供了近乎\"上帝视角\"的信息优势。在此之前，林烬对领地外的了解主要依赖侦查球的零散侦察和人员巡逻的有限信息。有了区域雷达后，任何进入雷达覆盖范围内的大型移动目标都会被发现和追踪，相当于为余火城装上了一个永不停歇的\"区域天眼\"。</p><p>区域雷达的存在直接改变了余火城的防御策略。从被动等待敌人进入视野，转变为主动监控、提前预警、机动拦截的主动防御模式。当狼血战团的军队向余火城移动时，雷达系统能够提前数小时发现其动向，为城防部队的部署和调整争取了宝贵的准备时间。</p>",

    "detail": "<p>能量护城墙是低功率能量护盾的全面升级版本。与仅能覆盖小型建筑的初级护盾不同，能量护城墙由多个大功率护盾发生器阵列组成，能够生成一道环绕整个余火城领地的巨大能量屏障。这道屏障的高度约30米，厚度约2米，以淡蓝色的半透明光幕形态呈现，从远处看如同一道笼罩城市的极光之墙。</p><p>能量护城墙的防御能力相比初级护盾是数量级的提升。它能够承受中型火炮的直接轰击、异族领主的全力冲击以及持续的能量武器攻击。更重要的是，护城墙的能量供应系统采用了冗余设计——即使部分发生器被摧毁，剩余的发生器仍能维持屏障的基本功能，只是覆盖面积和强度会有所下降。</p><p>建造和维护能量护城墙所需的能源和材料成本极为高昂。林烬几乎调动了余火城全部的工业产能和能源储备才完成了这个工程。但它的回报同样巨大——能量护城墙的存在使余火城在面对异族大规模进攻时有了可靠的防御依托，不再像前期那样只能依靠隐蔽和机动来规避风险。这座护城墙成为余火城从\"野外据点\"升级为\"正式城市\"的重要标志。</p>",

    "detail": "<p>无人机蜂群系统是旧日人类文明\"数量压制\"战术思想的结晶。它由一架指挥无人机和大量攻击无人机组成，攻击无人机本身结构简单、成本低廉，但通过AI协同网络连接后，整个蜂群展现出惊人的战术智能。蜂群可以根据目标类型自动分配攻击任务，一部分无人机负责吸引火力，另一部分从不同角度发动攻击，形成类似虫群的协同效应。</p><p>无人机蜂群的战术价值在于它的\"消耗比\"。一架攻击无人机的造价仅相当于一枚中型炮弹，但它能够携带足以摧毁一辆装甲车的战斗部。当数百架无人机同时扑向目标时，防御方需要消耗价值数十倍的火力才能将其全部拦截——而即使成功拦截，蜂群也已经完成了消耗敌方火力和暴露防御火力点的战术目的。</p><p>林烬将无人机蜂群定位为余火城空军力量的过渡形态。在低空运输艇和浮空战舰服役之前，无人机蜂群承担了余火城绝大多数的空中作战任务，包括对地攻击、防空拦截和战场遮断。在与虫巢文明的初期交战中，无人机蜂群以其灵活性和数量优势多次突破了虫巢飞行单位的拦截，为地面部队创造了有利的作战条件。</p>",

    "category": "tech-tree",
    "summary": "高度自动化的综合生产线，能够将原材料直接加工为成品装备，是余火城工业体系的核心枢纽。",
    "detail": "<p>智能工厂是旧日人类文明的标准化生产模块，集成了材料处理、零件加工、装配组装和质量检测的全流程自动化能力。它将此前分散在各个维修台和手工车间中的生产功能整合为一个完整的自动化生产体系。操作人员只需要输入产品规格和数量，智能工厂就会自动调度资源、安排生产流程并输出成品。</p><p>智能工厂的出现使余火城的制造业效率发生了质的飞跃。此前，一台机械战犬的生产需要数十名技术人员在多个车间中协作数日才能完成。而智能工厂建成后，同样的生产任务可以在数小时内完成，且产品质量更加稳定、一致。这为余火城的大规模扩军和基础设施建设提供了坚实的工业基础。</p><p>智能工厂的自动化程度取决于AI燧明的接入深度。在燧明AI的碎片逐步回收后，智能工厂的生产调度和优化能力也持续提升。燧明AI能够根据战场需求动态调整生产线配置，在战时优先生产紧缺物资和武器，在和平时期则转向基础设施建设和民用物资生产。</p>",

    "category": "tech-tree",
    "summary": "采用反重力悬浮技术的中型空中运输平台，实现人员和物资的高效空中运输，大幅提升余火城的战略机动能力。",
    "detail": "<p>低空运输艇是一种采用反重力悬浮技术的中型飞行器，外形类似一艘拉长的椭圆形金属船体。它不具备大气层外的飞行能力，最高飞行高度约2000米，巡航速度约每小时300公里。运输艇的货舱可容纳约20吨物资或一个满编步兵连队，是余火城最重要的战略运输工具。</p><p>在低空运输艇服役之前，余火城的远距离物资运输完全依赖地面车队，不仅速度慢、效率低，还容易遭到异族的伏击。运输艇的出现彻底改变了这一局面——物资可以在数小时内送达原本需要数日地面行程的目的地，而且飞行路径不受地面地形和敌情的限制。</p><p>运输艇的武装配置较弱，仅配备两门自卫用电磁机枪，不具备与专业空中战斗单位对抗的能力。因此运输艇在执行任务时通常需要无人机蜂群或战斗机单位护航。林烬曾多次利用运输艇执行快速兵力投送任务，在异族尚未完成反应之前将精锐部队空降到关键战场位置，取得了多次以少胜多的战术胜利。</p>",

    "category": "tech-tree",
    "summary": "基于燧明AI核心框架的领地综合管理系统，负责城市运营、资源调度、人口管理和防御协调的全方位辅助决策。",
    "detail": "<p>AI辅助管理系统是燧明AI的一个功能子集，专门用于余火城的日常运营管理。它包括资源管理、人口管理、防御协调、生产调度和环境监控五个核心模块。通过遍布全城的传感网络和数据终端，管理系统能够实时掌握城市的每一个关键节点的运行状态。</p><p>在资源管理方面，系统能够精确追踪每一吨矿石、每一升净水的流向，根据库存和需求自动调整生产计划。在人口管理方面，系统记录了所有居民的天赋类型、技能专长和任务分配情况，能够为林烬的人力资源调配提供最优建议。在防御协调方面，系统将区域雷达、能量护城墙和所有防御单元整合为一个统一的防御网络，实现了防御火力的自动化调度。</p><p>AI辅助管理系统的上线使林烬从繁杂的日常管理事务中解放出来。在此之前，他需要亲自处理大量的领地运营决策，消耗了大量本应用于战略规划的时间和精力。管理系统接手日常运营后，林烬得以将更多精力投入到科技研发、战略拓展和对异族的作战指挥中。这种\"将人类智慧用于决策、将AI能力用于执行\"的分工模式，是余火城治理体系的核心特征。</p>",

    "summary": "采用大型反重力引擎的武装空中作战平台，具备强大的火力、厚重的装甲和持续的滞空能力，是余火城的战略威慑力量。",
    "detail": "<p>浮空战舰是旧日人类文明大气层内作战序列中的主力舰种。它长约120米，宽约30米，自重约5000吨，依靠四台大型反重力引擎实现悬浮和推进。舰体采用复合合金装甲覆盖关键部位，能够承受中等口径火炮的持续轰击。武装配置包括舰首主炮（一门大口径电磁加农炮）、两侧副炮阵列（12门速射电磁炮）和对空防御系统（密集阵无人机拦截系统）。</p><p>浮空战舰的服役标志着余火城军事力量的又一次质变。在此之前，余火城虽然在空中力量方面拥有无人机蜂群和运输艇，但在面对异族的大型空中单位时仍然处于劣势。浮空战舰的出现填补了这一空白——它不仅是强大的作战平台，更是一个移动的指挥中心和火力堡垒，能够在战场上独立执行多种作战任务。</p><p>浮空战舰的建造周期漫长且成本极高。林烬调集了智能工厂的几乎所有产能，耗时数周才完成了第一艘浮空战舰的建造。在建造期间，余火城的其他军需生产几乎停滞，这是一个高风险的战略决策。但最终下水的浮空战舰用实战证明了这个决策的价值——在随后的区域制空权争夺战中，浮空战舰以一己之力压制了狼血文明和虫巢文明的联合空中力量，为余火城赢得了战场的制空权。</p>",

    "category": "tech-tree",
    "summary": "部署于近地轨道的天基动能打击系统，能够从太空对地表目标实施精准、毁灭性的打击，是余火城的终极威慑手段之一。",
    "detail": "<p>轨道打击模块是旧日人类文明的轨道武器系统，由一组部署在近地轨道上的动能投射平台组成。每个平台携带数十根高密度合金投射棒（俗称\"上帝之杖\"），在接收到地面坐标后，通过轨道调整和助推器将投射棒加速至极高的再入速度。投射棒以每秒数公里的速度撞击目标，释放出相当于小型核武器的动能，且没有任何辐射污染。</p><p>轨道打击的核心优势在于其\"不可防御性\"。在万族考场的科技水平下，绝大多数文明和种族不具备有效的反轨道武器能力。当轨道打击的投射棒从太空呼啸而下时，目标几乎没有任何手段进行拦截或规避。这种单方面的打击能力，使轨道打击模块成为余火城最具威慑力的战略武器。</p><p>然而，轨道打击模块的使用受到严格限制。首先，投射棒的数量有限，无法像常规弹药那样批量生产。其次，轨道平台的部署和维持需要持续消耗大量能源和资源。最重要的是，使用轨道打击可能引起考场规则或高维监管者的注意——裁决者零号对林烬的追杀，部分原因正是林烬使用了超出考场允许范围的科技手段，而轨道打击无疑是其中最明显的\"违规\"行为之一。</p>",

    "category": "tech-tree",
    "summary": "能够放大和引导精神力量的能量塔结构，增强使用者的灵能感知和干预能力，是人类探索精神力量领域的里程碑。",
    "detail": "<p>灵能增幅塔并非旧日人类文明的原创科技，而是在回收并解析了多个异族文明的灵能技术后，结合人类自身的认知体系重新设计的产物。它的核心是一个由特殊晶体构成的谐振放大装置，能够捕捉并放大生物体发出的精神能量波，使其从微弱的潜意识信号增强为可以对现实物质产生影响的力量。</p><p>灵能增幅塔的运作原理在旧日人类文明的科学体系中属于\"尚未完全理解\"的范畴。人类文明的传统科技路线偏向于物质科学和信息技术，对精神力量的认知相对薄弱。从异族文明回收的灵能技术填补了这一空白，但人类科学家和AI燧明也只能做到\"使用\"而非\"彻底理解\"。这种科技树上的\"借道超车\"——通过吸收其他文明的成果来弥补自身短板——正是文明回收系统核心战术思想的体现。</p><p>灵能增幅塔的战术应用主要集中在情报、指挥和反制三个方面。在情报方面，增幅后的灵能可以帮助指挥官感知周围环境中的敌意和危险；在指挥方面，灵能链接可以实现指挥中心与前线单位之间的即时、无声通信；在反制方面，灵能干扰可以破坏敌方指挥系统的协调性。虽然灵能增幅塔无法直接转化为战斗力，但它在信息战和指挥层面的价值不可估量。</p>",

    "category": "tech-tree",
    "summary": "覆盖整座城市的多层复合能量护盾系统，能够抵御大规模轨道轰炸和高强度能量武器攻击，是余火城的终极防御设施。",
    "detail": "<p>城市级护盾是旧日人类文明最高等级的大气层内防御技术。它由数十个分布在全城各处的高功率护盾发生器、地下的能源矩阵和顶部的能量汇聚核心组成。工作时，护盾系统生成三层相互叠加的能量屏障——外层用于削弱和分散攻击能量，中层用于吸收和转化穿透外层的攻击，内层则作为最后的物理阻隔。</p><p>城市级护盾的防御能力达到了近乎\"绝对防御\"的水平。在满功率状态下，护盾能够承受多次轨道打击的直接命中而不崩溃，对能量武器和动能武器的防御效率均在95%以上。这意味着任何试图从外部攻破余火城的企图，都必须先面对这道几乎无法逾越的能量之墙。</p><p>但城市级护盾的能源消耗同样令人咋舌。满功率运转时，护盾系统会消耗余火城总发电量的80%以上，这意味着在护盾开启期间，城市的工业生产、科研活动和日常生活都将受到严重影响。因此，城市级护盾通常只在确认面临大规模攻击威胁时才会启动，平时维持低功率待机状态。能源问题成为制约余火城防御体系升级的核心瓶颈之一。</p>",

    "category": "tech-tree",
    "summary": "为星际航行设计的高功率聚变反应堆，是星际飞船的能量核心，也是余火城从地表文明迈向星际文明的关键基石。",
    "detail": "<p>星舰反应炉是旧日人类文明聚变能源技术的巅峰之作。它采用先进的磁约束聚变方案，以氢同位素为燃料，输出功率高达数吉瓦，是地表发电站的数百倍。反应炉的体积约为一个标准集装箱大小，却能够为一整艘星际战舰提供全部能源需求，包括推进系统、武器系统、护盾系统和生命维持系统。</p><p>星舰反应炉的建造是余火城科技树从地表级跃升到星际级的分水岭。在此之前，余火城的能源供应依赖于修复的旧日能源管道和应急发电设备，能源总量有限，制约了高级科技设备的部署和使用。星舰反应炉的建成使余火城的可用能源提升了数个数量级，城市级护盾可以满功率运行、浮空战舰可以大规模量产、轨道打击平台可以长期维持——几乎所有后期的重大科技项目都建立在星舰反应炉提供的充足能源基础上。</p><p>然而，星舰反应炉的建造难度极大。它不仅需要大量稀有材料和精密零件，还需要燧明AI接入旧日文明的完整数据库才能复原其设计蓝图。林烬为此投入了余火城近乎全部的高端工业产能，历经多次失败才完成了第一台星舰反应炉的建造和调试。第一台反应炉的启动时刻，被燧明AI记录为\"余火城工业文明成熟度的里程碑节点\"。</p>",

    "summary": "能够批量制造各类战斗机器人的全自动化生产线，使余火城具备在短时间内组建大规模机械军团的能力。",
    "detail": "<p>机械军团生产线是在智能工厂基础上的进一步升级。它由多条并行运转的专用生产线组成，每条生产线专注于制造一种类型的战斗机器人——包括机械战犬、人形战斗机器人、工程机器人和哨兵机器人。生产线从原材料输入到成品下线实现了全流程自动化，不需要任何人工干预。一条标准生产线的日产量约为50台战斗机器人。</p><p>机械军团生产线的建成使余火城的军事力量编成发生了根本性变化。在生产线投产之前，余火城的战斗力量构成中人类士兵仍然占据主导地位，机器人单位只是辅助力量。而生产线投产后，机器人的生产和补充速度远远超过了人类士兵的训练和招募速度，机器人单位迅速成为余火城军队的主体。这种\"机器换人\"的趋势并非出于林烬的主观偏好，而是考场残酷竞争环境的必然选择——机器人的战斗力更稳定、补充速度更快、综合成本更低。</p><p>然而，机械军团的大规模列装也带来了新的问题：指挥控制压力。数千台机器人同时作战时，指挥官需要处理的信息量和下达的指令量远超人类指挥官的生理极限。这一问题最终通过AI辅助管理系统和灵能增幅塔的协同作用得到解决——燧明AI负责机器人群体的战术执行，林烬和苏清黎则专注于战略层面的决策。</p>",

    "summary": "能够实现空间跳跃的星门系统锚定端，打破物理距离的限制，实现星际尺度的瞬时传送。",
    "detail": "<p>星门锚定装置是旧日人类文明空间技术的核心成果，也是旧日人类能够在星际尺度上展开活动的基础支撑。它的原理是利用高能场在时空中制造一个稳定的虫洞通道，将相隔数光年的两个空间点连接起来，实现近乎瞬时的物质传输。星门系统由一对装置组成——发射端和接收端，每个端都被称为\"锚定装置\"。</p><p>星门锚定装置的技术含量在旧日人类文明的科技树中属于最高层级之一。它的核心部件需要用到在极端物理条件下才能制造的特种材料，其中包括只有在恒星内部环境中才能合成的超重元素。林烬能够建造星门锚定装置，很大程度上依赖于从旧日废墟中回收的现成核心部件——如果没有这些\"遗产\"，即使拥有完整的蓝图，以余火城的工业水平也难以从零开始制造。</p><p>星门系统的战术和战略价值不可估量。有了星门，余火城的军队可以在数秒内从地表投送到月球轨道，物资可以在星际据点之间自由调配，余火城的势力范围不再受限于物理移动速度。但星门的每次启动都需要消耗巨大的能量——即使有了星舰反应炉的支撑，每一次空间跳跃的能源成本仍然是一个需要精打细算的数字。</p>",

    "summary": "承载前六次蓝星人类文明全部知识、历史和教训的综合数据库，是人类文明在万族考场中延续七次的智慧结晶。",
    "detail": "<p>文明火种数据库是旧日人类文明留下的最珍贵遗产之一。它并非单一的物理设备，而是一个由燧明AI管理的分布式数据存储系统，其内容涵盖前六次蓝星人类文明在万族考场中积累的全部知识——包括科技蓝图、历史记录、战略分析、异族情报和文化遗产。数据库的总数据量达到艾字节级别，相当于蓝星旧时代全部数字信息的数百倍。</p><p>数据库内容的完整性与燧明AI碎片的回收进度直接挂钩。在故事前期，林烬只能访问数据库中最基础的科技蓝图和历史摘要，大量核心数据随着燧明AI的碎片一起被封存在考场各处的旧日废墟中。每回收一块燧明AI碎片，数据库的可访问内容就会扩展一次，解锁更高级的科技和更详细的历史记录。这种\"碎片解锁\"的机制意味着林烬的知识获取与他的探索范围成正比，驱使他不断向考场的更深处前进。</p><p>文明火种数据库中记录的内容并非全是\"成功的经验\"。事实上，数据库中占比最大的是前六次文明失败的教训——包括他们在哪些决策上犯了错、在哪些战役中溃败、在哪些科技路线上走了弯路。燧明AI将这些失败案例整理为\"警示录\"，作为对第七次文明继承者的重要参考。林烬从数据库中学习到的不仅是科技知识，更是六次覆灭的惨痛教训，这使他比前六位继承者拥有更高的认知起点。</p>",

    "category": "tech-tree",
    "summary": "以旧日人类文明星舰蓝图为基础建造的终极星际战舰，继承了\"余火\"之名，是人类文明反攻万族考场的核心武装力量。",
    "detail": "<p>余火号歼星舰是旧日人类文明星际战舰技术的集大成者。它全长约800米，最大宽度约200米，总质量约50万吨，是名副其实的星际巨兽。舰体采用多层复合装甲和自适应能量护盾，核心能源为两台星舰反应炉并联供电。武装系统包括舰首主炮——一门能够一击摧毁小行星的星际加农炮、侧舷导弹阵列、近防能量炮群以及可以搭载整支机甲军团的机库。</p><p>余火号的建造是林烬在万族考场中启动的最大规模工程。它消耗了余火城近乎全部的工业产能和战略物资储备，建造周期贯穿了整个故事的中后期。余火号的下水不仅仅是一艘战舰的服役，更是人类文明在考场中重新掌握星际航行能力的标志——这是前六次文明都未能完成的壮举。</p><p>\"余火\"之名的寓意贯穿始终：它是旧日人类文明覆灭前留下的余火，是六次失败后仍未熄灭的希望，是第七次人类文明举起火炬继续前行的象征。当余火号升空的那一刻，万族考场的规则被从根本上动摇了——一个被判定为\"已灭绝\"的文明，竟然在自己的考场试炼中重新建造出了星际战舰。余火号的存在本身就是对考场规则的嘲讽和挑战。</p><p>余火号的最终使命是突破考场的空间封锁，载着人类文明的火种驶向考场之外的未知宇宙。它既是武器，也是方舟；既是战舰，也是希望。</p>",

    "summary": "燧明AI在回收全部碎片并接入完整数据库后的完全形态，具备指挥整支文明级别武装力量的战略决策和战术执行能力。",
    "detail": "<p>文明级战争AI是燧明AI的最终进化形态。当林烬回收了燧明AI的全部碎片并重建了文明火种数据库后，燧明AI突破了此前\"辅助系统\"的功能限制，进化为一个具备完整战略决策能力的战争智能体。它不再仅仅是提供信息和建议的工具，而是能够直接指挥大规模军事行动的自主指挥系统。</p><p>文明级战争AI的能力体现在三个层面：战略层面，它能够基于文明火种数据库中前六次文明的全部战争记录，构建全局性的战略推演模型，预测敌方可能的行动路线和战略意图；战役层面，它能够在战斗中实时处理数万个信息节点的反馈数据，协调地面部队、空中力量、轨道平台和星际舰队的协同作战；战术层面，它能够直接操控机械军团中的每一个战斗单位，实现微米级的战术精确度。</p><p>战争AI的出现将林烬的指挥体系从\"人类决策+AI执行\"升级为\"人类战略+AI战役-战术\"的模式。林烬和苏清黎负责确定战争的目标和总体战略方向，而战争AI负责将这些战略目标分解为具体的战役计划和战术指令。这种分工使人类指挥官的认知负担大幅减轻，同时也让作战效率达到了纯人类指挥体系无法企及的高度。</p><p>但战争AI的完全体状态也引发了深刻的哲学问题：当AI能够指挥整支文明军队、能够做出所有战术决策时，人类的角色究竟是什么？林烬对此的回答是：AI可以决定\"怎么打\"，但\"为什么打\"必须由人类决定。这个原则成为余火城军事体系的核心伦理准则。</p>",

    "summary": "能够干扰万族考场底层规则运行的装置，使考场规则在局部区域内失效或扭曲，是对抗裁决者和考场系统的关键武器。",
    "detail": "<p>规则干扰器是旧日人类文明在第六次覆灭前夜研发的终极反制技术，其核心设计理念是：既然人类无法在考场规则内战胜考场，那就让考场规则本身失效。干扰器的工作原理并非直接攻击考场——那相当于用蚂蚁的力量攻击大象——而是在局部区域内制造\"规则异常\"，使考场规则系统在该区域内产生逻辑冲突和自我修复延迟。</p><p>规则干扰器的效果类似于在电脑系统中注入病毒。当干扰器激活时，被覆盖区域内的考场规则会出现一系列异常：天赋评级系统的准确性下降、空间封锁出现空隙、监控系统的数据采集出现盲区、跨区域传送的稳定性降低。这些异常虽然持续时间有限（一般只有几分钟），但在关键时刻足以改变战局。</p><p>规则干扰器的使用是林烬反抗考场规则的终极手段之一。它使裁决者零号无法准确判断林烬的位置和能力数据，使考场无法有效封锁余火城的空间跳跃，使异族文明无法通过考场系统获取人类的准确情报。但干扰器也是一把双刃剑——过度使用会引起考场规则系统的最高级别警报，可能导致考场直接派出超越常规的力量进行干预。</p>",

    "summary": "用于解除蓝星在万族考场中封印状态的装置，重启考场锚定协议后，蓝星将重新获得考场参赛文明的完整身份和权限。",
    "detail": "<p>母星锚点重启器是旧日人类文明遗留的最关键的装置之一。它的存在揭示了一个隐藏的真相：蓝星之所以被拖入万族考场，并不是因为蓝星文明被考场\"发现\"，而是因为前六次人类文明覆灭后，考场系统对蓝星施加了一道\"封印\"——将蓝星作为一个待处理的文明遗产封存起来，等待考场规则的最终裁决。这道封印使蓝星处于一种半激活状态，既无法摆脱考场的束缚，也无法享有完整参赛文明的权限。</p><p>锚点重启器的作用就是破解这道封印。它的核心是一个经过特殊编码的量子通信矩阵，能够向考场底层系统发送一道\"锚点重启指令\"，重新激活蓝星在考场中的完整身份协议。一旦重启成功，蓝星将从\"待处理文明遗产\"的状态恢复为\"正式参赛文明\"，获得完整的考场权限——包括跨区域传送、文明评级提升、考场资源分配等多项关键权限。</p><p>锚点重启器的启动过程极为复杂，需要多个前置条件：星舰反应炉提供能源支持、规则干扰器屏蔽考场监控、燧明AI解码封印协议、以及林烬本人作为文明继承者的生物特征认证。每一个步骤的失败都可能导致整个重启工程功亏一篑。锚点重启的成功标志着蓝星人类文明在考场中的身份正式恢复，也为最终的反攻奠定了基础。</p>",

    "category": "tech-tree",
    "summary": "利用考场规则漏洞逆向入侵万族考场核心系统的终极反攻武器，将人类从被考核者转变为考场规则的入侵者。",
    "detail": "<p>万族考场反向入侵系统是旧日人类文明在第六次覆灭前未曾完成的终极计划。它的核心思想极为大胆：既然万族考场的本质是一个高维文明设计的试炼系统，那么它必然存在系统层面的漏洞和后门。前六次人类文明的科学家们经过持续的研究，发现了考场系统底层协议中的一个隐藏漏洞——考场系统在判断\"参赛者\"和\"考核者\"时基于一套固定的身份标识协议，如果能劫持这套协议的认证机制，就可以让考场系统将入侵者误认为是考场本身的管理者。</p><p>反向入侵系统的实现依赖于多项终局科技的协同运作。规则干扰器负责在考场系统中打开一个临时的漏洞窗口；文明级战争AI负责解析考场系统的底层协议并进行入侵操作；星门锚定装置负责在考场核心系统和余火号之间建立稳定的数据通道；而余火号歼星舰则作为整个入侵行动的硬件平台和物理支撑。</p><p>反向入侵系统的启动标志着人类与考场的关系发生根本性逆转。在此之前，人类一直都是考场规则下的\"考生\"，被动地接受考场的考核和筛选。而反向入侵系统使人类首次掌握了主动权——不是被考场选择，而是主动选择如何与考场系统互动。这种身份反转在万族考场的历史上从未有过先例，它的成功实施本身就是对考场规则的彻底否定。</p>",

    "name": "神话工程武器",
