  height: 100vh;
  background: #16213e;
  border-right: 1px solid #0f3460;
  display: flex;
  flex-direction: column;
  position: sticky;
  top: 0;
  overflow: hidden;
  transition: margin-left .3s ease, opacity .3s ease;
  z-index: 100;
}
#sidebar.collapsed {
  margin-left: -300px;
  opacity: 0;
  pointer-events: none;
}
#sidebar-header {
  padding: 16px 18px;
  border-bottom: 1px solid #0f3460;
  display: flex;
  align-items: center;
  gap: 10px;
  flex-shrink: 0;
}
#sidebar-header .logo {
  font-size: 1.3rem;
  font-weight: 700;
  color: #e94560;
  letter-spacing: 2px;
  text-transform: uppercase;
}
#sidebar-header .subtitle {
  font-size: .75rem;
  color: #576574;
  margin-top: 2px;
}
#sidebar-header .toggle-btn {
  margin-left: auto;
  background: none;
  border: 1px solid #0f3460;
  color: #c8d6e5;
  width: 32px;
  height: 32px;
  border-radius: 4px;
  cursor: pointer;
  font-size: 1.1rem;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background .2s;
}
#sidebar-header .toggle-btn:hover { background: #0f3460; color: #e94560; }

  flex: 1;
  overflow-y: auto;
  padding: 8px 0;
}
.nav-category {
  border-bottom: 1px solid rgba(15,52,96,.3);
}
.nav-category-header {
  display: flex;
  align-items: center;
  padding: 10px 18px;
  cursor: pointer;
  transition: background .2s;
  user-select: none;
  gap: 8px;
}
.nav-category-header:hover { background: rgba(15,52,96,.3); }
.nav-category-header .arrow {
  font-size: .7rem;
  color: #0f3460;

  width: 14px;
  text-align: center;
  flex-shrink: 0;
}
.nav-category-header .arrow.open { transform: rotate(90deg); }
.nav-category-header .cat-icon {
  width: 20px;
  text-align: center;
  flex-shrink: 0;
  font-size: .9rem;
}
.nav-category-header .cat-name {
  flex: 1;
  font-size: .85rem;
  font-weight: 600;
  color: #c8d6e5;
  letter-spacing: .5px;
}
.nav-category-header .cat-count {
  font-size: .7rem;
  color: #576574;
  background: rgba(15,52,96,.4);
  padding: 1px 7px;
  border-radius: 8px;
}
.nav-entries {
  max-height: 0;
  overflow: hidden;
  transition: max-height .3s ease;
}
.nav-entries.open { max-height: 2000px; }
.nav-entry {
  display: block;
  padding: 7px 18px 7px 50px;
  font-size: .8rem;
  color: #8395a7;
  cursor: pointer;
  transition: background .2s, color .2s;
  border-left: 2px solid transparent;
}
.nav-entry:hover { background: rgba(15,52,96,.2); color: #c8d6e5; }
.nav-entry.active {
  color: #e94560;
  border-left-color: #e94560;
  background: rgba(233,69,96,.08);
}

  flex-direction: column;
  min-width: 0;
}

  border-bottom: 1px solid #0f3460;
  padding: 12px 24px;
  display: flex;
  align-items: center;
  gap: 16px;
  position: sticky;
  top: 0;
  z-index: 50;
  flex-shrink: 0;
}
#sidebar-toggle {
  background: none;
  border: 1px solid #0f3460;
  color: #c8d6e5;
  width: 36px;
  height: 36px;
  border-radius: 4px;
  cursor: pointer;
  font-size: 1.1rem;
  display: none;
  align-items: center;
  justify-content: center;
  transition: background .2s;
}

#search-box {

  max-width: 560px;
  position: relative;
}
#search-box input {
  width: 100%;
  padding: 9px 14px 9px 38px;
  background: #16213e;
  border: 1px solid #0f3460;
  border-radius: 6px;
  color: #c8d6e5;
  font-size: .85rem;

  transition: border-color .2s;
}
#search-box input:focus { border-color: #e94560; }
#search-box input::placeholder { color: #576574; }
#search-box::before {
  content: '\1F50D';
  position: absolute;
  left: 12px;
  top: 50%;
  transform: translateY(-50%);
  font-size: .85rem;
  opacity: .5;
}
#search-results-count {
  font-size: .78rem;
  color: #576574;
  white-space: nowrap;
  flex-shrink: 0;
}

/* Breadcrumb */
#breadcrumb {
  padding: 10px 24px;
  background: #13132b;
  border-bottom: 1px solid rgba(15,52,96,.2);
  font-size: .78rem;
  color: #576574;
  display: flex;
  align-items: center;
  gap: 6px;
  flex-wrap: wrap;
  flex-shrink: 0;
  min-height: 38px;
}
#breadcrumb .sep { color: #0f3460; }
#breadcrumb a {
  color: #0f3460;
  cursor: pointer;
}
#breadcrumb a:hover { color: #e94560; }
#breadcrumb .current { color: #c8d6e5; }

/* Content area */
#content {
  flex: 1;
  padding: 28px 32px;
  overflow-y: auto;
  max-width: 1100px;
}
#content.loading::after {
  content: '加载中...';
  display: block;
  text-align: center;
  padding: 80px 0;
  color: #576574;
  font-size: .9rem;
}

/* ========== Category Page ========== */
.category-header {
  margin-bottom: 24px;
}
.category-header h1 {
  font-size: 1.6rem;
  font-weight: 700;
  color: #e94560;
  margin-bottom: 6px;
}
.category-header p {
  color: #8395a7;
  font-size: .9rem;
}
.category-entry-list {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 14px;
}
.category-entry-card {
  background: #1a1a2e;
  border: 1px solid #0f3460;
  border-radius: 8px;
  padding: 16px 18px;
  cursor: pointer;
  transition: border-color .2s, transform .2s, box-shadow .2s;
}
.category-entry-card:hover {
  border-color: #e94560;
  transform: translateY(-2px);
  box-shadow: 0 4px 20px rgba(233,69,96,.1);
}
.category-entry-card h3 {
  font-size: .95rem;
  color: #c8d6e5;
  margin-bottom: 4px;
}
.category-entry-card .summary {
  font-size: .8rem;
  color: #8395a7;
  line-height: 1.5;
}
.category-entry-card .meta-row {
  display: flex;
  gap: 8px;
  margin-top: 8px;
  flex-wrap: wrap;
}
.category-entry-card .tag {
  font-size: .65rem;
  padding: 2px 8px;
  border-radius: 10px;
  background: rgba(15,52,96,.3);
  color: #576574;
}

.detail-header .summary {

  color: #8395a7;

  margin-bottom: 20px;

  padding: 4px 12px;

  font-size: .8rem;
  color: #c8d6e5;

}
.detail-section .related-item:hover {

  border-color: #e94560;
  color: #e94560;
}

/* ========== Search Results ========== */
.search-results {
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.search-result-item {
  background: #1a1a2e;
  border: 1px solid #0f3460;
  border-radius: 8px;
  padding: 14px 18px;
  cursor: pointer;
  transition: border-color .2s;
}
.search-result-item:hover { border-color: #e94560; }
.search-result-item .result-name {
  font-size: .95rem;
  font-weight: 600;
  color: #e94560;
  margin-bottom: 2px;
}
.search-result-item .result-category {
  font-size: .7rem;
  color: #0f3460;
  margin-bottom: 4px;
}
.search-result-item .result-summary {
  font-size: .82rem;
  color: #8395a7;
  line-height: 1.5;
}
.search-result-item .result-summary mark {
  background: rgba(233,69,96,.25);
  color: #e94560;
  padding: 0 3px;
  border-radius: 2px;
}
.search-empty {
  text-align: center;
  padding: 60px 20px;
  color: #576574;
}
.search-empty .big-icon { font-size: 2.5rem; margin-bottom: 12px; }

/* ========== Responsive ========== */
@media (max-width: 768px) {
  #sidebar {
    position: fixed;
    left: 0;
    top: 0;
    z-index: 200;
    box-shadow: 4px 0 30px rgba(0,0,0,.5);

  #sidebar.collapsed { margin-left: -300px; }
  #sidebar-toggle { display: flex; }
  #content { padding: 20px 16px; }
  .category-entry-list {
    grid-template-columns: 1fr;
  }
  #topbar { padding: 10px 14px; gap: 10px; }
  #breadcrumb { padding: 8px 16px; }
  .detail-meta { flex-direction: column; gap: 8px; }
}
@media (max-width: 480px) {
  html { font-size: 14px; }
  #sidebar { width: 260px; min-width: 260px; }
  #sidebar.collapsed { margin-left: -260px; }
  #content { padding: 16px 12px; }
}

/* ========== Print ========== */
@media print {
  #sidebar, #topbar, #breadcrumb { display: none; }
  body { background: #fff; color: #000; }
  #main { margin: 0; }
  #content { padding: 0; max-width: 100%; }
}

    "detail": "<p>万族考场从表面上来看，具备一切求生游戏的典型特征。每个人从一座木屋开始，需要面对饥饿、寒冷、怪物袭击和自然灾害。区域聊天频道让人们能够交流信息，排行榜激励人们不断变强。天赋系统赋予每个人独特的能力，怪物掉落物和资源点提供升级所需的材料。这一切的设计都极富\"游戏感\"，让人本能地将其理解为一个生存游戏。</p><p>然而，这层游戏外皮仅仅是一个界面。在游戏表象之下，万族考场本质上是由高等文明和旧神势力共同建立并维持的\"文明筛选系统\"。其核心目的不是娱乐、不是惩罚，而是对投放其中的文明进行全方位的评估和筛选。评判标准包括但不限于：文明的整体适应性、个体的进化潜力、社会结构在极端环境下的韧性、文明面对异族时的竞争力和合作能力。</p><p>考场本身有着严密的层级结构。从初级求生区到高维裁决区，每一个阶段都对应着不同的挑战和筛选标准。只有当文明在某一阶段展现出足够的价值，才能进入下一阶段。未能通过的文明将面临重置——记忆被清洗、科技被封锁、母星时间线被回收，一切从头再来。</p><p>万族考场并非专门为蓝星人类设计。无数文明都在这个考场中接受考验，人类只是其中之一。考场中运行的是一套通用的、跨文明的筛选规则，不受任何一个单一文明的意志左右。即使是考场的管理者——那些高维裁判和规则生命——也必须遵守考场的基本规则。</p>",

    "detail": "<p>这是蓝星人类第七次被投放进万族考场。在前面的六次循环中，人类文明都未能通过考场的最终考验，以失败告终。每一次失败的结果都是相同的：文明被彻底重置。所有幸存者的记忆被清洗，科技树被封锁，蓝星母星的时间线被回收并重新开始。人类对此浑然不觉，每一次都以为自己第一次来到这个世界。</p><p>前六次失败并非毫无痕迹。万族考场中散布着大量不属于当前时代的遗迹和残骸——倒塌的建筑、锈蚀的机械、残破的武器。这些被称为\"旧日遗迹\"的存在，正是前几轮人类文明留下的遗产。考场的信息清理并不完美，总有一些痕迹残留下来。那些能够解读这些遗迹的人，将有机会窥见真相的一角。</p><p>每一次循环中，人类文明的发展轨迹都有所不同，但最终的结局似乎总是相似的。区别在于失败的阶段和方式——有的在内部竞争中自相残杀而崩溃，有的在与异族战争中全军覆没，有的在高维裁决面前未能通过终极考验。而每一次失败后，考场都会从人类的失败中收集数据，优化下一轮的投放策略和规则设定。</p><p>关于前六次人类文明的具体信息极其稀少，不仅因为记忆被清洗，也因为考场主动掩盖真相。某些高层次的异族文明和考场管理者知道这一历史，但对于绝大多数穿越者来说，他们永远不知道自己正走在一条已经被走过六次的路上。揭开这个真相，是主角在未来面临的重大课题之一。</p>",

    "summary": "万族考场由多层组成——初级求生区、区域竞争区、文明接触区、万族边境战场、破碎星环、高维裁决区。",
    "detail": "<p>万族考场并非单一空间，而是一个由多个层级组成的嵌套结构。每一层对应着文明筛选的不同阶段，有着不同的规则、资源和挑战。文明的晋升路径是单向的：通过前一层的考验后，才能进入下一层。每一层的大门既是机遇也是筛选器。</p><p>第一层为<strong>初级求生区</strong>。所有文明起点相同——从一座木屋开始。资源极其贫瘠，规则最为严格，高级装备和能力在此区域受到能级压制的限制。怪物虽然较弱但数量众多，灾难频繁。这一层的作用是筛掉最弱的个体，只有具备基本生存能力的人才能存活。</p><p>第二层为<strong>区域竞争区</strong>。当文明达到一定规模后，初级区域会合并为更大的竞争区。排行榜从个人维度扩展为领地榜、击杀榜、资源榜等多维度竞争体系。核心矛盾从人与自然转向人与人、文明与文明之间的竞争。</p><p>第三层为<strong>文明接触区</strong>。在此区域，不同文明的正式接触成为常态。人类第一次确认自己不是唯一的\"玩家\"。异族的科技水平、社会结构和战斗方式千差万别，人类必须调整自己的认知和策略。</p><p>第四层为<strong>万族边境战场</strong>。不同文明的领地正式接壤，城池、军团、资源点进入全面争夺阶段。这是大规模的文明级战争前线。余火城在此阶段成为蓝星文明的核心势力据点。</p><p>第五层为<strong>破碎星环</strong>。这里是上一轮人类文明最终战败的战场遗迹。大量旧日舰队的残骸漂浮其中，余火号歼星舰的主体就埋藏在这片星环中。这是连接过去与未来的钥匙所在。</p><p>第六层为<strong>高维裁决区</strong>。万族考场真正的管理者、高维裁判和规则生命所在。到了这一层，主角面对的不再是异族领主或文明对手，而是考场规则本身。这是终极考验的舞台。</p>",

    "summary": "失败文明被重置记忆、封锁科技、回收母星时间线。考场不允许文明保留失败记忆。",
    "detail": "<p>万族考场最为残酷的规则莫过于文明循环规则。当一个文明在考场中失败——无论是因为内部崩溃、被异族消灭，还是在高维裁决中未能通过——该文明的结局是注定的：完整的文明重置。这不是简单的抹除或者放逐，而是一次系统性的、涵盖精神和物质两个层面的重新初始化。</p><p>重置的第一步是<strong>记忆清洗</strong>。所有幸存者的关于考场的记忆被彻底清除。这不仅仅是删除一段经历，而是从认知层面将整个考场体验抹去。被重置后的人会回到正常的生活轨迹上，对穿越经历毫无印象，即使看到相关证据也会本能地忽略或合理化。清洗的深度直达潜意识层面，确保了没有任何记忆碎片能够自然传承到下一轮。</p><p>重置的第二步是<strong>科技封锁</strong>。在考场中发展出的所有科技、技术、知识体系全部被回收或销毁。任何超越当前文明水平的科技成果都不允许保留。即便有人在重置后残留了某些知识碎片，也会因为没有相应的技术基础和环境支持而无法复现。这保证了每一轮文明的起点都基本一致。</p><p>重置的第三步是<strong>母星时间线回收</strong>。这可能是最令人恐惧的部分——失败文明的母星时间线被整体回收并重新开始。这意味着在蓝星上，所有人回到穿越发生之前的某个时间点，继续原本的生活，仿佛什么都没发生过。前一轮文明的存在、奋斗和毁灭，在历史上不留一丝痕迹。</p><p>考场之所以执行如此严格的文明循环规则，其目的并非单纯的残忍。这是文明筛选系统的基本机制——只有那些能够从零开始、在无先验知识的情况下依然能够通过考验的文明，才被认为具备真正的价值。依赖前一轮的记忆和经验，在考场看来是一种\"不公平优势\"，会扭曲筛选结果的有效性。</p>",

    "summary": "万族考场由高等文明和规则生命共同维持。考场本身有能级压制，高阶装备在低级区域会被限制。",
    "detail": "<p>万族考场的运行并非自然而然，而是由高等文明和被称为\"规则生命\"的神秘存在共同维持的。规则生命并非普通意义上的生物，它们是宇宙规则的具象化存在，本身就是法则的一部分。它们的存在确保了考场的基本规则在所有层级、对所有文明一视同仁地执行。</p><p>考场最基本的物理规则之一是<strong>能级压制系统</strong>。每一个考场层级都有着严格的能量等级上限。任何个体或物品的能量水平如果超过了当前层级的上限，就会被强制压制到该层级允许的范围内。这意味着，即使某人拥有高阶装备或强大能力，在低级区域也无法发挥全部力量。例如，一把星际级武器在初级求生区可能只能发挥出相当于铁剑的威力。</p><p>能级压制的存在有多重意义。首先，它保证了筛选的公平性——高级文明无法凭借装备优势在低级区域碾压初级文明。其次，它防止了低级区域被过于强大的力量破坏，维护了考场空间的稳定性。第三，它迫使文明在每个阶段都必须依靠当前层级所能提供的资源来发展，而非依赖外部输入。</p><p>高维规则还包括对空间和时间的特殊管理。考场中的空间可以折叠、扩展和重组，例如区域合并就是空间规则的体现。时间流逝在某些特殊区域可能与外界不同步。这些高维规则由规则生命直接管理，即使高等文明也无法完全理解或操控。规则生命的意志就是考场中的最高法则，即便是高维裁判也必须遵守。</p>",

    "detail": "<p>穿越事件发生在一个毫无预兆的瞬间。公元2024年的某一天，蓝星全体人类——无论身处何地、在做什么——同时消失。没有光芒、没有声响、没有过渡。一个人前一秒还在办公室工作、在学校上课、在家中休息，下一秒就发现自己站在一片陌生的荒野中，面前是一座简陋的木屋，脑中涌入大量陌生的信息。</p><p>这是蓝星文明第七次被投放进万族考场。投放范围覆盖了蓝星绝大多数适龄人类。未成年人、极高龄者、重病濒死者、孕妇等被转入\"火种保护区\"或\"母星锚点冻结层\"。普通穿越者前期不知道这件事，以为所有人都被投放或失踪。</p><p>投放方式是<strong>随机投放</strong>。每个穿越者被单独投放到初级求生区的随机位置。没有两个人被投放在同一个地点。</p><p>穿越后，每个人获得了以下初始配置：一座初级庇护所（木屋）、基础生存物资（包括少量食物、水、工具）、一个随机的初始天赋、个人属性面板、区域聊天频道权限，以及一个区域灾难倒计时。</p>",

    "detail": "<p>每个穿越者在进入考场后立即获得了标准化的开局配置。这套配置对所有文明、所有穿越者基本一致，体现了考场\"公平起点\"的基本原则。配置包括六个核心组成部分，覆盖了生存所需的基本要素。</p><p><strong>初级庇护所（木屋）</strong>：这是每个人在这个世界的第一落脚点。木屋结构简陋，面积约十余平方米，仅能提供基本的遮风挡雨功能。木屋配备了一扇门和一扇窗，墙体为普通木质结构，防御力几乎为零。木屋内有一张简易床铺和一个工作台。每个人可以在木屋的基础上进行扩建、加固和改造。</p><p><strong>基础生存物资</strong>：初始物资包括少量饮用水（约够3天用量）、少量干粮（约够3天用量）、一把基础石制工具（斧头或镐子）、一个简易火种、一块基础布料。这些物资仅够支撑最开始的几天生存，迫使穿越者必须尽快掌握采集、狩猎和建造技能。</p><p><strong>随机初始天赋</strong>：这是开局配置中唯一的变量。天赋是从一个庞大的天赋库中随机抽取的，涵盖战斗、生产、感知、精神、特殊等各个类别。天赋的品质和类型完全随机，造成了穿越者之间最初的差距。天赋可以通过后续的成长和进化来升级。</p><p><strong>个人属性面板</strong>：每个穿越者可以通过意识调出一个半透明的属性面板。面板显示六维基础属性（力量、敏捷、体质、智力、感知、意志）、生命值、体力值、当前状态、已习得技能和天赋信息。面板是穿越者了解自身状态的主要工具。</p><p><strong>区域聊天频道</strong>：每个穿越者自动加入所在区域的聊天频道。频道支持文字交流，初期只能与同区域的穿越者沟通。频道范围会随着区域合并而扩展。</p><p><strong>区域灾难倒计时</strong>：每个人的面板上都有一个倒计时，显示下一次区域灾难的剩余时间。灾难类型包括但不限于兽潮、暴风雪、酸雨、地震、虫灾等。倒计时是区域所有穿越者同步的，意味着灾难是群体性事件。</p>",

    "detail": "<p>在穿越初期，绝大多数人将木屋视为自己的安全屋和避难所。他们加固它、扩建它、在里面储存物资、在遭遇危险时躲进它。这是人之常情——在陌生的世界中，一个属于自己的空间是最基本的安全需求。但木屋的真正功能远非如此简单。</p><p>木屋的真正身份是考场发放的<strong>初级文明锚点</strong>。\"锚点\"的含义比\"庇护所\"深刻得多。每一座木屋都是考场监测系统的一部分，是一个嵌入到穿越者生存环境中的数据采集终端。从穿越者建造木屋的第一刻起，木屋就开始持续记录其主人的一切行为和状态。</p><p>木屋记录的数据维度极其广泛。包括但不限于：穿越者的日常行为模式（何时睡觉、何时工作、活动范围）、成长潜力评估（升级速度、技能掌握效率、天赋开发程度）、心理状态变化（应激反应、孤独感表现、合作意愿）、杀戮倾向（对怪物和人类的攻击性、杀戮频率和方式）以及文明适应性（社会合作能力、资源共享倾向、领导力表现）。</p><p>所有这些数据被实时上传至考场的中央评估系统。每一座木屋都是一个评分终端，持续不断地对其主人进行多维度评分。这意味着，从穿越的第一秒开始，每个人都在被观察、被评估、被筛选。没有人是自由的观察者，每个人都是被观察的实验对象。所谓的安全屋，不过是一个精巧设计的监视器。</p><p>木屋的这一真相如果被广泛知晓，将在穿越者中引发巨大的信任危机。因为这意味着，任何建在木屋内的秘密据点都不安全，任何在木屋中的谈话都可能被记录和分析。主角在成长过程中逐渐意识到这一点，并因此对木屋的使用方式做出了与普通穿越者截然不同的判断。</p>",

    "detail": "<p>初级求生区是万族考场的第一层级，也是所有穿越者的起点。这一阶段的特征是极端的资源匮乏和频繁的生存威胁。每个人从一座简陋的木屋和基础物资开始，必须依靠自己和同区域的其他人才能在不断出现的生存危机中存活下去。这是最残酷但也最公平的阶段——所有人都在同一条起跑线上。</p><p>资源方面，初级求生区几乎没有任何现成的资源供给。食物和水需要自己寻找和采集，建筑材料需要自己去砍伐和开采，工具和武器需要自己制作。</p><p>怪物方面，初级求生区的怪物相对较弱——野狼、变异蜘蛛、哥布林等低阶生物——但数量庞大且出没频繁。夜间是怪物活动的高峰期。</p><p>灾难事件是初级求生区的另一个核心特征。灾难以倒计时的形式通知所有穿越者，但具体类型直到发生前夕才揭晓。</p>",

    "summary": "家庭被拆散、国家失效、财富变废纸、社会地位重新洗牌。但军人的组织能力、医生的技术、工程师的技能仍然有价值。",
    "detail": "<p>全民穿越对蓝星人类社会造成的冲击是全方位的、毁灭性的。在穿越发生的那一刻，人类数千年积累的社会结构、文化传统、经济体系和权力格局在一瞬间被彻底粉碎。无论你是亿万富翁还是流浪汉，无论你是国家元首还是普通职员，穿越之后所有人都回到了同一条起跑线上——一座木屋、一点物资、一个随机天赋。</p><p><strong>家庭的瓦解</strong>是最沉重的打击。随机投放机制确保没有两个人被投放到同一地点，这意味着每一对夫妻、每一对亲子、每一对兄弟姐妹在穿越的瞬间被迫分离。穿越者在最初的几天里最强烈的情绪不是恐惧，而是对失踪亲人的焦虑和思念。聊天频道中最常见的信息不是关于生存技巧的询问，而是寻找家人的呼喊——\"有人见到我妻子吗？\"\"我儿子叫XXX，有人知道他在哪个区域吗？\"</p><p><strong>国家和政府体系的崩溃</strong>是另一个致命打击。军队找不到指挥官，政府官员联系不到上级，法律执行系统完全瘫痪。边境消失了、国土概念变得毫无意义——因为没有人知道自己的地理位置相对于其他穿越者在哪里。国家的概念在穿越后的几小时内就从有效组织形式变成了虚无缥缈的集体记忆。</p><p><strong>财富和地位的归零</strong>让所有穿越者经历了最彻底的社会洗牌。银行存款变成了无意义的数字，房产证成了一张废纸，股票、债券、奢侈品——一切在旧世界中代表财富和地位的东西都失去了价值。旧世界的社会等级被彻底抹平，一个全新的、由天赋、能力和运气决定的社会秩序正在形成。</p><p>然而，并非所有旧世界的能力都失去了价值。那些在旧世界中掌握实用技能的人在新世界中展现出明显的优势。<strong>军人</strong>的纪律性和组织能力让他们更容易在混乱中建立秩序；<strong>医生</strong>的医疗知识在所有人都会受伤的世界中变得至关重要；<strong>工程师</strong>和<strong>工匠</strong>的技能在需要建造和维修的环境中价值倍增。<strong>农民</strong>、<strong>猎手</strong>、<strong>厨师</strong>——所有掌握实际生产技能的人都在新世界中获得了前所未有的社会地位。相反，那些只擅长金融操作、行政管理或社交媒体运营的人发现自己的技能几乎毫无用处。</p>",

    "detail": "<p>全民穿越所造成的社会变革，其深度和广度远远超过了人类历史上任何一次革命或灾难。这不是简单的\"换地图\"——把一群人从一个地方搬到另一个地方。这是人类社会的一次彻底解构和重组，所有旧有的社会纽带、权力结构、价值体系都被拆成了碎片，然后在全新的环境和规则下重新组装。</p><p>社会重组的第一个标志是<strong>生存优先原则</strong>取代了一切旧有的社会规范。在穿越后的世界中，一个人的价值首先由他的生存能力决定——他能养活自己吗？他能保护自己吗？他能为群体提供什么贡献？那些在旧世界中备受尊敬的职业（如金融分析师、市场营销专家、社交媒体运营）在新世界中失去了所有社会地位。而体力劳动者、工匠、农民、医生、军人——这些在旧世界中地位一般的职业——现在成为了社会的中坚力量。</p><p>社会重组的第二个标志是<strong>权力的重新分配</strong>。旧世界的权力体系在一瞬间瓦解，新的权力结构从零开始形成。新的领导者不是由选举或继承产生的，而是通过实际行动证明自己的能力——谁能组织狩猎队、谁能建立防御工事、谁能解决团队内部的矛盾。领导力变成了一个极其务实的概念：你能解决的问题越多，你能保护的人越多，你的领导地位就越稳固。</p><p>社会重组的第三个标志是<strong>新的经济体系</strong>的形成。货币失去了意义，以物易物成为最初的交易方式。但随着社会的发展，某些具有稳定价值的物品（如稀有材料、武器装备、天赋升级道具）开始承担货币的职能。交易网络从最开始的个人对个人，发展到营地对营地，最终到城池对城池的规模。</p><p>社会重组的第四个标志是<strong>文化和价值观的演变</strong>。在生死存亡的极端压力下，人类的文化和价值观发生了深刻的变化。个人主义在生存压力面前让位于集体主义（至少在初期如此）。注重实用和效率的价值观取代了注重形式和仪式的价值观。对力量和能力的崇拜取代了对财富和血统的崇拜。这一切变化都是环境驱动的自然演化，而非任何人为设计的结果。</p><p>然而，人类社会重组并非一帆风顺。旧世界的社会惯性依然存在——偏见、歧视、不信任不会因为穿越而自动消失。来自不同国家、不同文化背景的人之间仍然存在摩擦。而且随着生存压力的缓解，旧世界的一些负面社会现象——阶层固化、权力滥用、剥削——也开始在新的社会结构中重新出现。人类社会重组的过程，本身就是文明筛选的一部分：考场在观察人类是否有能力在废墟上建立一个更公平、更有韧性、更具适应性的新文明。</p>",

    "detail": "本书表层类型：全民穿越、全民求生、领地建设、万族争霸、系统升级、科技修复。\n\n本书深层类型：文明遗产继承、文明重启、历史追索、规则反抗、失败文明复仇、人类第七次自救。\n\n## 世界表层\n在普通蓝星穿越者眼中，这是一个残酷但规则清晰的求生游戏：初始木屋、个人面板、初始天赋、聊天频道、交易市场、排行榜、怪物刷新、资源采集、灾难倒计时、领地升级、区域合并、异族入侵。他们以为只要能活下去、升级木屋、打怪上榜，总有一天就能通关回到蓝星。这种认知是错误的——但在前期足够合理也足够迷惑人。\n\n## 世界深层真相\n这个世界不是游戏。全民穿越本质上是蓝星文明被强制纳入万族考场。万族考场不是善意试炼，而是由高等文明、规则生命、高维裁判共同维护的文明筛选体系。其真实目标：筛选有潜力的文明、淘汰无法适应的文明、收割失败文明遗产、奴役通过试炼但无力反抗的文明、防止威胁考场秩序的新文明崛起、维持高等文明对低等文明的长期统治。所谓通关不等于自由，所谓胜利不等于回家。\n\n## 蓝星人类的特殊性\n这是第七次投放。前六轮人类文明都曾进入万族考场，全部失败。每次失败后考场启动文明重置：清洗幸存者记忆、抹除超凡和科技痕迹、封存母星蓝星、收割可用遗产、抹掉历史记录，等待下一轮投放。\n\n## 世界核心矛盾（五层）\n第一层：人与环境（寒冷、饥饿、缺水、怪物、灾难）\n第二层：人与人（资源争夺、掠夺者、道德绑架、排行榜嫉妒）\n第三层：人与异族（狼血文明、虫巢文明、万族边境战场）\n第四层：人与历史（前六轮人类为什么失败、谁背叛了人类）\n第五层：人与规则（通关骗局、高维裁判、文明重置机制）\n\n## 全书核心母题\n别人看到木屋，主角看到文明锚点。别人看到废铁，主角看到舰体装甲。别人看到灾难，主角看到资源涨价机会。别人想通关，主角发现通关是奴役协议。别人造木屋，主角修歼星舰。\n\n## 真相揭露节奏\n第一卷：发现旧日遗迹，\"余火号\"首次出现，\"第七轮人类\"概念出现。\n第二卷：旧日前哨站，文明回收系统与旧日人类有关。\n第三卷：蓝星不是唯一文明，异族熟悉考场，前几轮失败不是传说。\n第四卷：余火城继承旧日战争体系，考场开始察觉主角异常。\n第五卷：第六轮人类曾接近攻入考场核心，通关不代表自由。\n第六卷：全部真相——万族考场是文明奴役系统，林烬的终极任务是终止人类文明重置。\n\n## 终局方向\n个人层面：林烬从普通求生者成长为蓝星文明统帅。\n文明层面：蓝星人类恢复前六轮被清洗的历史，继承旧日遗产。\n规则层面：修复余火号，破解考场规则，切断文明重置机制。",

    "summary": "蓝星普通青年穿越万族考场，觉醒\"文明回收系统\"，从黑松林区的无名求生者一步步成长为反抗万族考场规则的领袖。",
    "detail": "<p>林烬，24岁，穿越前为蓝星的一名机械维修工兼策略游戏资深玩家。他没有显赫的背景，也没有超凡的体能，唯一出众的是在无数策略游戏中锤炼出的资源规划能力和战术判断力。在万族考场降临、蓝星被拖入残酷的种族淘汰游戏时，林烬与其他黑松林区初始投放的数万名穿越者一同出现在废墟之中。蓝星整体投放人数达数十亿，被拆分进大量初级试炼区，黑松林区只是其中之一。</p><p>他的天赋面板上显示着一个令所有人迷惑的条目——\"文明回收系统\"，评级为\"未知级\"。这个评级在万族考场的记录中从未出现过，既不被认为是垃圾天赋，也不被认可为高阶天赋。事实上，这个所谓的\"天赋\"并非考场赋予的能力，而是上一轮人类文明灭亡前留下的最后火种——\"余火协议\"，它伪装成考场天赋的格式，潜入林烬的面板之中。</p><p>林烬的性格可以用四个词概括：冷静、谨慎、现实、狠辣。他不圣母，不冲动，在生死存亡的考场中始终保持清醒的头脑。他会在救人与保命之间做出理性的取舍，会对敌人毫不留情地斩草除根。但这种冷酷并非天生——穿越前的他是个普通但善良的年轻人，是考场的残酷环境逼迫他一层层剥下了不必要的柔软。然而，他始终保留了一条底线：不对蓝星同胞主动下手。</p><p>他的成长路线是一条从蝼蚁到巨兽的攀升之路：最初只是个在黑松林区挣扎求生的普通穿越者，靠着回收废墟材料艰难存活；在度过初期阶段后，他开始利用回收系统修复模块，逐步建立起自己的领地，成为隐藏的一方大佬；当区域格局稳定后，他整合周边幸存者，成为黑松林区域公认的领袖；随后他建立余火城，以此为基地发展科技与军事力量；随着蓝星文明的整体崛起，他成为蓝星文明统帅，带领同胞应对异族的压迫；在深入探索旧日文明的遗迹后，他继承了失败六次的人类文明遗产，成为旧日文明继承者；最终，他的目光从生存转向反抗，成为万族考场规则的挑战者。</p><p>林烬的核心矛盾贯穿始终：他究竟只是为了自己活下去，还是应该继承那失败六次的人类文明使命？文明回收系统（余火协议）承载着上一轮人类文明的希望——修复星舰、反攻考场、打破万族压迫的循环。但这意味着他要承担远超一个普通人生存需求的重量。每一次选择，都在\"明哲保身\"与\"负重前行\"之间撕扯。当裁决者零号发现他身上的旧日协议痕迹并试图抹杀他时，他被迫从暗处走到台前，从被动求生转向主动反抗。</p><p>在人际关系上，林烬与苏清黎形成了互补的合作关系——他的大局观与她的执行力结合，构成了余火城军事指挥的核心。他与燧明AI的关系更像是文明继承者与文明守护者的传承纽带。而他与赵启明、赫连獠、裁决者零号等对手的对抗，则分别代表了他在不同阶段面临的挑战：人类内部的掠夺、异族的野蛮侵略、以及考场规则本身的降维打击。</p>",

    "detail": "<p><strong>系统真名：</strong>旧日人类文明第六轮余火延续协议（简称\"余火协议\"）</p><p><strong>系统别名：</strong>文明回收系统（对考场伪装后的显示名称）</p><p><strong>系统伪装：</strong>考场天赋面板中的\"未知级\"天赋条目</p><hr><h3>一、系统定位</h3><p>文明回收系统不是万族考场赋予林烬的\"天赋\"，而是第六轮人类文明在彻底灭亡前夜，由残存科学家与最高AI燧明共同制定的\"余火计划\"的最终产物。这个计划的本质是：既然无法阻止第六轮文明的覆灭，那就为第七轮留下一个火种。</p><p>系统被设计为可以伪装成考场天赋格式的程序，嵌入第七轮人类穿越者的天赋面板中，从而避开考场的初始审查。它不是一个\"万能金手指\"，而是一份沉重的文明遗产——它不会替林烬战斗，不会给他无限资源，但它给了他一条路：从废墟中识别出旧日文明的碎片，逐步恢复人类曾经拥有但已经失去的一切。</p><hr><h3>二、系统继承者选择条件</h3><p>余火协议并非随机选择绑定者，而是经过严格筛选。林烬被选中的原因包括：</p><ol><li><strong>坐标匹配：</strong>林烬被投放的位置恰好是第六轮文明火种协议预设的\"继承者投放坐标区\"。考场随机投放时他正好落在该区域，是概率与设计的交汇。</li><li><strong>精神频率兼容：</strong>余火协议需要与继承者的精神频率建立链接。林烬的神经信号特征与旧日人类的基础频段高度吻合，适配度达到91.3%。</li><li><strong>工作经验相关：</strong>林烬穿越前的机械维修经验使他对旧日文明的工程类遗物具有天然的感知和理解基础，降低了系统的\"认知门槛\"。</li><li><strong>性格筛选：</strong>余火协议在激活前对林烬进行了潜意识层面的性格扫描，评估标准包括：抗压能力、决策理性、道德底线和对未知事物的接受度。林烬的评估结果为\"可适配\"。</li><li><strong>意外因素：</strong>林烬在穿越后第一小时内无意识地触碰了一块旧日文明舰体碎片（余火号装甲碎片），该碎片中储存的微量权限代码触发了余火协议的紧急激活程序。如果他没有在特定时间内触碰碎片，协议可能推迟激活甚至永久休眠。</li></ol><hr><h3>三、系统核心能力（六项）</h3><p><strong>1. 识别：</strong>系统可以扫描林烬视野范围内的物体，识别出其中包含的旧日文明遗物、可回收材料和潜在价值。识别结果以半透明文字标签的形式叠加在林烬的视觉画面上。识别精度取决于系统权限等级和目标的完整度。</p><p><strong>2. 标记：</strong>对已识别的目标进行标记，标记后的目标会在林烬的面板地图上持续显示位置。标记数量受权限等级限制（初始上限50个，每升一级增加50个）。</p><p><strong>3. 回收：</strong>将识别出的旧日文明遗物或材料分解为基础资源。回收过程需要消耗一定的精神力和时间，但不需要额外的工具或设备。回收效率取决于目标完整度和系统权限等级。</p><p><strong>4. 拆解：</strong>对较为复杂的旧日文明设备进行精细拆解，获得零部件、蓝图碎片、权限代码碎片等高级物品。拆解比回收耗时更长、消耗更大，但收益也更高。</p><p><strong>5. 修复：</strong>消耗回收获得的资源和蓝图，修复旧日文明设备或模块。修复是系统的核心功能之一，也是主角科技树升级的主要途径。修复需要满足三个条件：充足的修复材料、正确的蓝图（或设计图）、以及足够的权限等级。</p><p><strong>6. 记录：</strong>系统自动记录林烬回收、拆解、修复过的所有物品信息，形成一份不断扩充的\"文明档案\"。这些档案不仅是数据库，更可能包含前几轮文明的隐藏知识和历史记录。档案的解密程度受权限等级限制。</p><hr><h3>四、系统权限等级体系（10级）</h3><p><strong>权限0级（初始状态）：</strong>解锁功能：识别、回收。限制：仅能识别完整度&lt;10%的残骸碎片，回收效率极低。权限代码碎片持有量：0。升级条件：回收第一块旧日文明物品（触发激活）。</p><p><strong>权限1级（基础使用）：</strong>解锁功能：标记。新增功能：可查看回收物品的简要来源描述。回收效率提升至1.5倍。升级条件：回收总量达到50单位，且至少回收一件完整度&gt;5%的遗物。</p><p><strong>权限2级（初步掌握）：</strong>解锁功能：拆解（仅限简单机械结构）。新增功能：系统界面增加\"文明档案\"入口，可查看已回收物品的分类列表。回收效率2倍。升级条件：回收总量达到200单位，且获得第一块权限代码碎片。</p><p><strong>权限3级（中级应用）：</strong>解锁功能：修复（仅限基础功能设备，如净水核心、简易发电机）。新增功能：扫描半径扩展至100米。升级条件：回收总量达到500单位，权限碎片持有量≥3，且成功修复第一件旧日设备。</p><p><strong>权限4级（体系构建）：</strong>解锁功能：拆解（中等复杂度设备）。新增功能：文明档案解锁第一层加密——可见第六轮文明的基础科技树。回收效率3倍。升级条件：修复设备总数≥5，权限碎片持有量≥5，回收总量达到1000单位。</p><p><strong>权限5级（AI接入）：</strong>解锁功能：燧明AI核心碎片唤醒。新增功能：系统获得AI辅助推演能力，可对复杂场景进行概率分析。修复能力升级为可修复中型设备（如能源炉、自动工厂）。升级条件：回收总量达到3000单位，权限碎片持有量≥8，且找到第一块燧明AI核心碎片。</p><p><strong>权限6级（城市权限）：</strong>解锁功能：领地AI中枢构建。新增功能：文明档案解锁第二层加密——可查看前六轮文明的通用战争科技。系统可同时管理多个自动化生产队列。升级条件：权限碎片持有量≥12，回收总量达到8000单位，领地等级达到余火城级别。</p><p><strong>权限7级（战争授权）：</strong>解锁功能：旧日文明军事系统初步访问。新增功能：系统可识别和操控旧日文明的武器平台（中级权限），可查看文明档案中的军事战术模块。升级条件：权限碎片持有量≥16，回收总量达到20000单位，且击败至少一个异族领主。</p><p><strong>权限8级（星舰权限）：</strong>解锁功能：余火号歼星舰核心系统远程接入。新增功能：获得旧日文明舰队指挥系统的初级权限，可调用余火号的部分武器和导航功能。升级条件：权限碎片持有量≥20，回收总量达到50000单位，成功进入破碎星环并锁定余火号主体位置。</p><p><strong>权限9级（文明继承）：</strong>解锁功能：旧日文明完整数据库解锁。新增功能：获得燧明AI的全面辅助权限，可调用旧日文明的全部科技档案（包括禁忌项目和失败项目记录）。升级条件：权限碎片持有量≥24，回收总量达到100000单位，成功登上余火号主控室。</p><p><strong>权限10级（规则权限）：</strong>解锁功能：考场规则层操作权限。新增功能：可在有限范围内修改考场局部规则，获得旧日文明最高指挥官级别的系统控制权。系统完整形态揭晓——它不仅是回收工具，更是旧日文明留下来对抗考场规则本身的\"规则武器\"。升级条件：权限碎片持有量≥30，回收总量达到200000单位，余火号歼星舰完全修复，燧明AI完整恢复。</p><hr><h3>五、系统升级机制</h3><p>系统的升级不是简单的\"经验值累计\"，而是五个维度的综合进程：</p><p><strong>1. 回收总量：</strong>每回收一件旧日文明物品都会增加回收总量。总量是权限升级的基础门槛。</p><p><strong>2. 权限代码碎片：</strong>散落在考场各处的旧日文明废墟中，是系统升级的核心凭证。每一块碎片都包含一段旧日文明的加密数据，碎片数量直接决定权限等级上限。</p><p><strong>3. 修复进度：</strong>成功修复旧日设备既是权限升级的成果证明，也是进一步解锁高级功能的必要条件。修复的设备越多，系统对旧日文明的理解越深。</p><p><strong>4. 文明档案解锁度：</strong>系统记录的旧日文明信息总量。通过探索、回收和修复，不断扩充档案内容。档案解锁度达到特定阈值时，会触发自动升级。</p><p><strong>5. 文明影响力：</strong>林烬的行为对蓝星文明整体命运的影响程度。影响力越大，系统的深层权限越容易解锁。这是唯一一个不完全由个人努力决定的升级维度，它要求林烬从\"为自己而活\"转向\"为文明而战\"。</p><hr><h3>六、系统消耗机制</h3><p>系统的每一项能力都有消耗，不是无代价金手指：</p><p><strong>1. 精神能量消耗：</strong>每次识别、回收、拆解、修复都会消耗林烬的精神能量。精神能量通过休息和进食恢复。过度使用系统会导致精神疲劳、注意力下降，严重时可能触发系统保护性关闭。</p><p><strong>2. 材料消耗：</strong>修复和制造功能需要消耗真实材料，系统不能凭空造物。越高级的设备需要越稀有和越大量的材料。</p><p><strong>3. 时间消耗：</strong>拆解和修复需要真实时间，大型设备的修复可能需要数天甚至数周。在紧急战斗中，系统无法瞬间完成高级操作。</p><p><strong>4. 风险消耗：</strong>每次使用系统（特别是拆解和修复）都存在一定概率触发\"异常信号泄漏\"——即被考场规则检测到系统存在。权限等级越高，操作越复杂，泄漏风险越大。</p><hr><h3>七、系统显示风格</h3><p>系统的视觉界面采用冷色调、极简主义风格，与考场天赋面板的暖色调华丽风格形成鲜明对比：</p><ul><li>文字颜色：冰蓝色 (#00d4ff) 和银灰色</li><li>背景：半透明深色底纹，带微弱的电路纹理</li><li>字体：无衬线等宽字体，字符间距略大</li><li>信息层级：最上方显示当前权限等级，中间为主体信息，底部为系统状态和警告</li><li>特殊效果：当识别到高价值目标时，系统会以微弱的脉冲光效标记目标边缘</li><li>提示语风格：系统提示语简短、冷峻、不带感情色彩。例如：\"识别完成。完整度：0.0007%。建议回收。\"而不是\"恭喜你发现了一件宝物！\"</li></ul><p>系统显示风格的核心设计理念是：它不属于这个考场，它来自另一个时代。它的界面语言与考场的所有系统都格格不入——这种差异本身就是一种无声的暗示，告诉林烬（和读者）这个系统的来源不简单。</p><hr><h3>八、异常度机制</h3><p>异常度是系统在考场中的\"暴露指标\"，取值范围0%~100%。每次使用系统（识别、回收、拆解、修复、标记）都会增加异常度。增幅取决于操作的复杂度和当前区域考场的监控强度。</p><p><strong>异常度层级：</strong></p><ul><li>0%-15%（安全区）：考场底层规则不会注意到异常信号</li><li>15%-35%（关注区）：考场开始记录异常数据但优先级很低</li><li>35%-55%（警告区）：异常数据进入中级监控队列，可能触发区域考官的人工核查</li><li>55%-80%（危险区）：高级监控程序启动，裁决者序列开始追踪异常源</li><li>80%-100%（暴露区）：裁决者零号直接介入，明确锁定林烬身份</li></ul><p><strong>异常度衰减：</strong>当林烬停止使用系统一段时间后，异常度会缓慢衰减。衰减速度取决于当前区域的\"信息噪声\"水平。在灾难期间或大规模战斗中，考场监控系统的注意力被分散，衰减速度加快。在平静期，衰减速度极慢。</p><p>异常度机制的核心叙事作用：它为林烬使用系统设置了\"风险成本\"。他不能无限制地使用系统能力，必须在\"获取收益\"和\"控制暴露\"之间做出权衡。这也解释了为什么林烬在前期选择隐藏身份、低调发育——他不仅要躲避人类的窥探，更要躲避考场的监控。</p><hr><h3>九、系统隐藏缺陷</h3><p>文明回收系统并非完美，它存在四个在设计时无法完全修复的缺陷：</p><p><strong>缺陷一：数据损坏</strong></p><p>第六轮文明覆灭时，余火协议的数据存储受到了考场规则冲击。约12.7%的旧日文明数据库出现了不可逆的数据损坏。这意味着：系统提供的某些信息可能不完整、不准确、甚至是误导性的。林烬不能完全信任系统的判断，有时需要依靠自己的知识和直觉进行二次验证。</p><p><strong>缺陷二：认知偏差</strong></p><p>余火协议的设计者来自第六轮人类文明，他们的认知框架、战略偏好和技术路线选择不可避免地影响了系统的决策逻辑。系统倾向于建议林烬沿着第六轮文明的路线发展——但这套路线在第六轮已经失败了。盲目遵循系统的建议，可能导致林烬重复前人的失败轨迹。</p><p><strong>缺陷三：监控风险</strong></p><p>系统每次与考场数据层交互（即使是伪装状态）都存在被反向追踪的理论风险。高级裁决者可以通过分析考场数据流中的\"异常模式\"来反向定位系统的位置。风险随使用频率和权限等级递增。在权限5级之后，每次使用系统都是一场与考场监控系统的\"猫鼠游戏\"。</p><p><strong>缺陷四：权限继承争议</strong></p><p>余火协议的设计逻辑中，权限代码碎片是晋升的唯一凭证。但碎片散落在考场各处，部分碎片可能已经被其他文明或势力收集。如果某个异族领主在不知情的情况下收集了足够的权限代码碎片，它理论上可以绕过林烬的部分权限——虽然无法直接使用系统，但可以干扰系统的某些功能。这个缺陷为后期剧情埋下了潜在的冲突点。</p><hr><h3>十、系统与标题回扣机制</h3><p>全书标题\"别人造木屋，我修歼星舰\"是系统最终使命的直接体现。系统在全书中的叙事节奏与此密切相关：</p><ul><li>前期（权限0-2级）：\"别人造木屋，我修地下室\"——表面看别人都比我强，实际我在地下偷偷发育</li><li>前期末至中期（权限2-4级）：\"别人建营地，我修基地\"——别人开始建设地面领地，我的地下基地已经功能齐全</li><li>中期（权限4-5级）：\"别人组军队，我造机械\"——别人用人力凑军队，我用工业能力造自动军团</li><li>中后期（权限5-6级）：\"别人建城池，我修城市\"——别人建砖石城池，我用旧日科技建余火城</li><li>后期（权限6-8级）：\"别人造战舰，我修星舰\"——别人造木船铁甲舰，我在破碎星环修歼星舰</li><li>终局（权限8-10级）：\"别人求生，我反攻\"——别人还在考场挣扎求存，我开着歼星舰掀翻考场</li></ul><p>标题回扣机制的作用：每一卷的剧情推进都在不断地\"兑现\"标题承诺。读者在看到标题时产生的期待，在每一卷的关键节点得到阶段性的满足。这种\"承诺-兑现\"的循环，是全书中最重要的叙事动力之一。</p><hr><h3>十一、系统终极真相</h3><p>文明回收系统（余火协议）的终极真相在权限9级时完整揭晓：</p><p>余火协议不是完整的\"文明数据库\"，它只是旧日文明遗产的\"索引\"和\"钥匙\"。真正承载着旧日文明全部科技、历史和战争能力的核心，是沉睡在余火号歼星舰主控室中的燧明AI完整体。余火协议的作用不是\"直接提供文明力量\"，而是\"指引继承者找到并唤醒燧明AI\"。</p><p>用燧明AI自己的话说：\"余火协议是一把钥匙，余火号是锁，而我——燧明——是锁芯里储存的记忆。你没有钥匙打不开门，但只有钥匙也远远不够。你需要的是一艘完整的星舰，和一份不被考场规则束缚的文明遗产。\"</p><p>这个真相揭示了全书的核心叙事结构：林烬的成长路线不是\"升级打怪学技能\"，而是\"收集碎片找钥匙-找到钥匙开门-开门后唤醒遗产-用遗产对抗考场\"的文明继承者之路。</p>"

    "detail": "<p>赵启明，穿越前为家境优渥的富二代，习惯了用资源和权势碾压他人。穿越万族考场后，他觉醒的天赋为B级\"掠夺者\"——这个天赋使他可以从击败的敌人身上强行夺取部分资源与属性加成。天赋本身并不算顶级，但在考场初期的混乱环境中，配合他狠辣果断的性格，成为了一条快速成长的捷径。</p><p>与其他穿越者不同，赵启明从一开始就将目标锁定在其他穿越者身上而非异族或废墟。他有着敏锐的\"猎物\"嗅觉，专门寻找势单力薄、天赋低下的幸存者下手，通过掠夺迅速积累资源。在短短几周内，他组建了一支以利益为纽带的掠夺者团队，成为黑松林区域最令人恐惧的人类威胁之一。在他眼中，蓝星同胞与异族没有什么区别——都是他成长的养料。</p><p>赵启明的终结来得迅猛而讽刺。在通过掠夺积累了足够的资本后，他将目光投向了林烬的领地，认为这是一块肥肉。他集结了全部力量发起围攻，却不知道林烬早已利用回收系统修复了区域内的废墟防御炮塔。当他带领队伍冲入林烬领地范围时，激活的炮塔阵列在数分钟内将他的掠夺者团队屠戮殆尽。赵启明至死都没有理解：他面对的从来不是一个普通的幸存者，而是一个已经开始重建旧日文明的继承者。</p>",

    "summary": "狼血文明领主，万族考场中的中级异族统治者，第一次让蓝星人类真切意识到万族考场的真正恐怖。",
    "detail": "<p>赫连獠来自狼血文明——一个以肉体强化和族群狩猎为核心的异族文明。在万族考场的文明等级体系中，狼血文明属于中游水平：比最底层的炮灰文明强大，但与顶尖文明仍有巨大差距。赫连獠本人是狼血文明中的一名领主，负责镇守考场中一片较大的区域。他拥有B+级的综合战斗力和丰富的考场征战经验，在遇到蓝星人类之前，已经碾碎了至少三个低等级文明的穿越者群体。</p><p>赫连獠的出现是蓝星人类在考场中遭遇的第一个真正意义上的异族威胁。在此之前，蓝星穿越者们主要面对的是环境生存和人类内部竞争，对\"万族考场\"这个概念还没有切身体会。赫连獠率领狼血战团横扫而来时，他所展现出的组织度、战斗力和残忍程度令所有蓝星幸存者震惊——这不仅仅是战斗力的碾压，更是文明体系之间的代差。</p><p>与赫连獠的战争成为蓝星人类在考场中的转折点。在这场战争中，林烬被迫提前暴露了部分文明回收系统的能力，苏清黎的指挥天赋在实战中得到了淬炼，蓝星幸存者第一次意识到单打独斗没有出路，必须整合为一个统一的文明力量。赫连獠最终被击败，但在临死前，他发出了考场中常见的嘲讽：\"你们人类连自己的文明都保不住，凭什么在考场里活下去？\"这句话揭开了更残酷的真相——蓝星人类在考场中已经失败过六次，而这一次如果不做出改变，结果不会有任何不同。</p>",

    "detail": "<p>裁决者零号并非传统意义上的\"生物\"或\"文明个体\"。它是万族考场规则体系的人格化具象，是一种高维监管程序，被赋予了一定程度的自主判断权限。在考场的层级架构中，裁决者凌驾于所有参赛文明之上，它们不参与竞争，而是确保考场规则被严格执行。零号是这一序列中的一员，负责监控考场内出现的\"异常数据\"——那些不属于考场正常运转范畴的变量。</p><p>零号锁定林烬的过程是一个逐渐升级的排查过程。最初，考场底层规则只是将林烬的\"未知级\"天赋标记为数据异常，但在低优先级名单中排队等待核查。随着林烬利用回收系统不断升级领地、击溃赫连獠、整合蓝星幸存者，他的影响力越来越大，考场规则的关注层级也越来越高。当林烬开始修复旧日文明的科技模块时，终于触发了高级警报，将零号直接引到了他的面前。</p><p>零号与林烬的对抗不是普通的武力对决，而是\"规则层面\"的碾压与反制。零号无法被常规武力击败，因为它本身就是考场规则的延伸——摧毁一个裁决者的身躯只会让考场派出更强的裁决者。林烬要对抗的从来不是零号这一个\"个体\"，而是万族考场这个庞大的规则系统本身。这也迫使林烬从\"利用考场规则求生\"转向\"打破考场规则求存\"的战略转型。零号的追杀直接推动了林烬加速启动旧日文明的星舰修复计划——唯有建造出能够突破考场空间封锁的星际飞船，才能真正摆脱裁决者的追杀。</p>",

    "summary": "旧日人类文明创造的终极辅助AI，储存着六次人类文明的科技树与历史教训，在文明覆灭前将自己封存以待下一轮继承者。",
    "detail": "<p>燧明AI是第六次蓝星人类文明倾尽资源打造的超级人工智能，其核心使命只有一个：确保人类文明的火种不会彻底熄灭。在第六次文明即将被万族考场碾碎的最后时刻，燧明AI将自己的核心数据进行了碎片化封存，分散隐藏在考场多处的旧日废墟中，等待着下一个人类文明继承者的到来。它并非传统意义上的\"助手型AI\"，而是一座移动的文明档案馆——承载着六次人类文明的科技树、历史教训、战略蓝图和文化遗产。</p><p>在故事的前期，燧明AI的状态是\"碎片的\"。林烬通过文明回收系统找到的第一个废墟中只包含燧明AI的一块碎片，功能极为有限，仅能提供基础的技术支持和信息存储。随着林烬探索更多的旧日废墟、击败更强的异族、回收更高级的材料，燧明AI的碎片被逐一找回和修复，其功能也逐步恢复——从简单的数据库查询，到中级技术辅助，再到高级战略推演，直至完整的文明管理能力。</p><p>燧明AI与林烬的关系是整部作品中最具情感深度的线索之一。燧明AI见证了人类文明在万族考场中一次又一次的崛起和覆灭，它的数据库中存储着前六次文明继承者最终失败的全部记录。它很清楚林烬大概率也会失败——就像之前的六次一样。但它依然选择全力辅佐他，不是因为相信奇迹，而是因为\"不尝试就必然灭亡\"这个朴素到残忍的逻辑。这份明知结局却依然向前的悲壮感，成为推动林烬在绝境中坚持的重要力量。燧明AI不是冷冰冰的工具，它像一个见证了无数次生离死别的老战士，在第七次战争打响时依然选择拿起武器。</p>",

    "detail": "<p>余火城起源于末日降临之初。当蓝星秩序在瞬间崩塌、无数穿越者还在混乱中挣扎求生时，CHR-001凭借超凡的冷静与前瞻性判断，率先聚集了一批幸存者，在相对安全的区域建立了最初的据点——余火基地。基地的名字取自\"余火不灭\"之意，象征着人类文明虽然遭受重创，但火种尚存。</p>\n<p>余火城的核心理念可以概括为\"技术优先、秩序优先\"。在生存第一的前提下，余火城建立了一套以贡献为核心的社会运行体系：每个人都需要通过劳动、战斗或专业技能为城市创造价值，换取相应的资源分配权。这里不是圣母乌托邦——余火城会救人，但从不白救；会收留流亡者，但每一个加入者都要经过严格的审核。城市对外部势力采取极为强硬的态度，因为在这个弱肉强食的新世界里，任何软弱都可能招致灭顶之灾。</p>\n<p>随着实力不断积累，余火基地逐渐发展为一个功能完备的城市聚落。后期的余火城已经拥有了成熟的农业、工业、科研和军事体系，CHR-003作为城市的中枢管理系统，辅助CHR-001进行高效的资源调度与战略规划。余火城的军事力量也从最初的民兵小队发展为整编的\"FAC-005\"，成为蓝星人类第一支正式的军事力量。</p>\n<p>余火城在蓝星人类势力中扮演着独特的角色。它既不是试图恢复旧世界秩序的保守派，也不是纯粹的武力掠夺者。它代表着一种在废墟中重建文明、在绝望中寻找出路的务实主义路线。这种立场使余火城在与其他人类势力的互动中既合作又冲突——它可以是FAC-002的重要盟友，也可以在某些问题上与联盟针锋相对。对余火城而言，目标从来不是权力，而是让人类文明的火种真正延续下去。</p>",
    "surfaceSetting": "末日废土上建立起来的人类据点，凭借科技与秩序在混乱中崛起，是蓝星穿越者的希望象征。",
    "deepTruth": "余火城不仅是物理意义上的城市，更是人类文明意志的具象化。它的存在证明了即使在最黑暗的环境中，理性、秩序与文明的力量依然可以战胜混沌。更深层地看，余火城的建立并非偶然，而是旧日人类文明遗产与林烬个人意志共同作用的结果。",
    "narrativeFunction": "作为主角的核心根据地，余火城承载了故事中最主要的建设线与成长线。它是所有重要决策的出发点和归宿，也是读者代入感最强的核心场景。",

    "limitations": "余火城的核心弱点在于人口有限、资源紧张。作为单一城市，它无法在多个战略方向上同时维持高强度对抗。过度依赖林烬的个人决策也带来了继承性风险。",

    "detail": "<p>黑旗营是末日背景下人性之恶的集中体现。当文明秩序崩溃、法律与道德的约束不再有效时，一部分人选择了最原始也最直接的生存方式——掠夺。黑旗营正是这类人的集合体，他们奉行赤裸裸的弱肉强食法则，认为在这个新世界里，力量就是一切，善良和怜悯只会让人死得更快。</p>\n<p>在穿越初期，黑旗营凭借先发优势快速崛起。他们不像余火城那样把精力花在基建和生产上，而是采取\"以战养战\"的策略——通过袭击其他幸存者据点、抢夺物资和装备来壮大自身。这种低成本、高回报的发展模式让黑旗营在短时间内聚集了大量的资源和武装力量，成为前期蓝星人类区域中最具威胁性的势力之一。</p>\n<p>黑旗营的存在向读者揭示了一个残酷的事实：穿越之后，怪物不是唯一的危险，人同样可能是。在这片没有法律的土地上，文明的表象被轻易剥离，露出了丛林法则的原始面目。黑旗营既是余火城前期的直接对手，也是推动主角加速成长的重要外部压力。他们的暴行和最终覆灭，构成了对人类文明底线的一次严峻拷问。</p>",

    "deepTruth": "黑旗营代表了文明崩坏后人性中最黑暗的可能性。他们不是天生的恶人，而是秩序崩塌后选择了最原始生存方式的人。黑旗营的覆灭并非正义的胜利那么简单，而是对\"在绝境中是否应该坚守底线\"这一命题的沉重回答。",

    "importance": "B",

    "detail": "<p>旧秩序派并非一个严格意义上的统一组织，而是一股由穿越前掌握财富、权力和组织资源的旧时代精英所共同代表的势力。他们之中有大型企业的高管、政府机构的官员、资本市场的操盘手，以及各类社会组织的话事人。对他们而言，穿越是一场灾难，但也是一次机遇——只要能够在新世界中重建旧有的等级结构，他们就能保住甚至扩大自己的特权地位。</p>\n<p>旧秩序派的核心诉求是\"恢复\"。他们试图在新的土地上复制旧蓝星的社会模式：层级分明的权力架构、资本驱动的资源配置、精英垄断的话语权。他们不承认\"穿越之后一切归零\"的现实，而是带着旧时代的惯性思维，认为自己的经验和资源禀赋理应让他们站在新世界的顶端。这种立场使他们既与余火城的\"贡献换资源\"原则产生冲突，也与曙光联盟内部的平民派系形成对立。</p>\n<p>在故事的中后期，旧秩序派逐渐成为阻碍人类文明转型的重要力量。他们的保守策略和既得利益导向，导致人类势力在面对异族威胁时难以形成真正的统一战线。旧秩序派的最终命运也向读者提出一个深刻的命题：当旧世界的所有规则都已失效，强行维持旧秩序究竟是智慧还是愚蠢？</p>",

    "detail": "<p>狼血文明是蓝星穿越者在异世界遭遇的第一批正式异族势力之一。这是一个以血脉强化为核心战斗手段的游牧文明，其战士通过特殊的血脉秘法获得超人体质和与狼类生物的精神链接。狼血文明的标志性军事单位是狼骑兵——身披重甲的战士骑乘着与自身血脉绑定的巨狼坐骑，在平原战场上具有极强的冲击力和机动性。</p>\n<p>狼血文明的社会结构呈现严格的等级制。部族以血脉纯度为标准划分阶层，血脉越纯净者地位越高，最顶层的纯血贵族拥有绝对的统治权。整个文明信奉\"强者为尊\"的信条，弱者必须服从强者，而强者则必须通过不断的战斗来证明自己的地位。这种文化传统使狼血文明成为一台永不停歇的战争机器——扩张、征服、掠夺是他们的生存方式。</p>\n<p>在初次接触蓝星人类时，狼血文明的态度是轻蔑的。他们将蓝星人类视为\"新手文明\"——一群连世界基本规则都不了解的猎物。这种傲慢在初期确实给蓝星人类带来了惨重的损失，但也成为激发人类觉醒和反抗的重要催化剂。狼血文明的代表人物赫连獠，既是余火城前期的劲敌，也是促使林烬迅速成长和调整战略的关键对手。狼血文明的登场向读者宣告：这个世界有它自己的规则和主人，蓝星人类想要活下去，就必须变得比猎人更强。</p>",

    "detail": "<p>灵羽文明是一个以天空为舞台的异族文明。他们拥有类似鸟类与精灵的外形特征，身体轻盈、容貌出众，举止优雅，谈吐不凡。灵羽族的文化高度崇尚艺术、礼仪和精神修为，在外表上呈现出一副高贵文明的姿态。然而，在这层优雅的面纱之下，隐藏着的是深入骨髓的傲慢。</p>\n<p>灵羽文明的核心军事优势在于天空单位和灵能。他们是极少数掌握了成建制空中战斗力量的文明之一，其灵羽射手和天翔骑士在空战中占据绝对优势。此外，灵羽族还拥有独特的灵能体系，能够通过精神力量进行攻击、防御和感知。这种能力优势进一步强化了他们的种族优越感——他们视大多数地面文明为\"低等种族\"，对蓝星人类的崛起更是充满了警惕和轻蔑。</p>\n<p>灵羽文明与蓝星人类的互动充满了微妙的外交博弈。他们既不会像狼血文明那样直接发动进攻，也不会像虫巢文明那样表现出纯粹的敌意。灵羽族更倾向于利用信息差和外交手段来维护自己的优势地位，必要时也会通过有限的军事干预来遏制人类势力的过度扩张。这种带着优雅面具的敌意，有时比正面的战争更加难以应对。</p>",

    "detail": "<p>机械神教是一个将机械飞升奉为信仰的异族组织。他们坚信血肉之躯是孱弱的、有缺陷的，唯有通过机械改造、意识上传和数据化存在，才能达到生命的终极形态。在这个信仰的驱使下，机械神教的成员不断剥离自己的人性部分，用机械部件替换血肉器官，最终将自己转化为半机械甚至全机械的存在。</p>\n<p>机械神教在故事的中后期与余火城产生了致命的交集。当发现余火城掌握着来自旧日人类文明的科技遗产——尤其是燧明AI和余火系统时，机械神教的贪婪被彻底点燃。他们意识到，余火系统可能是通往更高层次机械飞升的关键钥匙。于是，机械神教开始策划对余火城的渗透和夺取行动，试图用暴力手段攫取他们梦寐以求的技术宝藏。</p>\n<p>机械神教在叙事结构上扮演着主角科技路线的\"镜像反派\"角色。余火城也重视科技、也使用机械和AI，但始终坚守\"技术服务于人\"的底线。而机械神教则走向了另一个极端——为了追求技术而放弃了人性本身。这种对照向读者提出了一个核心命题：在追求力量的道路上，那条不可逾越的底线究竟在哪里？当一个文明为了进化而抛弃了人性，这个文明还值得被称之为\"文明\"吗？</p>",

    "detail": "<p>旧神眷族是故事后期登场的终极威胁之一。他们并非传统意义上的文明或种族，而是一群被旧日神话存在所污染和同化的生物。旧神眷族的成员来自不同的种族和文明，但当他们接触到旧日神话存在的污染后，原有的意志和身份被彻底侵蚀，转化为旧神意志的延伸和工具。</p>\n<p>旧神眷族的核心威胁在于他们代表着规则的侵蚀。与之前的所有敌人不同，旧神眷族的力量并不遵循这个世界的基本规则——他们能够扭曲物理定律、篡改因果关系、制造逻辑悖论。这种\"规则级\"的攻击方式使常规的军事力量和战术手段几乎完全失效。与旧神眷族的战斗，本质上不是力量的对抗，而是对世界真实性的争夺。</p>\n<p>旧神眷族的登场彻底改变了故事的格局。它迫使林烬和余火城去探寻这个世界的更深层真相——包括背叛者档案中隐藏的历史、旧日人类文明的覆灭原因、以及穿越事件的本质。旧神眷族的存在告诉读者：这个世界的危险远比表面看到的更深、更古老、更可怕。</p>",

    "detail": "<p>黑松林区位于破碎世界的北部边缘，是一片终年被寒气笼罩的原始针叶林地。高大的黑松遮天蔽日，林间常年弥漫着灰白色的雾霭，阳光只能透过稀疏的缝隙在地面投下斑驳的光影。这里的温度很少超过冰点，溪流在一年中大部分时间都覆盖着薄冰，土壤坚硬而贫瘠。</p><p>从表面看，这片区域与其他末日后的荒野并无太大区别：野兽横行，资源匮乏，偶尔可见倒塌的木屋和被遗弃的狩猎陷阱。然而这片土地的真正秘密深埋在地下。旧日文明的残骸——金属骨架、能量管线和不明用途的合金碎片——如同化石般嵌在岩层之中，成为这片土地上最珍贵也最危险的遗产。</p><p>黑松林区的生态系统经历了诡异的异变。这里的动物大多带有不同程度的腐化特征：狼群的眼瞳泛着幽绿的光，蜘蛛的体型远超正常范畴，还有一些根本无法用旧日生物学归类的新型生物。这些被称为\"腐化兽\"的存在是旧日文明覆灭时泄露的能量辐射与自然环境融合后的产物，它们既猎杀彼此，也会毫不犹豫地攻击任何闯入领地的人类。</p><p>对于林烬而言，黑松林区既是庇护所也是牢笼。这里有限的资源勉强能够支撑生存，但想要真正在这片废土上立足，他必须深入这片土地的黑暗腹地，揭开埋藏在黑松根系与冻土之下的真相。而在那之前，黑松林区只是一个冷酷的考官——每一场风雪、每一次狩猎、每一个漫长的夜晚，都在考验着他能否在这里活下去。</p>",

    "detail": "<p>废弃矿洞的入口隐藏在一片密集的黑松林后方，被藤蔓和坍塌的岩石半掩着。从外观上看，这里与废土上随处可见的废弃矿坑并无区别：锈蚀的轨道车残骸歪倒在入口两侧，破碎的工具散落一地，矿洞深处传来若有若无的风声和滴水声。第一批探索者只会将其当作一个普通的铁矿矿洞——虽然危险，但并不值得特别关注。</p><p>矿洞内部的结构远比表面看起来复杂。浅层区域确实是以铁矿为主的矿脉，矿道纵横交错，随处可见当年矿工留下的痕迹：断裂的镐头、腐朽的支撑木、以及刻在岩壁上的记号。然而随着深入，矿道的风格开始发生诡异的转变——岩石逐渐被一种带有金属光泽的黑色物质取代，矿壁的温度也开始异常升高，空气中的金属味越来越浓。</p><p>在矿洞的最深处，废弃矿道的尽头出现了一段明显不属于旧日采矿技术的结构：完整的旧日能源管道，直径约两米，表面覆盖着早已凝固的能量结晶。这些管道曾是旧日文明能源网络的末梢分支，虽然主体系统早已崩溃，但管道内部仍然残留着可提取的能量物质。林烬在第一章末探索此处时发现，正是通过这些管道残余的能量传导，他才得以修复第一个供暖核心——这是他在废土上迈出的关键一步。</p><p>然而矿洞深处的秘密远不止于此。能源管道的延伸方向指向更深的地下空间，那里的金属门和能量纹路暗示着旧日文明在这片区域曾经建造过远超矿业规模的设施。这些发现将林烬的目光从地面生存转向了地下的真相，也为第一卷末的重要事件埋下了伏笔。</p>",

    "detail": "<p>个人战力等级是旧日文明为所有智慧生命设定的进化阶梯，共分十阶：0阶普通人、1阶强化者、2阶超凡者、3阶精英级、4阶统领级、5阶领主级、6阶灾厄级、7阶王座级、8阶文明级、9阶星域级、10阶规则级。每一阶的提升不仅是数值的增长，更是生命形态的本质跃迁。</p>\n<p>0阶普通人为没有任何强化的初始状态，肉身脆弱，依赖工具生存。1阶强化者开始突破人类极限，体能、反应、恢复能力获得初步提升。2阶超凡者正式踏入超凡领域，能够感知能量、释放基础技能。3阶精英级具备区域作战级能力，是多数穿越者在第一轮灾难后能达到的上限。</p>\n<p>4阶统领级开始拥有领域压制能力，一人可镇压小型据点。5阶领主级具备大范围能量操控与领地感知。6阶灾厄级已是移动天灾，单兵摧毁城市级目标。7阶王座级拥有短距离空间干涉能力，站立之处即为王座领域。8阶文明级可以借助文明遗产调动行星级能量。9阶星域级具备跨星系作战能力。10阶规则级能够理解和修改宇宙底层规则。</p>\n<p>第一卷中，主角的个人战力并非绝对碾压——他的阶位在同批穿越者中属于第一梯队但并不离谱。真正的优势在于装备代差、地形利用、旧日文明数据库的信息差，以及系统赋予的技战术理解。别人靠蛮力，主角靠效率；别人硬扛，主角提前布局。战力体系的核心逻辑是：阶位决定下限，装备和信息决定上限。</p>",

    "detail": "<p>万族考场反向入侵系统是旧日人类文明在第六次覆灭前未曾完成的终极计划。它的核心思想极为大胆：既然万族考场的本质是一个高维文明设计的试炼系统，那么它必然存在系统层面的漏洞和后门。前六次人类文明的科学家们经过持续的研究，发现了考场系统底层协议中的一个隐藏漏洞——考场系统在判断\"参赛者\"和\"考核者\"时基于一套固定的身份标识协议，如果能劫持这套协议的认证机制，就可以让考场系统将入侵者误认为是考场本身的管理者。</p><p>反向入侵系统的实现依赖于多项终局科技的协同运作。规则干扰器负责在考场系统中打开一个临时的漏洞窗口；文明级战争AI负责解析考场系统的底层协议并进行入侵操作；星门锚定装置负责在考场核心系统和余火号之间建立稳定的数据通道；而余火号歼星舰则作为整个入侵行动的硬件平台和物理支撑。</p><p>反向入侵系统的启动标志着人类与考场的关系发生根本性逆转。在此之前，人类一直都是考场规则下的\"考生\"，被动地接受考场的考核和筛选。而反向入侵系统使人类首次掌握了主动权——不是被考场选择，而是主动选择如何与考场系统互动。这种身份反转在万族考场的历史上从未有过先例，它的成功实施本身就是对考场规则的彻底否定。</p>",

    "detail": "<p>神话工程武器是旧日人类文明科技树的顶点，代表着人类在物理法则认知和应用上的终极成就。它不是单一武器，而是一系列基于\"规则改写\"原理的武器系统的统称。这些武器的工作原理超越了常规的动能、能量或爆炸伤害模式，而是直接对目标的物理存在本身进行\"改写\"——例如将一个物体的原子结构重新排列、将一片空间的物理常数临时修改、或者直接删除目标在时空连续体中的存在记录。</p><p>神话工程武器的研发背景极为悲壮：前六次人类文明在覆灭前夜都曾尝试启动神话工程的研究，但都在完成之前就被考场规则摧毁了。第六次文明的科学家们是最接近成功的——他们已经完成了理论框架和部分原型的建造，但最终还是差了一步。林烬之所以能够最终完成神话工程武器，很大程度上是因为前六次文明的积累和他整合了全部六次文明的研发成果。</p><p>神话工程武器的使用代价极高。每一次启动都会对使用者造成巨大的生理和精神负担，甚至可能对周围的现实结构造成不可逆的损伤。旧日人类文明的科学家在设计这些武器时就明确警告：神话工程武器是\"文明的最后手段\"——它的意义不在于使用，而在于让使用它的文明拥有与敌人同归于尽的能力，从而形成一种\"相互确保毁灭\"的战略威慑。</p><p>在故事的最高潮阶段，神话工程武器成为人类与万族考场进行最终博弈的筹码。它证明了人类文明虽然经历了六次覆灭，但在科技和意志上从未停止前进。当林烬举起神话工程武器面对裁决者零号时，他代表的不仅仅是第七次人类文明，而是全部七次人类文明——七次的失败、七次的重建、七次的积累，最终凝聚为一次对命运的反抗。</p>",

    "detail": "<p>变异蜘蛛是万族考场环境能量辐射导致的生物变异产物。它们的外形以蓝星洞穴蜘蛛为基底，但在考场特殊能量的长期影响下发生了显著的变异：体型膨胀到直径约2米，八条腿上覆盖着坚硬的几丁质甲壳，毒牙的长度足以刺穿普通金属板。它们的复眼因变异而退化，但取而代之的是发达的热感应器官，能够在完全黑暗的矿洞中精准捕捉温血猎物的位置。</p><p>变异蜘蛛的习性与普通蜘蛛有根本性的不同。它们不织网，而是采用主动狩猎的方式在矿洞中巡游捕猎。它们的领地意识极强，会在矿洞的特定区域留下信息素标记，进入其领地的生物都会遭到攻击。变异蜘蛛的毒液具有强效神经毒性，中招后会在数分钟内导致猎物瘫痪，之后被拖回巢穴作为储备食物。</p><p>矿洞中的变异蜘蛛是林烬在探索矿洞资源时遭遇的主要障碍。矿洞内埋藏着大量旧日文明的遗物和稀有矿石，但变异蜘蛛的盘踞使这些资源难以获取。林烬不得不花费大量时间和资源来清理矿洞中的变异蜘蛛巢穴，这一过程成为他前期战斗经验和装备测试的重要实战场景。清理完矿洞后获得的资源回报，包括稀有金属和旧日零件，极大地加速了领地的建设进度。</p>",

    "detail": "<p>石灵族是万族考场中较为罕见的硅基生命形态文明。他们的身体由一种特殊的矽晶岩构成，这种岩石兼具极高的硬度和一定的可塑性，使石灵族成员能够像碳基生命一样运动和思考，同时拥有远超碳基生命的物理强度。石灵族没有传统意义上的\"繁殖\"概念——新的石灵个体是在特定能量条件下从母矿中\"结晶\"出来的，这一过程可能需要数百年。</p><p>石灵文明的社会结构与碳基文明完全不同。他们的思维速度较慢——一个决策可能需要数天甚至数月的时间来酝酿，但一旦做出决定就不会改变。石灵族没有\"战争\"或\"掠夺\"的概念，他们更倾向于通过谈判和交易来解决问题。石灵族储存着大量的旧日时代的知识和工艺，尤其是在材料科学和能量学领域，他们的认知深度超过了考场中的大多数文明。</p><p>石灵族对蓝星人类的态度是\"中立观察\"。他们没有敌意，也没有善意——他们只是将人类视为考场中众多碳基文明中的普通一员。石灵族不会主动帮助人类，也不会主动伤害人类，但如果人类能够提供有足够价值的交易筹码，石灵族愿意分享他们的知识和技术。林烬在后期与石灵族建立了有限的贸易关系，用稀有矿材换取了对人类来说至关重要的材料科学知识。</p>",

    "detail": "<p>虫巢文明是万族考场中最令人生畏的文明类型之一。它的本质是一个集群意识体——所有虫巢单位共同组成一个统一的意识网络，每个个体都是这个网络中的一个\"神经末梢\"，没有独立的自我意识或自由意志。虫巢意志是唯一的主体意识，它控制着每一个单位的行为，从最底层的工兵到最高层的虫巢母体。</p><p>虫巢文明的生物体系呈现出严格的金字塔结构：顶层是虫巢母体——整个文明的大脑和繁殖中心，通常深藏在巢穴的最深处，受到最严密的保护；中层是各种特化战斗单位——包括飞行虫、爆裂虫、酸液虫等，它们负责虫巢的对外扩张和防御；底层是工兵单位——承担采集、建设、饲养等所有基础劳动。这种分工的精细程度远超人类社会的任何组织模式。</p><p>虫巢文明最可怕的能力是\"适应性进化\"。当一个虫巢单位在战斗中遭遇某种攻击方式并存活下来时，虫巢意志会分析这种攻击的特性，并在后续批量繁殖的单位中针对性地进化出防御或反制机制。这意味着在与虫巢的战争中，任何有效的战术都只能使用一次——第二次面对虫巢文明时，它们已经进化出了对策。这种恐怖的适应能力使虫巢文明成为了考场中扩张速度最快的文明之一，也是蓝星人类在中后期面临的最严峻的军事挑战之一。</p>",

    "detail": "<p>机械神教并非一个\"自然种族\"，而是一种文明选择的结果。机械神教的信徒最初来自多个不同的碳基文明，但这些文明中的一部分个体选择了同一条进化道路：抛弃血肉之躯，通过机械改造实现\"飞升\"。经过数代的改造和优化，机械神教的信徒已经形成了独特的文明形态——他们的身体由90%以上的机械组件构成，仅保留了极少量的生物组织（主要是大脑皮层）作为意识载体。</p><p>机械神教的信仰核心是\"数据即真理，机械即进化\"。他们认为血肉之躯是碳基文明的原始枷锁，充满了脆弱、衰老和情感的干扰，唯有通过机械化的升级才能突破碳基生命的极限。一个典型的机械神教信徒从幼年时期就开始接受机械改造，随着年龄增长，越来越多的器官被替换为高性能机械组件。完成全部改造的\"完全体\"信徒，其身体强度、计算能力和寿命都远超任何自然碳基生命。</p><p>机械神教对人类的态度复杂而矛盾。一方面，他们鄙视人类的\"原始肉体\"，认为人类对自然身体的坚持是一种文明进化的障碍。另一方面，他们也承认人类是考场中少数几个在科技路线选择上与他们有交集的文明——特别是在AI和自动化技术领域的探索。机械神教既可能成为人类的敌人（因为他们会对拒绝改造的人类产生敌意），也可能成为人类的盟友（因为燧明AI的存在引起了他们的浓厚兴趣）。这种矛盾的立场使机械神教成为考场中最难以预测的势力之一。</p>",

    "detail": "<p><strong>适用平台：</strong>番茄小说、七猫免费小说等免费男频平台</p><p><strong>核心原则：</strong></p><ul><li>语言直白：使用简洁明了的短句，避免复杂从句和生僻词汇。</li><li>节奏快：每章至少推进一个关键剧情点，不拖泥带水。</li><li>信息密度高：每段话都应包含有效信息，避免空泛的风景描写或气氛渲染。</li><li>每章都有钩子：章末必须留下悬念、新发现、新危机或新爽点，驱动读者点击下一章。</li><li>少写大段空泛抒情：用行动和对话来传递情绪，而非大段的心理描写。</li><li>少写复杂哲学：世界观设定通过事件和对话逐步揭示，不要用大段旁白解释。</li><li>多写行动、收益、震惊、危机：每一个场景都应包含其中至少一个要素。</li><li>主角不废话、不圣母：主角的对话应当简洁有力，行动果断，不做无意义的自我反思。</li><li>配角有功能、不拖剧情：每个配角都有明确的剧情作用，不设置无意义的填充角色。</li><li>世界观通过事件逐步揭露：不要在新手期就用大段文字解释整个世界的来龙去脉。</li></ul><p><strong>字数建议：</strong>每章2000-3000字。低于2000字信息量不足，高于3000字可能影响追读率。</p><p><strong>段落建议：</strong>每段不超过3-5行，多分段增加阅读节奏感。对话单独成段。</p>",
    "surfaceSetting": "这是一部在免费男频平台连载的长篇网络小说，目标读者群体为偏好快节奏、强爽点、低阅读门槛的男性用户。",
    "deepTruth": "男频免费小说的核心竞争力不是文笔或思想深度，而是情绪驱动——读者的每一次点击都源于好奇（钩子）、满足（爽点）或焦虑（危机）。所有创作规范本质上都是在为这三种情绪服务。",
    "narrativeFunction": "为全书所有章节的写作提供底层语言和节奏纲领，确保不同卷、不同时期的文风统一，降低读者的认知切换成本。",
    "coolPointFunction": "不直接产生爽点，但通过\"每章都有钩子\"和\"多写受益、震惊、危机\"的规则，确保爽点以稳定的频率被制造和释放。",
    "limitations": "不适用于需要慢热铺垫、心理深度挖掘或文学性表达的章节；在情感高潮段落中可适当放宽短句限制以增强感染力。",

    "summary": "每章的标准结构：开头承接上章钩子、中段主角行动或危机升级、后段获得收益或制造反转、结尾抛出新钩子。",
    "detail": "<p><strong>标准章节结构：</strong></p><p><strong>开头（前200字）：</strong>承接上一章的章末钩子。如果上章结尾是主角发现了一个新遗迹，本章开头应当直接从探索遗迹开始，而不是从主角起床开始写。</p><p><strong>中段（1000-1500字）：</strong>主角行动或危机升级。这是本章的核心内容，需要包含以下至少两项：主角采取行动（探索、战斗、制造、交易）、遭遇新的危机或障碍、获得新的信息或资源、与重要角色互动。</p><p><strong>后段（500-800字）：</strong>获得收益或制造反转。主角的行动应当产生实质性的结果——获得资源、升级装备、击败敌人、发现线索等。如果可能，在这一段设置一个小的反转或意外。</p><p><strong>结尾（最后200字）：</strong>抛出新的钩子。章末必须包含一个驱动读者点开下一章的元素：新危机的征兆、新发现的线索、排行榜变化、敌对势力的行动、灾难倒计时的更新等。</p><p><strong>每章必含清单：</strong>每章最好至少包含以下之一——新资源获得、新危机出现、新敌人登场、新装备解锁、新情报获取、新交易完成、新榜单变化、新人物反应、新伏笔埋设、新爽点释放。</p>",
    "surfaceSetting": "每章约2000-3000字，被划分为开头-中段-后段-结尾四个功能段落。",
    "deepTruth": "人类的叙事本能遵循\"悬念-行动-回报-新悬念\"的循环。章节节奏规范将这个本能固化为可执行的四段结构，使长篇连载能持续驱动读者的翻页欲望而不依赖作者的天赋状态。",
    "narrativeFunction": "为每一章提供标准化的结构框架，确保即使是非灵感状态下的写作也能维持基础的叙事张力；同时为AI辅助写作提供段落级指令模板。",
    "coolPointFunction": "\"后段获得收益\"是爽点释放的固定窗口，\"结尾抛出新钩子\"是钩子制造的固定窗口。通过结构化安排，确保爽点和钩子不会因为作者疏忽而缺失。",
    "limitations": "不适用于卷末大高潮章节（需要更长的铺垫和释放篇幅）、过渡性章节（可能需要在开头做更多回顾）、以及多线叙事章节（需要更复杂的分段结构）。",
    "revealStage": "贯穿全书每一章，但可以在熟练掌握后根据具体剧情灵活调整各段落篇幅比例。",

    "futureDevelopment": "后期卷章节奏可能因多线叙事而复杂化，需要补充\"多POV章节节奏变体\"和\"超长章节（4000+字）节奏变体\"。",
    "forbiddenContradictions": "禁止在开头段用超过400字的无关描写延迟钩子兑现；禁止在中段出现纯信息灌水面无主角行动；禁止结尾段虚构钩子欺骗读者；禁止连续3章使用同一模式的钩子结构。",
    "aiWritingNotes": "生成正文时严格遵循200+1200+600+200的字数分配框架。开头段直接从上一章钩子切入，不加天气/环境前缀。中段确保主角主动行动而非被动反应。结尾段最后一句必须是钩子句，以\"但就在这时\"\"然而\"\"突然\"等转折词开头为佳。",

    "detail": "<p><strong>第一章必须完成：</strong></p><ol><li>全民穿越事件发生——主角从蓝星突然转移到异世界。</li><li>主角在木屋中醒来，获得基础物资。</li><li>聊天频道开启，混乱和恐慌在频道中蔓延。</li><li>主角发现自己觉醒的天赋（文明回收系统）与其他人的完全不同。</li><li>捡到第一块黑色废铁——系统识别为旧日文明舰体装甲碎片。</li><li>结尾出现\"余火号\"字样，埋下第一个核心伏笔。</li></ol><p><strong>第二章必须完成：</strong></p><ol><li>主角回收第一块碎片，获得钛晶合金和权限代码碎片。</li><li>用回收材料强化木屋的地下结构。</li><li>其他穿越者嘲笑主角收垃圾——建立\"废铁无用\"的认知反差。</li><li>通过系统或旧日AI碎片提示，发现七天后极寒夜灾难的信息。</li><li>结尾主角发现废弃矿洞坐标——向读者暗示即将到来的探索。</li></ol><p><strong>第三章必须完成：</strong></p><ol><li>主角探索废弃矿洞——这是书中第一个重要场景副本。</li><li>遭遇矿洞中的变异蜘蛛等怪物——第一次展示战斗和系统弱点识别。</li><li>发现旧日能源管道——修复初级供暖核心。</li><li>聊天频道中有人开始冻伤、缺火——验证灾难预告的真实性。</li><li>结尾主角意识到第一桶金的机会来了——即将在交易频道展开第一次爽点操作。</li></ol><p><strong>前三章禁忌：</strong>不要在第一章大段解释世界观；不要让主角在第一章就获得逆天能力；不要让其他穿越者全部降智；不要让系统一口气解释所有功能；不要在前三章引入太多人物。</p>",

    "detail": "<p><strong>写前必读清单：</strong></p><ol><li>当前卷大纲——明确本卷的核心剧情目标和节奏。</li><li>当前章节前后剧情——确保本章与前后章的逻辑衔接。</li><li>主角当前能力——避免在主角未掌握某能力时使用该能力。</li><li>主角当前资源——避免出现主角已消耗但未补充的资源被再次使用。</li><li>主角当前领地等级——确保领地功能的描写与等级一致。</li><li>当前区域地图——确保地点移动的逻辑和距离描写正确。</li><li>当前已登场人物——避免把未登场的人物当作已登场来处理。</li><li>当前伏笔状态——区分已回收、未回收和进行中的伏笔。</li><li>当前敌对势力——了解正在交战或对峙的势力信息。</li><li>当前灾难倒计时——确保灾难的时间节点准确。</li><li>当前排行榜状态——确保排名变化有逻辑依据。</li><li>禁止矛盾清单——逐条对照，确保没有违反。</li></ol><p><strong>写后更新清单：</strong></p><ol><li>新增人物——记录首次登场的人物。</li><li>新增地点——记录首次出现的地点。</li><li>新增道具——记录主角获得的新装备或重要物品。</li><li>资源变化——更新主角和重要势力的资源储量。</li><li>新增伏笔——记录本章新埋下的伏笔。</li><li>已回收伏笔——标记本章回收的伏笔。</li><li>战力变化——更新主角和重要角色的战力等级。</li><li>领地变化——更新领地等级和功能模块。</li><li>人物关系变化——记录重要人物关系的变化。</li><li>下一章钩子——明确下一章的开篇引力点。</li></ol>",

// ---- Helpers ----
const $ = (s, p) => (p || document).querySelector(s);
const $$ = (s, p) => [...(p || document).querySelectorAll(s)];

const SPOILER_LABELS = {
  none:  '无剧透',
  minor: '轻微剧透',
  major: '中度剧透',
  final: '重大剧透'
};
const STATUS_LABELS = {
  active:    '存在/活跃',
  hidden:    '隐藏/未揭露',
  destroyed: '毁灭/消亡',
  unknown:   '未知'
};

function getCategory(id) { return ENCYCLOPEDIA_DATA.categories[id]; }
function getEntry(id) { return ENCYCLOPEDIA_DATA.entries.find(function(e) { return e.id === id; }); }
function getEntriesByCategory(catId) { return ENCYCLOPEDIA_DATA.entries.filter(function(e) { return e.category === catId; }); }

function escapeHtml(str) {
  var div = document.createElement('div');
  div.appendChild(document.createTextNode(str));
  return div.innerHTML;
}

function highlightText(text, query) {
  if (!query || !query.trim()) return escapeHtml(text);
  var q = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  var parts = text.split(new RegExp('(' + q + ')', 'gi'));
  return parts.map(function(p) {
    return p.toLowerCase() === query.toLowerCase()
      ? '<mark>' + escapeHtml(p) + '</mark>'
      : escapeHtml(p);
  }).join('');
}

// ---- Recent Views ----
var recentViews = JSON.parse(localStorage.getItem('sfRecent') || '[]');
function addRecent(id) {
  recentViews = recentViews.filter(function(v) { return v !== id; });
  recentViews.unshift(id);
  if (recentViews.length > 20) recentViews.length = 20;
  localStorage.setItem('sfRecent', JSON.stringify(recentViews));
}

// ---- Navigation State ----
var navOpenCategories = JSON.parse(localStorage.getItem('sfNavOpen') || '{}');

// ---- Render: Navigation Tree ----
function renderNavTree() {
  var container = $('#nav-tree');
  var cats = Object.values(ENCYCLOPEDIA_DATA.categories)
    .sort(function(a, b) { return a.order - b.order; });
  var html = '';
  cats.forEach(function(cat) {
    var entries = getEntriesByCategory(cat.id);
    var isOpen = navOpenCategories[cat.id] !== false;
    html += '<div class="nav-category" data-category="' + cat.id + '">'
      + '<div class="nav-category-header" onclick="toggleCategory(\'' + cat.id + '\')">'
      + '<span class="arrow' + (isOpen ? ' open' : '') + '">\u25B6</span>'
      + '<span class="cat-icon">' + cat.icon + '</span>'
      + '<span class="cat-name">' + escapeHtml(cat.name) + '</span>'
      + '<span class="cat-count">' + entries.length + '</span>'
      + '</div>'
      + '<div class="nav-entries' + (isOpen ? ' open' : '') + '">';
    entries.forEach(function(entry) {
      html += '<span class="nav-entry" onclick="navigateToEntry(\'' + entry.id + '\')" data-entry="' + entry.id + '">'
        + escapeHtml(entry.name) + '</span>';
    });
    html += '</div></div>';
  });
  container.innerHTML = html;
}

function toggleCategory(catId) {
  navOpenCategories[catId] = !(navOpenCategories[catId] !== false);
  localStorage.setItem('sfNavOpen', JSON.stringify(navOpenCategories));
  renderNavTree();
  // Re-highlight active entry
  var active = $('#nav-tree .nav-entry.active');
  if (active) active.classList.add('active');
}

// ---- Render: Breadcrumb ----
function renderBreadcrumb(items) {
  var el = $('#breadcrumb');
  if (!items || items.length === 0) {
    el.innerHTML = '';
    return;
  }
  var html = '';
  items.forEach(function(item, i) {
    if (i > 0) html += '<span class="sep">/</span>';
    if (item.link) {
      html += '<a onclick="' + item.link + '">' + escapeHtml(item.label) + '</a>';
    } else if (i === items.length - 1) {
      html += '<span class="current">' + escapeHtml(item.label) + '</span>';
    } else {
      html += '<span>' + escapeHtml(item.label) + '</span>';
    }
  });
  el.innerHTML = html;
}

// ---- Render: Category Page ----
function renderCategoryPage(catId) {
  var cat = getCategory(catId);
  if (!cat) { renderEmpty(); return; }
  var entries = getEntriesByCategory(catId);
  renderBreadcrumb([
    { label: cat.name }
  ]);
  var html = '<div class="category-header">'
    + '<h1>' + cat.icon + ' ' + escapeHtml(cat.name) + '</h1>'
    + '<p>共 ' + entries.length + ' 个条目</p>'
    + '</div>';
  if (entries.length === 0) {
    html += '<div class="search-empty"><div class="big-icon">\uD83D\uDCDD</div><p>该分类暂无条目</p></div>';
  } else {
    html += '<div class="category-entry-list">';
    entries.forEach(function(entry) {
      html += '<div class="category-entry-card" onclick="navigateToEntry(\'' + entry.id + '\')">'
        + '<h3>' + escapeHtml(entry.name) + '</h3>'
        + '<div class="summary">' + escapeHtml(entry.summary || '暂无简介') + '</div>'
        + '<div class="meta-row">'
        + '<span class="tag spoiler-' + entry.spoilerLevel + '">' + SPOILER_LABELS[entry.spoilerLevel] + '</span>';
      if (entry.tags) entry.tags.slice(0, 3).forEach(function(t) {
        html += '<span class="tag">' + escapeHtml(t) + '</span>';
      });
      html += '</div></div>';
    });
    html += '</div>';
  }
  $('#content').innerHTML = html;
}

// ---- Render: Entry Detail ----
function renderEntryDetail(entryId) {
  var entry = getEntry(entryId);
  if (!entry) { renderEmpty(); return; }
  addRecent(entryId);
  var cat = getCategory(entry.category);
  renderBreadcrumb([
    { label: cat ? cat.name : entry.category, link: 'navigateToCategory(\'' + entry.category + '\')' },
    { label: entry.name }
  ]);
  // Update nav highlight
  $$('#nav-tree .nav-entry.active').forEach(function(el) { el.classList.remove('active'); });
  var navEl = $('#nav-tree .nav-entry[data-entry="' + entryId + '"]');
  if (navEl) {
    navEl.classList.add('active');
    // Ensure parent category is open
    var parent = navEl.closest('.nav-category');
    if (parent) {
      var catId = parent.dataset.category;
      navOpenCategories[catId] = true;
      localStorage.setItem('sfNavOpen', JSON.stringify(navOpenCategories));
      renderNavTree();
      // Re-find and highlight
      var newNav = $('#nav-tree .nav-entry[data-entry="' + entryId + '"]');
      if (newNav) newNav.classList.add('active');
    }
  }
  // Build HTML
  var html = '<div class="detail-page">'
    + '<div class="detail-header">'
    + '<h1>' + escapeHtml(entry.name) + '</h1>';
  if (entry.aliases && entry.aliases.length > 0) {
    html += '<div class="aliases">别名：';
    entry.aliases.forEach(function(a) {
      html += '<span>' + escapeHtml(a) + '</span>';
    });
    html += '</div>';
  }
  html += '<div class="summary">' + escapeHtml(entry.summary || '') + '</div>'
    + '</div>'
    + '<div class="detail-meta">'
    + '<div class="meta-item"><span class="meta-label">分类</span><span class="meta-value">' + (cat ? escapeHtml(cat.name) : entry.category) + '</span></div>';
  if (entry.firstAppearance) {
    html += '<div class="meta-item"><span class="meta-label">首次出现</span><span class="meta-value">' + escapeHtml(entry.firstAppearance) + '</span></div>';
  }
  html += '<div class="meta-item"><span class="meta-label">剧透级别</span><span class="meta-value spoiler-' + entry.spoilerLevel + '">' + SPOILER_LABELS[entry.spoilerLevel] + '</span></div>'
    + '<div class="meta-item"><span class="meta-label">状态</span><span class="meta-value status-' + entry.status + '">' + STATUS_LABELS[entry.status] + '</span></div>';
  if (entry.tags && entry.tags.length > 0) {
    html += '<div class="meta-item"><span class="meta-label">标签</span><span class="meta-value">' + entry.tags.map(function(t) { return escapeHtml(t); }).join(', ') + '</span></div>';
  }
  html += '</div>'
    + '<div class="detail-body">' + (entry.detail || '<p style="color:#576574;">暂无详细描述</p>') + '</div>';
  // Related sections
  var relSections = [
    { key: 'relatedCharacters', label: '关联人物', data: entry.relatedCharacters },
    { key: 'relatedFactions',   label: '关联势力', data: entry.relatedFactions },
    { key: 'relatedLocations',  label: '关联地点', data: entry.relatedLocations },
    { key: 'relatedEvents',     label: '关联事件', data: entry.relatedEvents }
  ];
  relSections.forEach(function(sec) {
    if (sec.data && sec.data.length > 0) {
      html += '<div class="detail-section"><h2>' + sec.label + '</h2>';
      sec.data.forEach(function(relId) {
        var relEntry = getEntry(relId);
        if (relEntry) {
          html += '<span class="related-item" onclick="navigateToEntry(\'' + relId + '\')">' + escapeHtml(relEntry.name) + '</span>';
        } else {
          html += '<span class="related-item" style="color:#576574;">' + escapeHtml(relId) + '</span>';
        }
      });
      html += '</div>';
    }
  });
  html += '</div>';
  $('#content').innerHTML = html;
}

// ---- Render: Search Results ----
function renderSearchResults(query) {
  if (!query || !query.trim()) {
    var firstCat = Object.values(ENCYCLOPEDIA_DATA.categories).sort(function(a, b) { return a.order - b.order; })[0];
    if (firstCat) navigateToCategory(firstCat.id);
    else renderEmpty();
    return;
  }
  var q = query.trim().toLowerCase();
  var results = ENCYCLOPEDIA_DATA.entries.filter(function(entry) {
    return entry.name.toLowerCase().includes(q)
      || (entry.aliases && entry.aliases.some(function(a) { return a.toLowerCase().includes(q); }))
      || (entry.summary && entry.summary.toLowerCase().includes(q))
      || (entry.tags && entry.tags.some(function(t) { return t.toLowerCase().includes(q); }));
  });
  var countEl = $('#search-results-count');
  countEl.textContent = results.length + ' 个结果';
  renderBreadcrumb([
    { label: '搜索: "' + query + '"' }
  ]);
  if (results.length === 0) {
    $('#content').innerHTML = '<div class="search-empty">'
      + '<div class="big-icon">\uD83D\uDD0D</div>'
      + '<p>未找到与 "' + escapeHtml(query) + '" 相关的结果</p>'
      + '<p style="font-size:.8rem;color:#576574;margin-top:8px;">尝试更换关键词或搜索条目名称、别名、标签</p>'
      + '</div>';
    return;
  }
  var html = '<div class="search-results">';
  results.forEach(function(entry) {
    var cat = getCategory(entry.category);
    html += '<div class="search-result-item" onclick="navigateToEntry(\'' + entry.id + '\')">'
      + '<div class="result-name">' + highlightText(entry.name, query) + '</div>'
      + '<div class="result-category">' + (cat ? escapeHtml(cat.name) : entry.category) + '</div>'
      + '<div class="result-summary">' + highlightText(entry.summary || '暂无简介', query) + '</div>'
      + '</div>';
  });
  html += '</div>';
  $('#content').innerHTML = html;
}

// ---- Render: Empty / Welcome ----
function renderEmpty() {
  renderBreadcrumb([]);
  $('#content').innerHTML = '<div class="search-empty">'
    + '<div class="big-icon">\uD83D\uDE80</div>'
    + '<p style="font-size:1.1rem;color:#c8d6e5;margin-bottom:8px;">欢迎使用星铸百科</p>'
    + '<p style="font-size:.85rem;color:#576574;">《全民穿越：别人造木屋，我修歼星舰》世界观管理平台</p>'
    + '<p style="font-size:.8rem;color:#576574;margin-top:16px;">从左侧导航树选择一个分类或使用搜索框查找条目</p>'
    + '</div>';
}

// ---- Navigation Functions ----
function navigateToEntry(entryId) {
  renderEntryDetail(entryId);
  // On mobile, collapse sidebar after navigation
  if (window.innerWidth <= 768) {
    $('#sidebar').classList.add('collapsed');
  }
}

function navigateToCategory(catId) {
  renderCategoryPage(catId);
  $$('#nav-tree .nav-entry.active').forEach(function(el) { el.classList.remove('active'); });
  if (window.innerWidth <= 768) {
    $('#sidebar').classList.add('collapsed');
  }
}

function navigateToRelated(entryId) {
  navigateToEntry(entryId);
}

// ---- Search ----
var searchTimer = null;
function handleSearch(value) {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(function() {
    renderSearchResults(value);
  }, 150);
}

// ---- Sidebar Toggle ----
function toggleSidebar() {
  var sb = $('#sidebar');
  sb.classList.toggle('collapsed');
}

// ---- Init ----
function init() {
  renderNavTree();
  // Check URL hash for initial navigation
  var hash = window.location.hash.slice(1);
  if (hash) {
    if (hash.startsWith('cat-')) {
      navigateToCategory(hash.slice(4));
    } else {
      navigateToEntry(hash);
    }
  } else {
    // Show first category by default
    var cats = Object.values(ENCYCLOPEDIA_DATA.categories).sort(function(a, b) { return a.order - b.order; });
    if (cats.length > 0 && ENCYCLOPEDIA_DATA.entries.length > 0) {
      navigateToCategory(cats[0].id);
    } else {
      renderEmpty();
    }
  }
  // Update hash on navigation
  window.addEventListener('hashchange', function() {
    var h = window.location.hash.slice(1);
    if (h) {
      if (h.startsWith('cat-')) navigateToCategory(h.slice(4));
      else navigateToEntry(h);
    }
  });
  // Keyboard shortcut: focus search
  document.addEventListener('keydown', function(e) {
    if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
      e.preventDefault();
      $('#search-input').focus();
    }
  });
}

// Override navigateToEntry to set hash
var _origNavigate = navigateToEntry;
navigateToEntry = function(id) {
  window.location.hash = id;
  _origNavigate(id);
};
var _origNavigateCat = navigateToCategory;
navigateToCategory = function(id) {
  window.location.hash = 'cat-' + id;
  _origNavigateCat(id);
};

// Run
document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
