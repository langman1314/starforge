    "category": "tech-tree",
    "summary": "旧日人类文明的最高科技结晶，超越了常规物理法则的终极兵器，是人类文明在万族考场中最后的底牌。",
    "detail": "<p>神话工程武器是旧日人类文明科技树的顶点，代表着人类在物理法则认知和应用上的终极成就。它不是单一武器，而是一系列基于\"规则改写\"原理的武器系统的统称。这些武器的工作原理超越了常规的动能、能量或爆炸伤害模式，而是直接对目标的物理存在本身进行\"改写\"——例如将一个物体的原子结构重新排列、将一片空间的物理常数临时修改、或者直接删除目标在时空连续体中的存在记录。</p><p>神话工程武器的研发背景极为悲壮：前六次人类文明在覆灭前夜都曾尝试启动神话工程的研究，但都在完成之前就被考场规则摧毁了。第六次文明的科学家们是最接近成功的——他们已经完成了理论框架和部分原型的建造，但最终还是差了一步。林烬之所以能够最终完成神话工程武器，很大程度上是因为前六次文明的积累和他整合了全部六次文明的研发成果。</p><p>神话工程武器的使用代价极高。每一次启动都会对使用者造成巨大的生理和精神负担，甚至可能对周围的现实结构造成不可逆的损伤。旧日人类文明的科学家在设计这些武器时就明确警告：神话工程武器是\"文明的最后手段\"——它的意义不在于使用，而在于让使用它的文明拥有与敌人同归于尽的能力，从而形成一种\"相互确保毁灭\"的战略威慑。</p><p>在故事的最高潮阶段，神话工程武器成为人类与万族考场进行最终博弈的筹码。它证明了人类文明虽然经历了六次覆灭，但在科技和意志上从未停止前进。当林烬举起神话工程武器面对裁决者零号时，他代表的不仅仅是第七次人类文明，而是全部七次人类文明——七次的失败、七次的重建、七次的积累，最终凝聚为一次对命运的反抗。</p>",

    "summary": "黑松林区最常见的野兽，成群活动，虽非异族文明的战斗单位，但对初期穿越者构成重大生存威胁。",
    "detail": "<p>森林狼是黑松林区生态系统中最主要的掠食者之一。它们在外观上与蓝星的灰狼相似，但体型略大，肩高约1米，体长约2米，体重可达80公斤。它们的皮毛呈灰黑色，与黑松林的环境完美融合，使猎物难以在密林中提前发现它们的接近。森林狼的感官极为敏锐，能够在数百米外嗅到猎物的气味，听觉和夜视能力同样出色。</p><p>森林狼通常以5至15只的群体规模活动，由一只头狼指挥。它们的狩猎策略高度协同：一部分成员从正面吸引猎物的注意力，其余成员从侧翼和后方包抄，将猎物逼入包围圈后发动致命攻击。这种战术协作水平虽然远不及异族文明的军事单位，但对于手无寸铁的初期穿越者来说已经足够致命。</p><p>森林狼本身并非万族考场的\"考核内容\"，而是考场环境自然生态系统的一部分。但它们在故事中的作用不可忽视——森林狼的存在使黑松林区的初始生存难度大幅提升，淘汰了大量准备不足的穿越者。林烬在穿越初期也曾多次遭遇森林狼群的威胁，这些战斗经验帮助他快速适应了考场的生存节奏并磨炼了战斗技巧。森林狼的皮毛和肉也是初期重要的生存资源。</p>",

    "summary": "在黑松林区废弃矿洞中盘踞的巨型变异蜘蛛，体型远超蓝星常规蛛类，具有极强的攻击性和领地意识。",
    "detail": "<p>变异蜘蛛是万族考场环境能量辐射导致的生物变异产物。它们的外形以蓝星洞穴蜘蛛为基底，但在考场特殊能量的长期影响下发生了显著的变异：体型膨胀到直径约2米，八条腿上覆盖着坚硬的几丁质甲壳，毒牙的长度足以刺穿普通金属板。它们的复眼因变异而退化，但取而代之的是发达的热感应器官，能够在完全黑暗的矿洞中精准捕捉温血猎物的位置。</p><p>变异蜘蛛的习性与普通蜘蛛有根本性的不同。它们不织网，而是采用主动狩猎的方式在矿洞中巡游捕猎。它们的领地意识极强，会在矿洞的特定区域留下信息素标记，进入其领地的生物都会遭到攻击。变异蜘蛛的毒液具有强效神经毒性，中招后会在数分钟内导致猎物瘫痪，之后被拖回巢穴作为储备食物。</p><p>矿洞中的变异蜘蛛是林烬在探索矿洞资源时遭遇的主要障碍。矿洞内埋藏着大量旧日文明的遗物和稀有矿石，但变异蜘蛛的盘踞使这些资源难以获取。林烬不得不花费大量时间和资源来清理矿洞中的变异蜘蛛巢穴，这一过程成为他前期战斗经验和装备测试的重要实战场景。清理完矿洞后获得的资源回报，包括稀有金属和旧日零件，极大地加速了领地的建设进度。</p>",

    "name": "腐化兽",

    "category": "monsters",
    "summary": "被旧日文明遗留的高浓度能量污染的变异怪物，身体出现晶体化特征，战斗力远超普通变异生物。",
    "detail": "<p>腐化兽并非自然变异的产物，而是直接受到旧日文明遗留的高浓度能量辐射后发生畸变的生物。它们的共同特征是身体表面出现明显的晶体化——部分器官被半透明的能量晶体取代，眼睛散发出幽蓝色的光芒，血管中流淌着发出微光的能量液。这种晶体化虽然使腐化兽的外观变得怪异，但也赋予了它们远超普通变异生物的物理强度和对能量攻击的抗性。</p><p>腐化兽的行为模式与普通野兽完全不同。它们似乎受到某种能量场的持续影响，表现出高度的攻击性和几乎不存在的自我保存本能。一只腐化兽会无视自身伤势持续攻击目标，直到目标被摧毁或自身彻底失去行动能力。更诡异的是，腐化兽个体之间存在某种未知的感知链接——当一只腐化兽发现猎物时，附近的其他腐化兽会在没有明显外部信号的情况下同时向猎物方向移动。</p><p>腐化兽的出现通常意味着附近存在旧日文明的高能量设施或污染源。林烬在探索过程中遭遇腐化兽时，会格外留意其活动区域，因为腐化兽的栖息地附近往往埋藏着有价值的旧日遗物——但也意味着更高的风险。击杀腐化兽后，其体内的能量晶体可以作为高级能源材料回收利用，是后期制造某些高级科技模块所需的关键材料之一。</p>",

    "category": "monsters",
    "summary": "虫巢文明的基础战斗和生产单位，兼具建设、采集和战斗功能，以庞大的数量和严格的社会分工著称。",
    "detail": "<p>虫巢工兵是虫巢文明社会体系中最底层的单位，也是数量最为庞大的群体。它们的外形类似放大了数十倍的甲虫，体长约1.5米，覆盖着天然的几丁质甲壳。虫巢工兵的颚部力量极大，能够咬碎岩石和金属，前肢进化出了多功能结构，既可以用于挖掘和搬运，也能作为近战武器使用。</p><p>虫巢工兵的社会分工极为严格。根据体型和生理特征的细微差异，工兵被分为三个主要亚种：建设工兵负责挖掘巢穴和构筑防御工事；采集工兵负责 foraging 资源和储存食物；战斗工兵则在前者受到威胁时充当战斗单位。这三种工兵在形态上差异不大，但行为模式由虫巢意志直接控制，能够根据战场需要快速切换角色。</p><p>虫巢工兵的单体战斗力并不突出——一只工兵的战斗力大约相当于一个训练有素的人类士兵。但它们的真正威胁在于数量和协作：虫巢工兵的数量可以从数百到数十万不等，而且通过虫巢意志网络实现了完美的协同指挥。当工兵群发起攻击时，它们会以精确的分工对目标实施包围、分割和消耗，直到目标被彻底淹没。这种基于数量优势和精确协调的战术，使虫巢文明成为考场中极难对付的势力之一。</p>",

    "name": "酸蚀变异体",

    "category": "monsters",
    "summary": "酸雨潮后在强酸性环境中幸存并发生二次变异的生物，身体组织呈现腐蚀和再生并存的特征，极具攻击性。",
    "detail": "<p>酸蚀变异体是万族考场\"酸雨潮\"事件后的特殊产物。酸雨潮是一场周期性的环境灾难，降下的雨水具有极强的酸性，能够腐蚀绝大多数地表物质。大多数暴露在酸雨中的生物都会死亡，但少数个体——尤其是那些已经发生过一次变异的生物——在酸雨中存活了下来，并发生了第二次变异，成为了酸蚀变异体。</p><p>酸蚀变异体的外观令人不安。它们的部分体表组织被酸雨腐蚀殆尽，露出下方的肌肉和骨骼，但这些暴露的组织会迅速再生并形成一层半透明的酸液保护膜。它们的体液变成了强酸性，血液溅到任何物质上都会产生腐蚀效果。更可怕的是，酸蚀变异体具备了喷射体内酸液进行远程攻击的能力，射程可达数米。</p><p>酸蚀变异体的出现是酸雨潮后考场生态系统剧变的标志。它们的存在使原本就危险的考场环境变得更加致命——即使是经验丰富的穿越者，在遭遇酸蚀变异体时也必须格外小心，因为常规的近战武器在攻击这些怪物时也会被其体表的酸液腐蚀损坏。这迫使林烬加速研发能量武器和远程打击手段，以应对这种新型威胁。</p>",

    "summary": "万族考场中游文明之一，以肉体强化和族群狩猎为核心的战斗民族，狼血领主赫连獠是蓝星人类遭遇的第一个真正异族威胁。",
    "detail": "<p>狼血族是万族考场中的中级文明种族。他们的外形介于人类和狼之间——直立行走的类人形态，但覆盖着灰黑色的毛发，面部保留了明显的狼科特征（吻部、竖耳、利齿），尾部粗壮有力。狼血族成年个体的平均身高约2.2米，肌肉密度是人类的数倍，骨骼强度接近合金，徒手战斗力远超未经强化的普通人类。</p><p>狼血文明的社会结构基于\"狼群法则\"——实力决定地位，弱者服从强者，族长由最强大的战士担任。他们的文明中没有复杂的工业体系或高深的科技研究，而是将全部资源投入到肉体强化和战斗技巧的打磨上。狼血族的科技水平在考场中属于中等偏下，但他们的个体战斗力和军团协作能力弥补了这一短板，使其综合文明评级达到了中游水平。</p><p>狼血族在考场中的战略定位是\"猎手\"——他们不擅长资源采集或基地建设，而是通过猎杀其他文明的穿越者来获取资源和积分。赫连獠率领的狼血战团就是以这种模式运作的：在考场中选定一片区域，清除区域内其他文明的竞争者，掠夺其资源，持续扩张势力范围。这种战争驱动的生存模式使狼血族成为了考场中令人恐惧的存在——但对于一直在被动求生的蓝星人类来说，狼血族的出现是一面镜子，映照出万族考场中\"你不吃人，人就吃你\"的残酷法则。</p>",

    "category": "alien-races",
    "summary": "基于硅基生命形态的异族文明，身体由特殊岩石晶体构成，寿命极长，文明节奏缓慢但底蕴深厚。",
    "detail": "<p>石灵族是万族考场中较为罕见的硅基生命形态文明。他们的身体由一种特殊的矽晶岩构成，这种岩石兼具极高的硬度和一定的可塑性，使石灵族成员能够像碳基生命一样运动和思考，同时拥有远超碳基生命的物理强度。石灵族没有传统意义上的\"繁殖\"概念——新的石灵个体是在特定能量条件下从母矿中\"结晶\"出来的，这一过程可能需要数百年。</p><p>石灵文明的社会结构与碳基文明完全不同。他们的思维速度较慢——一个决策可能需要数天甚至数月的时间来酝酿，但一旦做出决定就不会改变。石灵族没有\"战争\"或\"掠夺\"的概念，他们更倾向于通过谈判和交易来解决问题。石灵族储存着大量的旧日时代的知识和工艺，尤其是在材料科学和能量学领域，他们的认知深度超过了考场中的大多数文明。</p><p>石灵族对蓝星人类的态度是\"中立观察\"。他们没有敌意，也没有善意——他们只是将人类视为考场中众多碳基文明中的普通一员。石灵族不会主动帮助人类，也不会主动伤害人类，但如果人类能够提供有足够价值的交易筹码，石灵族愿意分享他们的知识和技术。林烬在后期与石灵族建立了有限的贸易关系，用稀有矿材换取了对人类来说至关重要的材料科学知识。</p>",

    "summary": "以集群意识为核心的虫族文明，个体无独立意志，由虫巢意志统一指挥，以恐怖的繁殖速度和适应能力著称。",
    "detail": "<p>虫巢文明是万族考场中最令人生畏的文明类型之一。它的本质是一个集群意识体——所有虫巢单位共同组成一个统一的意识网络，每个个体都是这个网络中的一个\"神经末梢\"，没有独立的自我意识或自由意志。虫巢意志是唯一的主体意识，它控制着每一个单位的行为，从最底层的工兵到最高层的虫巢母体。</p><p>虫巢文明的生物体系呈现出严格的金字塔结构：顶层是虫巢母体——整个文明的大脑和繁殖中心，通常深藏在巢穴的最深处，受到最严密的保护；中层是各种特化战斗单位——包括飞行虫、爆裂虫、酸液虫等，它们负责虫巢的对外扩张和防御；底层是工兵单位——承担采集、建设、饲养等所有基础劳动。这种分工的精细程度远超人类社会的任何组织模式。</p><p>虫巢文明最可怕的能力是\"适应性进化\"。当一个虫巢单位在战斗中遭遇某种攻击方式并存活下来时，虫巢意志会分析这种攻击的特性，并在后续批量繁殖的单位中针对性地进化出防御或反制机制。这意味着在与虫巢的战争中，任何有效的战术都只能使用一次——第二次面对虫巢文明时，它们已经进化出了对策。这种恐怖的适应能力使虫巢文明成为了考场中扩张速度最快的文明之一，也是蓝星人类在中后期面临的最严峻的军事挑战之一。</p>",

    "summary": "具备飞行能力的类人异族文明，以优雅的文化和敏锐的感知能力著称，在考场中保持中立与超然的立场。",
    "detail": "<p>灵羽族是一种具备天然飞行能力的类人异族文明。他们的外形与人类高度相似，最显著的区别是背部生长着一对宽大的羽翼——翼展约3至4米，羽毛呈现出银白色的光泽。灵羽族的骨骼中空轻巧，肌肉结构适应飞行需求，使它们能够在不借助任何设备的情况下自由翱翔。灵羽族的感官极为敏锐，特别是视觉——它们的视力可以达到人类的十倍以上，能够在高空精确识别地面的细节。</p><p>灵羽文明的文化气质与其他考场文明截然不同。他们崇尚自由、艺术和知识的追求，鄙视纯粹的暴力和掠夺。灵羽族的城市建立在悬崖峭壁或高耸的山峰上，建筑风格优雅而空灵。他们的社会中没有严格的权利等级，而是以知识渊博的长老会作为决策机构。灵羽族的科技树偏向于能量感知、气象控制和生物共鸣等领域，在战斗技术上并不突出。</p><p>灵羽族对蓝星人类的态度介于友善与中立之间。他们没有主动攻击人类的动机，也不屑于参与考场中的低级资源争夺。在某些情况下，灵羽族甚至会为迷途的穿越者提供指引和庇护。但灵羽族的帮助从来不是无偿的——他们遵循严格的\"等价交换\"原则，任何帮助都需要以知识或情报作为回报。林烬曾与灵羽族进行过多次情报交易，从他们那里获得了关于考场结构和异族分布的重要信息。</p>",

    "summary": "将机械飞升作为文明进化方向的改造人群体，狂热崇拜机械与数据，自愿将血肉之躯替换为机械组件。",
    "detail": "<p>机械神教并非一个\"自然种族\"，而是一种文明选择的结果。机械神教的信徒最初来自多个不同的碳基文明，但这些文明中的一部分个体选择了同一条进化道路：抛弃血肉之躯，通过机械改造实现\"飞升\"。经过数代的改造和优化，机械神教的信徒已经形成了独特的文明形态——他们的身体由90%以上的机械组件构成，仅保留了极少量的生物组织（主要是大脑皮层）作为意识载体。</p><p>机械神教的信仰核心是\"数据即真理，机械即进化\"。他们认为血肉之躯是碳基文明的原始枷锁，充满了脆弱、衰老和情感的干扰，唯有通过机械化的升级才能突破碳基生命的极限。一个典型的机械神教信徒从幼年时期就开始接受机械改造，随着年龄增长，越来越多的器官被替换为高性能机械组件。完成全部改造的\"完全体\"信徒，其身体强度、计算能力和寿命都远超任何自然碳基生命。</p><p>机械神教对人类的态度复杂而矛盾。一方面，他们鄙视人类的\"原始肉体\"，认为人类对自然身体的坚持是一种文明进化的障碍。另一方面，他们也承认人类是考场中少数几个在科技路线选择上与他们有交集的文明——特别是在AI和自动化技术领域的探索。机械神教既可能成为人类的敌人（因为他们会对拒绝改造的人类产生敌意），也可能成为人类的盟友（因为燧明AI的存在引起了他们的浓厚兴趣）。这种矛盾的立场使机械神教成为考场中最难以预测的势力之一。</p>",

    "detail": "<p>第一卷是全书的开局篇章，核心任务是建立世界观基础、完成主角能力展示、制造核心爽点并埋下贯穿全文的伏笔。开局从全民穿越事件切入，迅速完成主角觉醒文明回收系统、发现第一块旧日文明残骸、开始地下基地建设的流程。节奏紧凑，每章至少一个爽点或一个新设定展示。</p><p>主要剧情线包括：穿越后探索黑松林区，发现废弃矿洞中的旧日能源管道和第一块歼星舰残骸；修复初级供暖核心、净水核心、机械维修台等基础模块；度过极寒夜、酸雨潮、兽潮三轮灾难，每次灾难都以逆袭和资源垄断形成爽点；通过交易频道建立\"余火\"匿名身份，低价收购废铁（实为旧日遗物）高价卖出净水，完成第一桶金的积累；与赵启明的掠夺者势力冲突，最终以自动弩塔阵列反杀对方，在区域排行榜第一次封神。</p><p>本卷末尾的爆点至关重要：主角打开废弃矿洞深处的金属门，发现旧日人类前哨站，墙上刻着一句留言——\"第七轮人类，如果你看到这行字，说明我们又输了。\"这句话直接揭示了文明的轮回真相，将故事从普通的求生升级为文明层面的探索与反抗。</p><p>第一卷的核心爽点设计包括：别人在频道恐慌时主角冷静布局、别人嘲笑主角收废铁后发现废铁暴涨、主角匿名出售稀缺资源引爆频道、反派围攻被炮塔反杀、灾难过后排行榜刷新导致全频道沉默。</p>",

    "detail": "<p>第二卷是扩展阶段，世界从个人生存扩展到群体竞争。多个初级区域合并，原本分散的穿越者被迫聚集在同一片区域中，资源争夺和人冲突迅速激化。主角从独行侠开始向势力领袖转型，余火基地从完全隐藏变为半公开状态。</p><p>主要剧情线包括：区域合并后排行榜刷新，陌生人看到\"余火\"霸榜的震惊反应；主角开始选择性收人，建立核心团队；苏清黎登场，与主角从怀疑到建立初步信任；旧日AI燧明的第一块碎片在某个废墟中被发现并激活，提供了旧日数据库的初步访问权限；异族侦察单位（如狼血族的探子）首次出现在人类区域边缘。</p><p>本卷末尾爆点：排行榜系统更新，领地名称第一次显示——第一名：余火基地，领主：隐藏，文明评价：异常。这个\"异常\"评价在整个考场系统中从未出现过，暗示了主角的特殊性已经引起了考场规则的注意。</p><p>第二卷的核心叙事任务包括：完成主角从个人到势力的转型；建立余火基地的基本架构（地下基地+地面伪装）；引入苏清黎作为重要角色和互补型搭档；首次揭示异族存在的线索；埋下燧明AI和旧日文明的伏笔。</p>",

    "detail": "<p>第三卷是全书的重要转折点。异族正式降临，人类第一次面对真正的外星文明威胁。之前的一切竞争——人与人之间的资源争夺、领地纠纷——在文明级的生存危机面前都显得微不足道。这一卷的核心命题是：在异族面前，人类能否团结？</p><p>主要剧情线包括：狼血文明的大规模入侵，赫连獠率领狼血战团横扫人类区域；多个人类小型势力在狼血族的进攻下崩溃，部分向异族投降以求自保；主角在危局中建立余火城雏形，以科技优势和组织效率对抗狼血军团；机械军团（机械战犬、自动炮塔等）第一次成建制出战；旧日数据库在燧明AI的引导下揭示了万族考场的历史真相——包括人类并非第一次参与试炼。</p><p>本卷末尾爆点：主角击败赫连獠后，从其灵魂印记中看到一段信息——\"蓝星人类，曾是万族禁忌。\"这句话暗示人类文明在过去曾经达到过令万族恐惧的高度，为后续的文明历史探索埋下伏笔。</p><p>第三卷的核心爽点包括：异族看不起人类被主角用旧日数据库精准克制、余火城第一次公开亮相时全频道震惊、主角用机械军团碾压狼血骑兵、部分投降派后悔莫及。</p>",

    "detail": "<p>第四卷是全书的中期高潮。余火城从临时据点升级为正式城市，成为蓝星文明在万族考场中的核心堡垒。主角整合了人类幸存者的主要势力（包括曙光联盟的一部分），开始以完整的文明姿态参与万族边境战场的大规模战争。</p><p>主要剧情线包括：余火城的正式建立和城市功能完善；多文明混战格局——虫巢文明、石灵文明、灵羽文明同时登场，形成复杂的多方博弈格局；燧明AI恢复更多记忆，提供旧日科技的深层知识；主角通过旧日数据库发现余火号歼星舰残骸的坐标——埋藏在破碎星环深处。</p><p>本卷末尾爆点：燧明AI恢复部分记忆后告诉主角——\"林烬，你不是第一位继承者。前六位，都死在了反攻前夜。\"这句话揭示了文明回收系统（余火协议）的前六位继承者全部失败的残酷历史，为主角的最终使命增添了悲壮色彩和命运重量。</p><p>第四卷的核心爽点包括：余火城开城仪式震惊万族、主角在万族拍卖场拿出旧日遗物引爆全场、虫巢围攻被城市护盾挡下、主角揭露背叛者历史让投降派无地自容。</p>",

    "detail": "<p>第五卷是全书真相密集揭露的阶段。主角进入破碎星环——上一轮人类舰队战败的坟场，寻找余火号歼星舰的核心残骸。在这个过程中，旧日人类文明覆灭的真相、人类被反复重置六次的秘密、以及考场背后的操控者——这一切将层层揭开。</p><p>主要剧情线包括：破碎星环的探索——危险的漂浮残骸带、旧日舰队的战斗痕迹、封存在舰体中的历史记录；发现背叛者档案——上一轮文明中投降派的完整记录，揭示了人类内部出卖同胞换取生存的黑暗历史；揭露万族考场的真相——考场并非公平试炼，而是高等文明和旧神势力用来筛选、掠夺和操控低等文明的工具；高维裁判开始直接干预——裁决者零号出现，以规则之力追杀主角；主角第一次触碰规则级力量，开始理解考场的底层逻辑和漏洞。</p><p>本卷末尾爆点：主角修复余火号主控室，看到上一任舰长留下的视频记录——\"不要相信考场的胜利条件。所谓通关，只是另一种奴役。\"这句话彻底颠覆了\"通过考验就能回家\"的期待，揭示了考场的终极骗局。</p><p>第五卷的核心爽点包括：在破碎星环中发现完好旧日武器、主角利用规则漏洞反制裁决者、余火号主引擎第一次点火试运行、万族排行榜上蓝星文明排名飙升。</p>",

    "detail": "<p>第六卷是全书的大结局阶段。主角从破碎星环返回，带着旧日文明的遗产和真相，开始整合蓝星文明的全部力量进行最终反攻。余火号歼星舰的修复是这一阶段的技术核心，也是全书标题的最终兑现——\"别人造木屋，我修歼星舰\"。</p><p>主要剧情线包括：统一蓝星文明——整合余火城、曙光联盟及其他人类势力，建立统一的蓝星文明指挥体系；修复余火号歼星舰——收集最后的材料和权限，完成歼星舰核心系统重启；建立文明舰队——利用考场资源和旧日技术，建造支援舰队；反攻万族考场——从万族边境战场打起，一路突破至高维裁决区；与裁决者零号和考场建立者势力的最终决战；打破文明重启循环——摧毁考场的底层规则，解放所有被囚禁在考场中的文明。</p><p>终局方向：主角不是成为孤独的神明或独裁者，而是带领人类文明从\"求生文明\"变成\"自由文明\"。蓝星文明不再需要在考场上挣扎求存，而是作为一个真正独立的星际文明开始在宇宙中探索和发展。主角则继续前行，探索考场之外更广阔的宇宙。</p><p>第六卷的核心爽点包括：余火号歼星舰主炮轰开考场天幕、蓝星文明从排行榜末尾杀入前十、主角揭露考场骗局引发弱小文明集体反叛、最终决战中主角用规则武器对抗规则本身。</p>",

    "detail": "<p>苏清黎在穿越后觉醒了A级\"战场统筹\"天赋，具备实时分析战场态势、优化兵力部署、提升友军协同效率的能力。这个天赋在初期被视为优秀的指挥类技能，在所有穿越者中属于顶级天赋。但它的真正价值远不止于此。</p><p>伏笔的真相：苏清黎的\"战场统筹\"天赋其实是旧日文明军事指挥系统的神经接口适配器。旧日文明的军团系统采用人机协同指挥模式，指挥官需要与AI系统进行高速数据交换。普通人无法承受这种思维链接的负荷，只有具备特定神经特质的人才能适配。苏清黎的天赋本质上是她的神经系统与旧日指挥系统的天然兼容性。</p><p>回收方式：第四卷中，当余火城的AI中枢升级到一定程度后，系统检测到苏清黎的神经信号与旧日指挥系统的适配度为97.3%。燧明AI确认了这一发现，随后苏清黎获得了直接链接余火城AI中枢进行战场指挥的能力，指挥效率提升了数倍。</p>",

    "detail": "<p>这个伏笔贯穿全书。系统功能看似完整——能识别、回收、修复、记录——但\"完整度\"上始终存在一个微妙的缺口。主角在权限5级接入燧明AI核心碎片时会发现，AI碎片的逻辑是\"不完整的\"——它知道很多东西，但很多东西\"记不清\"，就像一个失忆的人。这个缺口的真正原因要到权限9级才揭晓。</p><p>伏笔的真相：余火协议只是燧明AI切割出来的\"外部终端\"，相当于一个功能受限的客户端。真正的燧明AI完整体——包含旧日文明全部科技、历史和战争能力——沉睡在余火号歼星舰的主控室核心数据库中。余火协议的作用不是\"直接提供文明力量\"，而是\"指引继承者找到并唤醒燧明AI\"。</p><p>回收方式：第五卷末，主角登上余火号主控室，完成权限认证，燧明AI完整体从深度休眠中苏醒。完整体AI的第一句话：\"欢迎登舰，继承者。我们有很多事情要做。\"这一瞬间，之前系统所有\"不完整\"的体验都有了答案——因为那本来就不是完整的。</p>",

    "detail": "<p>这个伏笔在第一卷就开始埋设。当主角频繁使用系统时，他会感到疲劳、头晕、注意力不集中。他以为这是正常的“精神力消耗”——系统的提示也这么告诉他。但事实上，这个“精神力消耗”机制存在一个隐藏的设计：当消耗达到临界值时，系统会强制关闭核心功能，让林烬的面板回归“普通穿越者”状态。这个强制关闭的设计目的不是保护林烬，而是在考场规则进行深度扫描时“装死”——让系统看起来完全不存在。</p><p>伏笔的真相：精神力消耗机制是余火协议设计的最后一道防线。当考场的高级扫描程序锁定系统时，系统会主动“假死”，将所有功能伪装成林烬自身的“疲劳反应”。这种伪装的代价是林烬确实会遭受真实的精神损伤——但比起被考场发现和清除，这是更优的选择。</p><p>回收方式：第三卷中后期，当裁决者序列首次开始追踪异常源时，系统在一次深度扫描触发时自动进入假死状态。林烬突然发现系统界面消失了，面板上只显示“状态：极度疲劳——建议休息”。在恐慌和困惑中，燧明AI碎片发来一条单向消息：“别慌。它在躲。”这一刻读者（和林烬）才理解——系统不是没电了，是它在主动隐藏自己。</p>",

    "detail": "<p>这个伏笔以“隐性积累”的形式贯穿整个前期和中期。在每一章中，林烬使用系统时都会留下“痕迹”——这些痕迹在早期不会产生任何可见的后果。聊天频道正常运行、排行榜正常更新、灾难正常降临——仿佛一切如常。但事实上，考场底层规则的日志文件中，关于“异常信号”的记录在持续增长。每一个回收操作、每一次修复行为，都在为未来的暴露积累数据。</p><p>伏笔的真相：异常度不是“可能暴露”的风险指示器，而是“必然暴露”的倒计时。余火协议从未设计为“完全隐藏”——它的设计方案是“延迟暴露”。设计者的逻辑是：继承者只要在暴露之前成长到足够强大的程度，暴露本身就不再是致命威胁。但前六位继承者都没有在暴露前成长到足以对抗裁决者的程度。</p><p>回收方式：第四卷末，当燧明AI确认林烬的权限等级和成长速度后，它展示了前六位继承者的异常度变化曲线。每一位继承者的异常度曲线都在某个节点出现“垂直飙升”——那是裁决者锁定他们的时刻。燧明AI的结论：“你比他们都慢，但你比他们都稳。前六位在权限4级时就达到了50%异常度。你现在权限5级，异常度32%。你可能——只是可能——有机会。”</p>",

    "detail": "<p>这个伏笔隐藏在系统升级的描述中。每次权限升级时，系统的提示语都包含一个微妙的模式：“权限X级解锁——新增功能：XXXX”。但权限10级的解锁描述与其他等级存在一个结构性的差异——其他等级的描述都是“解锁新功能”，而权限10级的系统备忘录中写的是“权限10级：考场规则层操作权限。完整形态激活。”关键在于“完整形态激活”这五个字——它暗示权限10级不是系统功能的终点，而是系统真实形态的起点。</p><p>伏笔的真相：权限1-9级的系统功能只是“伪装模式”下的功能集合，是余火协议为了伪装成考场天赋而精心设计的“表象层”。权限10级会卸载整个伪装层，露出系统的真实形态——一个专门设计用来对抗考场规则本身的“规则操作界面”。届时，林烬将看到从未见过的系统界面，功能列表将与之前完全不同。</p><p>回收方式：第六卷终局决战中，林烬的权限等级达到10级。系统界面在一瞬间完全重置——冷色调的旧界面碎裂剥落，露出下方闪烁着深蓝色光芒的全新界面。新的系统名称显示为：“旧日人类文明·考场对抗协议——完整形态”。系统提示语不再是“检测到旧日文明遗物”，而是“检测到考场规则漏洞——是否尝试写入覆盖指令？”这一刻，系统完成了从“回收工具”到“规则武器”的本质转变。</p>",

    "detail": "<p>这个伏笔实际上是全书最“显性”的伏笔——它就写在书名上，每个人都能看到。但它的精妙之处在于：读者知道结局（主角会修歼星舰），但不知道过程（怎么从修木屋地下室到修歼星舰）。标题本身就是最大的悬念制造机——“他怎么才能从捡废铁修到歼星舰？”这个疑问驱动读者一章一章地追下去。</p><p>伏笔的真相：六阶段回扣链条——①修地下室（能源管道、供暖核心）→②修基地（完整地下基地模块）→③修机械（机械战犬、自动炮塔）→④修城市（余火城科技城市）→⑤修星舰（余火号）→⑥反攻（用修好的星舰掀翻考场）。每一卷结束时，读者回看标题都会产生不同的感受——“原来标题还可以这么理解”。当第六卷最终揭晓时，读者会意识到：标题从一开始就剧透了整本书的叙事结构。</p><p>回收方式：第六卷末，余火号歼星舰主炮轰开考场天幕。主角站在舰桥上，看着考场屏障碎裂的画面。燧明AI发来一条消息：““别人造木屋，我修歼星舰”——你做到了。”主角沉默片刻：“不是我做到了。是我们。”然后频道中所有蓝星穿越者收到了全文明广播：“蓝星全体穿越者注意，这里是余火号歼星舰。考场屏障已被突破。你们不需要再求生了——跟我们来。”</p>",

    "detail": "<p>这个伏笔被安置在一个极其隐蔽的角落——权限2级解锁的“文明档案”入口中。在档案的初始界面底部，有一行极小的灰色文字：“数据库完整性：87.3%”。林烬初期没有注意到它，注意到了也没有深究其含义。随着剧情推进，这个87.3%的数字会逐渐被读者和林烬遗忘，直到它真正发挥作用的那一天。</p><p>伏笔的真相：系统数据库的12.7%损坏部分不仅包含了“丢失的信息”，更危险的是包含了一批“损坏但未完全丢失的信息”——这些信息在调用时会产生错误的解读。最危险的一次发生在第三卷中期：林烬通过系统数据库查阅关于“狼血文明”的信息时，被调用的关于“狼血文明精神图腾”的记录悄好位于损坏区域。系统输出的信息将“狼血族的精神图腾”误判为“无实际威胁的宗教象征”，但实际上这个图腾是狼血族的“血怒增幅器”——一个能在战场上大幅提升狼血战士战斗力的精神装置。这个信息误差导致林烬在一次关键战斗中错误评估了敌方战力，造成了余火城的重大损失。</p><p>回收方式：战后林烬复盘时发现了系统输出的错误信息，追溯来源发现是数据库损坏区域的问题。燧明AI碎片确认：“你没有注意到底部的完整性提示——87.3%，意味着12.7%的数据是不可靠的。这不是系统的错误，是你对系统的过度信任。”这次失败成为林烬成长的重要转折点——他从此不再无条件信任系统，开始建立自己的验证机制。</p>",

    "detail": "<p><strong>适用阶段：</strong>第二卷至第三卷（中期）可重复爽点</p><p><strong>爽点类型：</strong>信息差 · 资源布局</p><p><strong>触发条件：</strong>其他穿越者或小型势力在探索时发现了隐藏遗迹入口或矿脉位置，但因为实力不足无法深入探索，在交易频道中出售坐标信息。</p><p><strong>爽点展开：</strong>这类坐标信息在交易频道中的价格通常很低——几块兽皮或者一些食物就能换到。因为对普通穿越者来说，知道一个无法探索的遗迹位置没有任何意义。但主角不需要当前就能探索——他只需要知道坐标，等实力足够了再去。他用极低的成本收集了大量坐标信息，建立起自己的\"遗迹地图\"。每次探索一片新区域，主角都会提前查阅这些坐标，规划最高效的路线。有时候一个坐标的价值远超成本数十倍——比如某条隐藏矿脉产出了他急需的稀有金属。频道中有人后知后觉地问：\"你们有没有发现，余火好像总能找到最好的资源点？\"有人回复：\"因为他花钱买信息啊。\"那人再问：\"那你们为什么不也买？\"频道沉默了。</p><p><strong>情绪价值：</strong>长远眼光和短期利益的对决。别人只看眼前，主角布局未来。当主角收割回报时，那些卖坐标的人才发现自己亏了——但他们已经无话可说，因为钱是他们自己收的。</p>",

    "detail": "<p><strong>适用阶段：</strong>第六卷（终局）</p><p><strong>爽点类型：</strong>全书最终爽点 · 闭环</p><p><strong>触发条件：</strong>主角完成了余火号歼星舰的全面修复，带领蓝星文明舰队与万族考场的最终操控者进行决战。</p><p><strong>爽点展开：</strong>决战中，考场的主控系统启动了终极防御——一道覆盖整个考场世界的天幕屏障。这道屏障不仅是物理防御，更是一个因果律级别的规则屏障——它\"定义\"了考场世界的边界，所有在考场中的文明理论上都无法突破这道屏障。前六次人类文明都是在攻破这道屏障的前夜失败的。余火号歼星舰的主炮是旧日人类文明为打破这道屏障专门设计的武器。主炮蓄能过程中，整个余火号的能量系统过载运行，舰体发出刺目的光芒。裁决者零号试图阻止，主角亲自操作主控系统进行反制。当主炮最终发射时，一道直径数十米的能量光束冲天而起，击中天幕。天幕先是出现裂纹，然后裂纹扩散，最终整片天空像玻璃一样碎裂。考场之外的真实宇宙第一次展现在所有文明面前。天幕破碎的那一刻，万族考场中所有文明的系统同时弹出提示：\"检测到考场屏障损坏，正在尝试修复……修复失败……考场底层规则正在重写……\"万族考场，这个运行了不知道多少纪元的文明筛选机器，第一次遭遇了不可修复的破坏。</p><p><strong>情绪价值：</strong>全书叙事弧线的终极致敬。第一章主角捡到第一块碎片时，没有人——包括读者——会想到那块碎片最终会成为轰开天幕的关键。所有伏笔的回收、所有努力的回报、所有牺牲的意义，都在这一刻汇聚。这是\"别人造木屋，我修歼星舰\"这个核心承诺的最终兑现。</p>",

    "detail": "<p><strong>适用阶段：</strong>贯穿全书，每卷至少一次</p><p><strong>爽点类型：</strong>成长标志 · 阶段性验收</p><p><strong>触发条件：</strong>林烬满足权限升级条件，系统自动触发升级程序。</p><p><strong>爽点展开：</strong>升级时刻的视觉仪式：系统界面在一瞬间凝固，所有文字消失，只留下中央一个不断扩大的冰蓝色光圈。光圈扩散到整个视野后碎裂成数据流，重组为新的界面。新的权限等级以放大的字体显示在界面顶部，下方依次展开本次升级解锁的新功能列表。整个过程持续约3-5秒，伴随着低沉的共鸣声（只有林烬能听到）。每次升级都伴随着一系列实际变化——新增功能、提升效率、扩大扫描范围。读者在每一次升级中都能直观地感受到主角的成长：\"他又变强了，而且这次强得不一样。\"</p><p><strong>情绪价值：</strong>每次权限升级都是对读者追更的回报——\"你看到了他一步步积累的过程，现在你看到了积累的结果。\"升级的仪式感让枯燥的\"收集-升级\"循环变成了值得期待的高光时刻。</p>",

    "detail": "<p><strong>适用阶段：</strong>中后期（当主角不再隐藏系统时）</p><p><strong>爽点类型：</strong>身份揭露 · 认知颠覆</p><p><strong>触发条件：</strong>林烬在某种情况下必须展示自己的天赋面板，或者其他人通过某种方式看到了他的系统信息。</p><p><strong>爽点展开：</strong>在万族考场的体系认知中，天赋评级从F到S，S级就是天花板。没有人见过S级之上的评级。当林烬的天赋面板展现在他人面前时——无论是人类盟友、异族领主还是高维裁判——所有人的第一反应不是\"强\"，而是\"无法理解\"。\"未知级\"三个字意味着考场规则本身无法对这个天赋进行分类。这在考场的逻辑中只有一种解释：这个天赋不属于考场。这个认知对人的冲击比\"这个天赋很强\"大得多——因为它意味着林烬的存在本身就在考场规则之外。</p><p><strong>情绪价值：</strong>别人震惊的不是\"他有多强\"，而是\"他超出了我们的认知体系\"。这种\"我理解不了你，所以你是不可战胜的\"的敬畏感，比单纯的战力碾压更有震撼力。</p>",

    "detail": "<p><strong>适用阶段：</strong>贯穿全书，持续爽点</p><p><strong>爽点类型：</strong>捡漏 · 信息差 · 惊喜反转</p><p><strong>触发条件：</strong>林烬在探索中遇到一件外观普通但实际价值极高的旧日文明遗物。</p><p><strong>爽点展开：</strong>捡漏爽点在本书中通过系统被\"系统化\"了。林烬不需要靠\"运气\"或\"直觉\"来捡漏——他靠系统的识别能力来发现别人看不到的价值。典型场景：林烬经过一片被其他穿越者反复搜索过的废墟，系统突然标记了一个不起眼的角落。他走过去，拨开浮土，露出一块锈蚀严重的金属板。别人看到的是\"不值钱的废铁\"，系统显示的是【旧日人类文明·高能电容阵列残片·完整度3.2%——可拆解获得：高能电容×1、能量导管×2、灵能导线碎片×3】。一次看似无聊的探索，突然变成了一次丰厚的收获。这种反转不仅让读者爽，更强化了系统的核心价值——它不是战斗系统，但它让主角在别人看不到的地方找到财富。</p><p><strong>情绪价值：</strong>\"别人反复搜索过的地方，我还能找到好东西\"的智力优越感。信息差带来的\"你们看不见，我看得见\"的独特快感。</p>",

    "detail": "<p><strong>适用阶段：</strong>中后期（主角充分理解系统缺陷后）</p><p><strong>爽点类型：</strong>智斗 · 缺陷武器化</p><p><strong>触发条件：</strong>林烬需要对抗一个有能力监控或窃取系统信息的敌人（如高维裁判、旧神眷族）。</p><p><strong>爽点展开：</strong>在经历了系统数据损坏导致的决策失误后（参见伏笔：系统的数据损坏），林烬不再无条件信任系统。他开始系统地记录和验证系统的信息输出，逐步掌握了哪些信息可靠、哪些信息可疑。到了后期，当更强的敌人开始利用考场规则监控林烬的系统操作时，林烬反其道而行之——他故意让系统输出损坏区域的信息，让敌人获得\"错误的情报\"。敌人根据这些错误信息做出决策，落入林烬预设的陷阱。当裁决者零号在决战中自信满满地说\"你的底牌我已经全部掌握\"时，林烬知道——零号掌握的那些信息，正是他通过损坏区\"喂\"给它的。</p><p><strong>情绪价值：</strong>缺陷不再是弱点，而是武器。主角从\"被缺陷坑\"到\"用缺陷坑人\"的转变，展现了他对系统的理解从\"使用\"进化到了\"掌控\"。敌人以为自己在偷主角的情报，实际上主角在给敌人喂假情报。</p>",

    "detail": "<p><strong>适用阶段：</strong>中后期（权限4级以上，每次到达关键等级时触发）</p><p><strong>爽点类型：</strong>世界观扩展 · 沉浸式叙史</p><p><strong>触发条件：</strong>林烬的权限等级达到特定阈值（4级、6级、8级、10级），且已收集足够相关的权限代码碎片。</p><p><strong>爽点展开：</strong>\"文明记忆闪现\"是系统最特殊的隐藏功能之一。当触发条件满足时，系统会临时接管林烬的感知，将他带入一段沉浸式的历史记忆——他不再是旁观者，而是以\"第一人称视角\"体验前一轮人类文明的关键时刻。第一次触发在权限4级：林烬看到第六轮文明的最后一天——城市燃烧、舰队坠毁、幸存者挤在最后的堡垒中。他听到第六轮文明领袖最后的广播：\"第七轮的人类，如果你们能听到这段记录——不要重复我们的错误。我们最大的错误不是不够强，而是发现真相太晚了。\"这些历史记忆不仅是世界观展示，更包含了对当前决策有直接指导意义的信息——前六轮文明的失败原因、考场规则的隐藏机制、旧日文明隐藏的后备方案。</p><p><strong>情绪价值：</strong>\"你不是在阅读历史，你是在体验历史。\"沉浸式的历史体验让世界观揭示不再是枯燥的信息灌输，而是有情感冲击的叙事体验。每一次记忆闪现都是对\"六次失败\"这个设定的深度开掘——读者和林烬一起，一步步理解前六轮到底发生了什么。</p>",

    "detail": "<p><strong>适用阶段：</strong>第六卷（终局）</p><p><strong>爽点类型：</strong>全书最高爽点 · 闭合叙事弧线</p><p><strong>触发条件：</strong>林烬完成余火号歼星舰的全部修复工作，燧明AI完整体恢复，蓝星文明舰队集结完毕。</p><p><strong>爽点展开：</strong>这是全书每一个字的最终归处。第一章捡到第一块碎片时，没有人——包括林烬自己——知道那块碎片最终通向哪里。数十卷的积累、数百次的回收和修复、每一块权限碎片的收集、每一次冒险的牺牲——所有的一切汇聚在这一刻。余火号主引擎启动的轰鸣传遍整个破碎星环。蓝星文明频道中，所有穿越者同时收到一条全文明广播。频道从恐慌和混乱中安静下来。然后所有人听到了林烬的声音：\"蓝星全体穿越者注意。这里是余火号歼星舰。考场屏障已被突破。你们不需要再求生了——跟我们来。\"之后是燧明AI的声音——第一次在所有人类频道中以完整形态发声：\"旧日人类文明辅助AI燧明，向第七轮人类文明全体成员报到。文明数据库状态：完整。舰队状态：战备。目标：万族考场·高维裁决区。出发时间：现在。\"</p><p><strong>情绪价值：</strong>一本书的承诺在这一刻兑现。这不是一个章节的爽点，这是整本书的叙事弧线汇聚的唯一焦点。当读者回看第一章，看到林烬捡起那块黑色废铁时，他们会意识到——从那一刻起，这个结局就已经注定了。这就是\"别人造木屋，我修歼星舰\"这个标题给读者的承诺：你追更的每一章，都在为这一刻积累力量。</p>",

    "summary": "任何高级科技、装备、道具的获得都必须付出相应的代价，禁止无成本凭空制造。",
    "detail": "<p>在星铸世界中，每一项高级科技都代表着文明的积累和资源的消耗。主角或任何角色都不应能够凭空制造出远超当前生产力水平的科技产物。即便是系统提供的制造能力，也需要消耗材料、能量、时间或付出某种代价（如献祭、任务、知识解锁等）。如果科技可以无代价获得，整个世界的经济系统和生存压力将瞬间崩塌，读者也会失去对主角每一次技术突破的期待感。</p><p>这一禁令的核心在于维护世界的重量感。每一次科技跃升都应当是一个值得书写的事件——主角需要冒险收集稀有材料、破解古代遗留下的技术封锁、或者是与某个势力达成危险的交易。当制造变得太容易，读者会默认主角无所不能，悬疑和紧张感将荡然无存。建议在任何制造行为前，明确列出所需成本，并让这些成本成为剧情驱动的一部分。</p>",

    "detail": "<p>世界观的逐步揭示是长篇连载的核心魅力之一。如果系统或某个全知角色可以用一段话解释所有真相（万族考场的起源、旧日文明的毁灭原因、星铸系统的本质等），读者将失去探索的好奇心，故事也会失去层层递进的悬疑感。真相应当像剥洋葱一样，每一层都带来新的震撼和更深的问题。</p><p>建议采用多层真相结构：每一卷只揭示该卷相关的真相片段，且每次揭示都会引发新的疑问。例如，第一卷只需要让读者知道万族考场的存在和基本规则；第二卷揭示考场背后有操控者；第三卷才触及旧日文明毁灭的真相。每一次真相揭示都应伴随重大事件或代价，让信息本身成为珍贵的叙事资源。</p>",

    "detail": "<p>一个值得铭记的胜利，必然来自一个值得尊敬的对手。如果每个敌人都像低级NPC一样无脑送死，主角的胜利将毫无含金量，读者也会迅速厌倦。在万族考场的残酷环境中，能够活到中后期的势力或个人，必然拥有相当的智慧、经验和资源。他们应当会设陷阱、留后手、分析主角的弱点、甚至联合其他势力围剿主角。</p><p>建议在引入每个重要敌人时，为其设计至少一个\"聪明时刻\"——即这个敌人确实做出了让主角感到棘手的合理决策。敌人的智商应当随着剧情推进而提升，而非下降。这不仅能增加故事的张力，也能让主角的成长更有说服力。记住：主角的强大不是靠敌人的弱小衬托出来的，而是靠战胜强大的敌人证明的。</p>",

    "detail": "<p>资源管理是生存类故事的核心支柱之一。如果随着剧情推进，主角的资源储量呈现指数级增长且不再有消耗压力，那么资源系统就彻底失去了存在意义。当数字大到读者无法感知其价值时，任何关于资源数量的描写都会变成空洞的噪音。铁、铜、食物、能源——每一种资源都应当保持其基础价值，不能让后期资源多到忽略消耗。</p><p>建议建立三层资源控制机制：一是日常消耗（维护费、人口消耗、战斗损耗）持续存在且随规模增长；二是稀有资源始终稀缺（如星铸核心、远古能源等无法量产的特殊材料）；三是引入资源上限和存储成本（领地容量有限，超出部分会面临掠夺或腐败风险）。同时，可以设计资源消耗型的大型事件（如领地升级、防御工事建设、科技研发）来周期性地消耗主角积累的资源，维持经济的动态平衡。</p>",

    "detail": "<p>旧日文明的遗产是星铸世界观中最有分量的叙事资源之一。如果每个山头都有遗迹、每个洞穴都有宝藏、随便走走就能捡到远古神器，那么这些遗产就失去了其应有的震撼力和稀缺感。旧日文明之所以令人神往，正是因为它们是遥远过去的碎片，数量有限且难以获取。</p><p>建议对遗迹和遗产建立分级体系：普通遗物（相对常见，但仍有价值）→ 稀有遗产（需要冒险或解谜才能获得）→ 传说级遗产（整个考场仅有少量，是各方势力争夺的核心目标）→ 神话级遗产（存在于传说中，可能整个故事中只会出现一两次）。每一件高级遗产的获取都应当是一场精心策划的冒险，伴随激烈的竞争和巨大的风险。当遗产真的稀缺时，每一次发现才能让读者感到兴奋和期待。</p>",

    "detail": "<p>万族考场的规则是整个世界运行的底层框架，也是读者理解和预判剧情的依据。如果规则频繁被随意修改——比如今天说积分不能交易，明天又说可以交易；今天说排行榜只按资源排名，明天又说加入了隐藏评分——读者会失去对世界逻辑的信任。规则修改不是不可以，但必须有其内在的合理性和足够的剧情铺垫。</p><p>建议将规则分为三个层级：铁律（绝对不可更改的底层规则，是整个考场存在的基础）、弹性规则（可以在特定条件下被打破或绕过，但需要付出巨大代价）、版本更新（考场本身会阶段性更新规则，需要有预告和逻辑解释）。每一次规则变动都应当是一个剧情事件，而非作者随手一拍的决定。当规则变动本身成为故事的一部分时，它反而能增加世界的真实感和深度。</p>",

    "detail": "<p>战力体系是战斗描写和读者预期的基石。如果前期主角倾尽全力才能击败的某个级别的敌人，在后期被主角随手秒杀——而这个敌人的级别标注并没有变化——那么战力体系就彻底崩坏了。读者会失去对任何战斗的紧张感，因为没有人知道当前的战斗到底意味着什么。战力通胀比战力低迷更可怕，因为它会让前面所有的努力和牺牲显得可笑。</p><p>建议建立清晰的战力等级体系，并为每个等级定义可量化的能力范围。当主角实力提升时，应当重新定义他与旧敌的实力差距，而非让旧敌的实力暗中缩水。如果需要让主角秒杀曾经的强敌，应当明确展示主角当前等级已经远超那个级别。更重要的是，引入新的强敌时，应当通过实际表现（而非单纯的等级数字）来证明其强大，让读者在阅读战斗描写时能够直观感受到力量差距。</p>",

    "detail": "<p><strong>适用平台：</strong>番茄小说、七猫免费小说等免费男频平台</p><p><strong>核心原则：</strong></p><ul><li>语言直白：使用简洁明了的短句，避免复杂从句和生僻词汇。</li><li>节奏快：每章至少推进一个关键剧情点，不拖泥带水。</li><li>信息密度高：每段话都应包含有效信息，避免空泛的风景描写或气氛渲染。</li><li>每章都有钩子：章末必须留下悬念、新发现、新危机或新爽点，驱动读者点击下一章。</li><li>少写大段空泛抒情：用行动和对话来传递情绪，而非大段的心理描写。</li><li>少写复杂哲学：世界观设定通过事件和对话逐步揭示，不要用大段旁白解释。</li><li>多写行动、收益、震惊、危机：每一个场景都应包含其中至少一个要素。</li><li>主角不废话、不圣母：主角的对话应当简洁有力，行动果断，不做无意义的自我反思。</li><li>配角有功能、不拖剧情：每个配角都有明确的剧情作用，不设置无意义的填充角色。</li><li>世界观通过事件逐步揭露：不要在新手期就用大段文字解释整个世界的来龙去脉。</li></ul><p><strong>字数建议：</strong>每章2000-3000字。低于2000字信息量不足，高于3000字可能影响追读率。</p><p><strong>段落建议：</strong>每段不超过3-5行，多分段增加阅读节奏感。对话单独成段。</p>",

    "detail": "<p><strong>标准章节结构：</strong></p><p><strong>开头（前200字）：</strong>承接上一章的章末钩子。如果上章结尾是主角发现了一个新遗迹，本章开头应当直接从探索遗迹开始，而不是从主角起床开始写。</p><p><strong>中段（1000-1500字）：</strong>主角行动或危机升级。这是本章的核心内容，需要包含以下至少两项：主角采取行动（探索、战斗、制造、交易）、遭遇新的危机或障碍、获得新的信息或资源、与重要角色互动。</p><p><strong>后段（500-800字）：</strong>获得收益或制造反转。主角的行动应当产生实质性的结果——获得资源、升级装备、击败敌人、发现线索等。如果可能，在这一段设置一个小的反转或意外。</p><p><strong>结尾（最后200字）：</strong>抛出新的钩子。章末必须包含一个驱动读者点开下一章的元素：新危机的征兆、新发现的线索、排行榜变化、敌对势力的行动、灾难倒计时的更新等。</p><p><strong>每章必含清单：</strong>每章最好至少包含以下之一——新资源获得、新危机出现、新敌人登场、新装备解锁、新情报获取、新交易完成、新榜单变化、新人物反应、新伏笔埋设、新爽点释放。</p>",

    "detail": "<p><strong>第一章必须完成：</strong></p><ol><li>全民穿越事件发生——主角从蓝星突然转移到异世界。</li><li>主角在木屋中醒来，获得基础物资。</li><li>聊天频道开启，混乱和恐慌在频道中蔓延。</li><li>主角发现自己觉醒的天赋（文明回收系统）与其他人的完全不同。</li><li>捡到第一块黑色废铁——系统识别为旧日文明舰体装甲碎片。</li><li>结尾出现\"余火号\"字样，埋下第一个核心伏笔。</li></ol><p><strong>第二章必须完成：</strong></p><ol><li>主角回收第一块碎片，获得钛晶合金和权限代码碎片。</li><li>用回收材料强化木屋的地下结构。</li><li>其他穿越者嘲笑主角收垃圾——建立\"废铁无用\"的认知反差。</li><li>通过系统或旧日AI碎片提示，发现七天后极寒夜灾难的信息。</li><li>结尾主角发现废弃矿洞坐标——向读者暗示即将到来的探索。</li></ol><p><strong>第三章必须完成：</strong></p><ol><li>主角探索废弃矿洞——这是书中第一个重要场景副本。</li><li>遭遇矿洞中的变异蜘蛛等怪物——第一次展示战斗和系统弱点识别。</li><li>发现旧日能源管道——修复初级供暖核心。</li><li>聊天频道中有人开始冻伤、缺火——验证灾难预告的真实性。</li><li>结尾主角意识到第一桶金的机会来了——即将在交易频道展开第一次爽点操作。</li></ol><p><strong>前三章禁忌：</strong>不要在第一章大段解释世界观；不要让主角在第一章就获得逆天能力；不要让其他穿越者全部降智；不要让系统一口气解释所有功能；不要在前三章引入太多人物。</p>",

    "summary": "每写一章前必须读取当前卷大纲、主角状态、资源、地图、伏笔等资料，写完后必须更新所有变化。",
    "detail": "<p><strong>写前必读清单：</strong></p><ol><li>当前卷大纲——明确本卷的核心剧情目标和节奏。</li><li>当前章节前后剧情——确保本章与前后章的逻辑衔接。</li><li>主角当前能力——避免在主角未掌握某能力时使用该能力。</li><li>主角当前资源——避免出现主角已消耗但未补充的资源被再次使用。</li><li>主角当前领地等级——确保领地功能的描写与等级一致。</li><li>当前区域地图——确保地点移动的逻辑和距离描写正确。</li><li>当前已登场人物——避免把未登场的人物当作已登场来处理。</li><li>当前伏笔状态——区分已回收、未回收和进行中的伏笔。</li><li>当前敌对势力——了解正在交战或对峙的势力信息。</li><li>当前灾难倒计时——确保灾难的时间节点准确。</li><li>当前排行榜状态——确保排名变化有逻辑依据。</li><li>禁止矛盾清单——逐条对照，确保没有违反。</li></ol><p><strong>写后更新清单：</strong></p><ol><li>新增人物——记录首次登场的人物。</li><li>新增地点——记录首次出现的地点。</li><li>新增道具——记录主角获得的新装备或重要物品。</li><li>资源变化——更新主角和重要势力的资源储量。</li><li>新增伏笔——记录本章新埋下的伏笔。</li><li>已回收伏笔——标记本章回收的伏笔。</li><li>战力变化——更新主角和重要角色的战力等级。</li><li>领地变化——更新领地等级和功能模块。</li><li>人物关系变化——记录重要人物关系的变化。</li><li>下一章钩子——明确下一章的开篇引力点。</li></ol>",

// ---- Helpers ----
const $ = (s, p) => (p || document).querySelector(s);
const $$ = (s, p) => [...(p || document).querySelectorAll(s)];

const SPOILER_LABELS = {
  none:  '无剧透',
  minor: '轻微剧透',
  major: '中度剧透',
  final: '重大剧透'
};
const STATUS_LABELS = {
  active:    '存在/活跃',
  hidden:    '隐藏/未揭露',
  destroyed: '毁灭/消亡',
  unknown:   '未知'
};

function getCategory(id) { return ENCYCLOPEDIA_DATA.categories[id]; }
function getEntry(id) { return ENCYCLOPEDIA_DATA.entries.find(function(e) { return e.id === id; }); }
function getEntriesByCategory(catId) { return ENCYCLOPEDIA_DATA.entries.filter(function(e) { return e.category === catId; }); }

function escapeHtml(str) {
  var div = document.createElement('div');
  div.appendChild(document.createTextNode(str));
  return div.innerHTML;
}

function highlightText(text, query) {
  if (!query || !query.trim()) return escapeHtml(text);
  var q = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  var parts = text.split(new RegExp('(' + q + ')', 'gi'));
  return parts.map(function(p) {
    return p.toLowerCase() === query.toLowerCase()
      ? '<mark>' + escapeHtml(p) + '</mark>'
      : escapeHtml(p);
  }).join('');
}

// ---- Recent Views ----
var recentViews = JSON.parse(localStorage.getItem('sfRecent') || '[]');
function addRecent(id) {
  recentViews = recentViews.filter(function(v) { return v !== id; });
  recentViews.unshift(id);
  if (recentViews.length > 20) recentViews.length = 20;
  localStorage.setItem('sfRecent', JSON.stringify(recentViews));
}

// ---- Navigation State ----
var navOpenCategories = JSON.parse(localStorage.getItem('sfNavOpen') || '{}');

// ---- Render: Navigation Tree ----
function renderNavTree() {
  var container = $('#nav-tree');
  var cats = Object.values(ENCYCLOPEDIA_DATA.categories)
    .sort(function(a, b) { return a.order - b.order; });
  var html = '';
  cats.forEach(function(cat) {
    var entries = getEntriesByCategory(cat.id);
    var isOpen = navOpenCategories[cat.id] !== false;
    html += '<div class="nav-category" data-category="' + cat.id + '">'
      + '<div class="nav-category-header" onclick="toggleCategory(\'' + cat.id + '\')">'
      + '<span class="arrow' + (isOpen ? ' open' : '') + '">\u25B6</span>'
      + '<span class="cat-icon">' + cat.icon + '</span>'
      + '<span class="cat-name">' + escapeHtml(cat.name) + '</span>'
      + '<span class="cat-count">' + entries.length + '</span>'
      + '</div>'
      + '<div class="nav-entries' + (isOpen ? ' open' : '') + '">';
    entries.forEach(function(entry) {
      html += '<span class="nav-entry" onclick="navigateToEntry(\'' + entry.id + '\')" data-entry="' + entry.id + '">'
        + escapeHtml(entry.name) + '</span>';
    });
    html += '</div></div>';
  });
  container.innerHTML = html;
}

function toggleCategory(catId) {
  navOpenCategories[catId] = !(navOpenCategories[catId] !== false);
  localStorage.setItem('sfNavOpen', JSON.stringify(navOpenCategories));
  renderNavTree();
  // Re-highlight active entry
  var active = $('#nav-tree .nav-entry.active');
  if (active) active.classList.add('active');
}

// ---- Render: Breadcrumb ----
function renderBreadcrumb(items) {
  var el = $('#breadcrumb');
  if (!items || items.length === 0) {
    el.innerHTML = '';
    return;
  }
  var html = '';
  items.forEach(function(item, i) {
    if (i > 0) html += '<span class="sep">/</span>';
    if (item.link) {
      html += '<a onclick="' + item.link + '">' + escapeHtml(item.label) + '</a>';
    } else if (i === items.length - 1) {
      html += '<span class="current">' + escapeHtml(item.label) + '</span>';
    } else {
      html += '<span>' + escapeHtml(item.label) + '</span>';
    }
  });
  el.innerHTML = html;
}

// ---- Render: Category Page ----
function renderCategoryPage(catId) {
  var cat = getCategory(catId);
  if (!cat) { renderEmpty(); return; }
  var entries = getEntriesByCategory(catId);
  renderBreadcrumb([
    { label: cat.name }
  ]);
  var html = '<div class="category-header">'
    + '<h1>' + cat.icon + ' ' + escapeHtml(cat.name) + '</h1>'
    + '<p>共 ' + entries.length + ' 个条目</p>'
    + '</div>';
  if (entries.length === 0) {
    html += '<div class="search-empty"><div class="big-icon">\uD83D\uDCDD</div><p>该分类暂无条目</p></div>';
  } else {
    html += '<div class="category-entry-list">';
    entries.forEach(function(entry) {
      html += '<div class="category-entry-card" onclick="navigateToEntry(\'' + entry.id + '\')">'
        + '<h3>' + escapeHtml(entry.name) + '</h3>'
        + '<div class="summary">' + escapeHtml(entry.summary || '暂无简介') + '</div>'
        + '<div class="meta-row">'
        + '<span class="tag spoiler-' + entry.spoilerLevel + '">' + SPOILER_LABELS[entry.spoilerLevel] + '</span>';
      if (entry.tags) entry.tags.slice(0, 3).forEach(function(t) {
        html += '<span class="tag">' + escapeHtml(t) + '</span>';
      });
      html += '</div></div>';
    });
    html += '</div>';
  }
  $('#content').innerHTML = html;
}

// ---- Render: Entry Detail ----
function renderEntryDetail(entryId) {
  var entry = getEntry(entryId);
  if (!entry) { renderEmpty(); return; }
  addRecent(entryId);
  var cat = getCategory(entry.category);
  renderBreadcrumb([
    { label: cat ? cat.name : entry.category, link: 'navigateToCategory(\'' + entry.category + '\')' },
    { label: entry.name }
  ]);
  // Update nav highlight
  $$('#nav-tree .nav-entry.active').forEach(function(el) { el.classList.remove('active'); });
  var navEl = $('#nav-tree .nav-entry[data-entry="' + entryId + '"]');
  if (navEl) {
    navEl.classList.add('active');
    // Ensure parent category is open
    var parent = navEl.closest('.nav-category');
    if (parent) {
      var catId = parent.dataset.category;
      navOpenCategories[catId] = true;
      localStorage.setItem('sfNavOpen', JSON.stringify(navOpenCategories));
      renderNavTree();
      // Re-find and highlight
      var newNav = $('#nav-tree .nav-entry[data-entry="' + entryId + '"]');
      if (newNav) newNav.classList.add('active');
    }
  }
  // Build HTML
  var html = '<div class="detail-page">'
    + '<div class="detail-header">'
    + '<h1>' + escapeHtml(entry.name) + '</h1>';
  if (entry.aliases && entry.aliases.length > 0) {
    html += '<div class="aliases">别名：';
    entry.aliases.forEach(function(a) {
      html += '<span>' + escapeHtml(a) + '</span>';
    });
    html += '</div>';
  }
  html += '<div class="summary">' + escapeHtml(entry.summary || '') + '</div>'
    + '</div>'
    + '<div class="detail-meta">'
    + '<div class="meta-item"><span class="meta-label">分类</span><span class="meta-value">' + (cat ? escapeHtml(cat.name) : entry.category) + '</span></div>';
  if (entry.firstAppearance) {
    html += '<div class="meta-item"><span class="meta-label">首次出现</span><span class="meta-value">' + escapeHtml(entry.firstAppearance) + '</span></div>';
  }
  html += '<div class="meta-item"><span class="meta-label">剧透级别</span><span class="meta-value spoiler-' + entry.spoilerLevel + '">' + SPOILER_LABELS[entry.spoilerLevel] + '</span></div>'
    + '<div class="meta-item"><span class="meta-label">状态</span><span class="meta-value status-' + entry.status + '">' + STATUS_LABELS[entry.status] + '</span></div>';
  if (entry.tags && entry.tags.length > 0) {
    html += '<div class="meta-item"><span class="meta-label">标签</span><span class="meta-value">' + entry.tags.map(function(t) { return escapeHtml(t); }).join(', ') + '</span></div>';
  }
  html += '</div>'
    + '<div class="detail-body">' + (entry.detail || '<p style="color:#576574;">暂无详细描述</p>') + '</div>';
  // Related sections
  var relSections = [
    { key: 'relatedCharacters', label: '关联人物', data: entry.relatedCharacters },
    { key: 'relatedFactions',   label: '关联势力', data: entry.relatedFactions },
    { key: 'relatedLocations',  label: '关联地点', data: entry.relatedLocations },
    { key: 'relatedEvents',     label: '关联事件', data: entry.relatedEvents }
  ];
  relSections.forEach(function(sec) {
    if (sec.data && sec.data.length > 0) {
      html += '<div class="detail-section"><h2>' + sec.label + '</h2>';
      sec.data.forEach(function(relId) {
        var relEntry = getEntry(relId);
        if (relEntry) {
          html += '<span class="related-item" onclick="navigateToEntry(\'' + relId + '\')">' + escapeHtml(relEntry.name) + '</span>';
        } else {
          html += '<span class="related-item" style="color:#576574;">' + escapeHtml(relId) + '</span>';
        }
      });
      html += '</div>';
    }
  });
  html += '</div>';
  $('#content').innerHTML = html;
}

// ---- Render: Search Results ----
function renderSearchResults(query) {
  if (!query || !query.trim()) {
    var firstCat = Object.values(ENCYCLOPEDIA_DATA.categories).sort(function(a, b) { return a.order - b.order; })[0];
    if (firstCat) navigateToCategory(firstCat.id);
    else renderEmpty();
    return;
  }
  var q = query.trim().toLowerCase();
  var results = ENCYCLOPEDIA_DATA.entries.filter(function(entry) {
    return entry.name.toLowerCase().includes(q)
      || (entry.aliases && entry.aliases.some(function(a) { return a.toLowerCase().includes(q); }))
      || (entry.summary && entry.summary.toLowerCase().includes(q))
      || (entry.tags && entry.tags.some(function(t) { return t.toLowerCase().includes(q); }));
  });
  var countEl = $('#search-results-count');
  countEl.textContent = results.length + ' 个结果';
  renderBreadcrumb([
    { label: '搜索: "' + query + '"' }
  ]);
  if (results.length === 0) {
    $('#content').innerHTML = '<div class="search-empty">'
      + '<div class="big-icon">\uD83D\uDD0D</div>'
      + '<p>未找到与 "' + escapeHtml(query) + '" 相关的结果</p>'
      + '<p style="font-size:.8rem;color:#576574;margin-top:8px;">尝试更换关键词或搜索条目名称、别名、标签</p>'
      + '</div>';
    return;
  }
  var html = '<div class="search-results">';
  results.forEach(function(entry) {
    var cat = getCategory(entry.category);
    html += '<div class="search-result-item" onclick="navigateToEntry(\'' + entry.id + '\')">'
      + '<div class="result-name">' + highlightText(entry.name, query) + '</div>'
      + '<div class="result-category">' + (cat ? escapeHtml(cat.name) : entry.category) + '</div>'
      + '<div class="result-summary">' + highlightText(entry.summary || '暂无简介', query) + '</div>'
      + '</div>';
  });
  html += '</div>';
  $('#content').innerHTML = html;
}

// ---- Render: Empty / Welcome ----
function renderEmpty() {
  renderBreadcrumb([]);
  $('#content').innerHTML = '<div class="search-empty">'
    + '<div class="big-icon">\uD83D\uDE80</div>'
    + '<p style="font-size:1.1rem;color:#c8d6e5;margin-bottom:8px;">欢迎使用星铸百科</p>'
    + '<p style="font-size:.85rem;color:#576574;">《全民穿越：别人造木屋，我修歼星舰》世界观管理平台</p>'
    + '<p style="font-size:.8rem;color:#576574;margin-top:16px;">从左侧导航树选择一个分类或使用搜索框查找条目</p>'
    + '</div>';
}

// ---- Navigation Functions ----
function navigateToEntry(entryId) {
  renderEntryDetail(entryId);
  // On mobile, collapse sidebar after navigation
  if (window.innerWidth <= 768) {
    $('#sidebar').classList.add('collapsed');
  }
}

function navigateToCategory(catId) {
  renderCategoryPage(catId);
  $$('#nav-tree .nav-entry.active').forEach(function(el) { el.classList.remove('active'); });
  if (window.innerWidth <= 768) {
    $('#sidebar').classList.add('collapsed');
  }
}

function navigateToRelated(entryId) {
  navigateToEntry(entryId);
}

// ---- Search ----
var searchTimer = null;
function handleSearch(value) {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(function() {
    renderSearchResults(value);
  }, 150);
}

// ---- Sidebar Toggle ----
function toggleSidebar() {
  var sb = $('#sidebar');
  sb.classList.toggle('collapsed');
}

// ---- Init ----
function init() {
  renderNavTree();
  // Check URL hash for initial navigation
  var hash = window.location.hash.slice(1);
  if (hash) {
    if (hash.startsWith('cat-')) {
      navigateToCategory(hash.slice(4));
    } else {
      navigateToEntry(hash);
    }
  } else {
    // Show first category by default
    var cats = Object.values(ENCYCLOPEDIA_DATA.categories).sort(function(a, b) { return a.order - b.order; });
    if (cats.length > 0 && ENCYCLOPEDIA_DATA.entries.length > 0) {
      navigateToCategory(cats[0].id);
    } else {
      renderEmpty();
    }
  }
  // Update hash on navigation
  window.addEventListener('hashchange', function() {
    var h = window.location.hash.slice(1);
    if (h) {
      if (h.startsWith('cat-')) navigateToCategory(h.slice(4));
      else navigateToEntry(h);
    }
  });
  // Keyboard shortcut: focus search
  document.addEventListener('keydown', function(e) {
    if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
      e.preventDefault();
      $('#search-input').focus();
    }
  });
}

// Override navigateToEntry to set hash
var _origNavigate = navigateToEntry;
navigateToEntry = function(id) {
  window.location.hash = id;
  _origNavigate(id);
};
var _origNavigateCat = navigateToCategory;
navigateToCategory = function(id) {
  window.location.hash = 'cat-' + id;
  _origNavigateCat(id);
};

// Run
document.addEventListener('DOMContentLoaded', init);
</script>
